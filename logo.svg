<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- open book pages -->
  <path d="M10 44 L10 18 Q10 14 14 14 L30 14 Q32 14 32 16 L32 42 Q32 40 30 40 L14 40 Q10 40 10 44Z" fill="#e8e6f0" stroke="#1a1a2e" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M54 44 L54 18 Q54 14 50 14 L34 14 Q32 14 32 16 L32 42 Q32 40 34 40 L50 40 Q54 40 54 44Z" fill="#e8e6f0" stroke="#1a1a2e" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- book spine -->
  <line x1="32" y1="14" x2="32" y2="42" stroke="#1a1a2e" stroke-width="1.5"/>
  <!-- text lines left -->
  <line x1="15" y1="21" x2="27" y2="21" stroke="#8b89a6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="15" y1="26" x2="25" y2="26" stroke="#8b89a6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="15" y1="31" x2="27" y2="31" stroke="#8b89a6" stroke-width="1.2" stroke-linecap="round"/>
  <!-- text lines right -->
  <line x1="37" y1="21" x2="49" y2="21" stroke="#8b89a6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="37" y1="26" x2="47" y2="26" stroke="#8b89a6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="37" y1="31" x2="49" y2="31" stroke="#8b89a6" stroke-width="1.2" stroke-linecap="round"/>
  <!-- sparkle / insight diamond -->
  <path d="M32 4 L34 8 L38 10 L34 12 L32 16 L30 12 L26 10 L30 8Z" fill="#6366f1"/>
  <!-- small sparkle dots -->
  <circle cx="22" cy="7" r="1" fill="#6366f1" opacity="0.5"/>
  <circle cx="42" cy="7" r="1" fill="#6366f1" opacity="0.5"/>
  <!-- bottom curve connecting pages -->
  <path d="M10 44 Q10 48 14 48 L30 48 Q32 48 32 46 Q32 48 34 48 L50 48 Q54 48 54 44" fill="none" stroke="#1a1a2e" stroke-width="1.5" stroke-linejoin="round"/>
</svg>
