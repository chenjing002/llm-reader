，而官方叙事以'首次全面覆盖'正面表述替代了对目标缺口的说明。","context_brief":"2025年融资成本及商业物业收入覆盖利息支出的里程碑式披露。","file_date":"2026-05-11"},{"id":341,"file_name":"2026-05-11.md","piece_index":3,"original_text":"華夏中海商業資產封閉式基礎設施證券投資基金「中海商業 REIT」（180607. SZ）在深圳證券交易所成功上市，是內地首單以「收購-改造-提升-盤活」模式落地的消費 REIT。","importance_score":0.86,"importance_reason":"重大战略落地事件：商业REIT上市是经营性业务资产证券化的关键节点，也是中海推动'第二增长曲线'从概念走向资本市场的实质性动作，为后续持续注入成熟资产提供平台基础。","context_brief":"中海商业REIT于2025年在深交所成功上市，系内地首单该模式消费REIT。","file_date":"2026-05-11"},{"id":342,"file_name":"2026-05-11.md","piece_index":3,"original_text":"二零二六年三月初自然資源部出台的相關政策明確，新增建設用地原則上不用於經營性房地產開發。這項政策對控增量、去庫存、優供給將發揮積極作用。","importance_score":0.88,"importance_reason":"重大政策信号：新增建设用地原则上不再用于商业性房地产开发，意味着行业供给端将面临历史性收缩，是影响长期供需格局的结构性政策转变，对存量优质资产持有者（如中海）构成竞争壁垒强化。","context_brief":"2026年3月自然资源部出台新增建设用地限制性政策，管理层将其纳入市场回稳驱动力框架。","file_date":"2026-05-11"},{"id":343,"file_name":"2026-05-11.md","piece_index":3,"original_text":"在 15 個中國內地城市和香港共獲取 35 幅地塊，總購地金額人民幣 1,186.9 億元，權益購地金額人民幣 924.2 億元，新增購地金額保持行業第一，香港及北上廣深五個城市權益購地金額佔比約 73.9%。","importance_score":0.8,"importance_reason":"购地金额1186.9亿元保持行业第一，且73.9%集中于香港+北上广深五城，高能级城市土储集中度创历史新高；在行业整体收缩背景下持续大规模补仓核心城市，体现逆周期拿地策略延续。","context_brief":"2025年全年土地获取数据，集中度与规模双重披露。","file_date":"2026-05-11"},{"id":344,"file_name":"2026-05-11.md","piece_index":3,"original_text":"本集團將持續提升經營性業務的運營能力與經營效益。在首個商業公募 REIT 成功發行基礎上，本集團將通過持續注入成熟資產，並積極構建新的 REITs 平台，進一步釋放資產價值，驅動本集團持續穩健高質量發展。","importance_score":0.85,"importance_reason":"前瞻性战略声明：以REIT平台持续注入成熟资产替代此前'投资物业盈利占比20%'的量化目标，是商业地产战略叙事的实质性转型——从盈利占比量化目标转向资产证券化与价值释放逻辑，标志该战略目标表述框架彻底更迭。","context_brief":"管理层对经营性业务未来战略路径的前瞻性表述，以REIT平台为核心工具。","file_date":"2026-05-11"},{"id":345,"file_name":"2026-05-11.md","piece_index":5,"original_text":"优客工场 (ucommune）成立于 2015 年 4 月，由毛大庆博士发起成立。由红杉资本中国基金、真格基金、诺亚财富、创新工场、亿润投资、中投汉富、阳光壹佰、银泰置地、中融信托、首创置业、龙熙地产、景荣控股等数十家家国内知名投资机构共同投资。","importance_score":0.55,"importance_reason":"毛大庆博士为万科前高管，创始人背景具有行业意义；股东包含地产系资本（银泰置地、首创置业、龙熙地产）与金融系资本混合，揭示联合办公赛道与传统地产资本的深度捆绑关系，对理解联合办公商业模式与地产行业关联有参考价值。","context_brief":"优客工场公司简介，披露创始人背景与早期投资人阵容。","file_date":"2026-05-11"},{"id":346,"file_name":"2026-05-11.md","piece_index":5,"original_text":"自创立以来，优客工场用互联网模式革新传统办公场景，率先实现智能化办公和无人值守运营管理，全方位服务直击会员核心需求的商业模式，契合了培养和建设现代化新经济模式的发展趋势。","importance_score":0.35,"importance_reason":"强调'互联网模式'与'无人值守运营'的差异化定位，是联合办公赛道早期叙事的典型样本，可用于与后续经营实际（盈利能力、坪效等）进行对比验证。","context_brief":"公司对自身商业模式与竞争优势的自我定位描述。","file_date":"2026-05-11"},{"id":347,"file_name":"2026-05-17.md","piece_index":1,"original_text":"毛大庆日前曾私下透露，万科的物流地产将学习工业地产巨头普洛斯，同时，尝试引入美国老牌私募基金黑石。对于引入黑石基金，毛大庆表示产业变革、外部环境变革、带来整个团队都在变革。金融化将是房企发展的必然倾向。","importance_score":0.72,"importance_reason":"毛大庆在离开万科前夕的战略判断——'金融化将是房企发展的必然倾向'——与其随后转型创业方向形成关联；同时，万科尝试引入黑石代表传统房企向资产管理/私募模式转型的早期信号，与中海发展同期持续推进'投资物业盈利占比20%'目标的逻辑同源，均反映2014年前后头部房企对轻资产/金融化路径的主动探索。","context_brief":"2014年6月，万科高管毛大庆透露万科物流地产战略方向：对标普洛斯模式、引入黑石基金，并判断金融化是房企必然趋势。毛大庆于2015年4月离开万科创立优客工场。","file_date":"2026-05-17"},{"id":348,"file_name":"2026-05-17.md","piece_index":6,"original_text":"按照仲量联行的统计，目前中国的国际标准仓库（包括一线城市）总存量为1300万平方米，仅为美国波士顿一个城市的仓储容量。","importance_score":0.85,"importance_reason":"关键行业基准数据，揭示中国物流基础设施与发达国家的极大差距，为后续投资机会判断提供量化依据。","context_brief":"2012年4月经济观察报报道中国物流地产供需状况，对比中美仓储差距。","file_date":"2026-05-17"},{"id":349,"file_name":"2026-05-17.md","piece_index":6,"original_text":"在北京，国际标准仓的空置率不到2%。按照该公司的统计；截止到去年第四季度末，北京仓储物流平均净有效租金达每天每平方米0.99元，同比增长12.5%。","importance_score":0.88,"importance_reason":"关键市场数据：极低空置率（<2%）和显著租金涨幅（+12.5%）共同验证供需严重失衡，是物流地产投资逻辑的核心支撑。","context_brief":"仲量联行数据，描述2011年Q4北京物流仓储市场供需状况。","file_date":"2026-05-17"},{"id":350,"file_name":"2026-05-17.md","piece_index":6,"original_text":"去年第四季度，浦东的仓储物流租金水平环比三季度上涨1.16%至每天每平方米人民币1.4元，青浦的租金环比上涨4%至每天每平方米1.3元。他们认为：由于业主惜售，预期未来有进一步的租金上涨及资本增值的空间。","importance_score":0.8,"importance_reason":"上海核心子市场租金数据，业主惜售叠加供给不足，指向资本增值预期，与北京数据共同构成全国性供不应求格局。","context_brief":"高力国际统计2011年Q4上海物流仓储租金数据。","file_date":"2026-05-17"},{"id":351,"file_name":"2026-05-17.md","piece_index":6,"original_text":"到了2015年，符合国际标准的仓库总体量有望提升到2000万平方米，但这些增长将主要来自于现有的主要物流中心城市。中国新兴城市中的很多城市，尤其是华北、华南和西部城市依然处于优质设施供应匮乏的状态。","importance_score":0.82,"importance_reason":"前瞻性数据：2015年目标总量较2012年仅增53%（1300→2000万平米），增量远不足以填补差距，且区域供给不均问题持续，预示二三线城市长期投资机会。","context_brief":"仲量联行对2015年物流仓储供给增长的前瞻预测。","file_date":"2026-05-17"},{"id":352,"file_name":"2026-05-17.md","piece_index":6,"original_text":"2008年12月唯品会成立时，仓库位于办公区，只有数十平方米，此后三年，唯品会的仓库经历5次搬迁，从数十平方米到800平方米，再升级为9000平方米的独立仓库……到去年底，这家公司全国仓储面积高达10万余平方米。","importance_score":0.83,"importance_reason":"典型案例数据：三年内仓储面积从数十平米扩张至10万平米，增幅逾千倍，直观体现电商爆发对物流仓储需求的结构性拉动效应。","context_brief":"唯品会2008-2011年仓储规模扩张历程，以案例形式呈现电商仓储需求爆发。","file_date":"2026-05-17"},{"id":353,"file_name":"2026-05-17.md","piece_index":6,"original_text":"仓储物流开支是唯品会运营开支的大头，而且随着营收规模扩大而增加，维持在20%左右。2008年-2011年，唯品会的仓储物流费用分别为61万、580.9万、4547.8万美元，占总营收比例分别为21.8%、17.8%、20%。","importance_score":0.79,"importance_reason":"关键财务数据：仓储成本占营收约20%且绝对规模随业务扩张急速增长，说明风投资金通过电商间接流入物流地产，揭示资本链条结构。","context_brief":"唯品会仓储物流成本占比数据，反映电商对物流地产的结构性依赖。","file_date":"2026-05-17"},{"id":354,"file_name":"2026-05-17.md","piece_index":6,"original_text":"物流仓储投资总量很低、半年到一年就能盖好。但投资回报率没有住宅高。他们监测到的国际标准仓目前一年的投资回报率是8%。……对于现在毛利率在走低、外部环境变化很大的住宅开发商而言，进入一个投资少、收益较稳定的细分市场，获得现金流的支撑，也是一个还算不错的选择。","importance_score":0.76,"importance_reason":"商业模式判断：8%年化回报率虽低于住宅，但投资周期短、现金流稳定的特性对毛利率承压的住宅开发商具有战略补充价值——与历史背景中中海发展等房企推进商业/经营性物业多元化的趋势形成呼应。","context_brief":"文章末尾对物流地产商业模式及对住宅开发商吸引力的分析判断。","file_date":"2026-05-17"},{"id":355,"file_name":"2026-05-17.md","piece_index":7,"original_text":"10月份，GIC旗下物流部门普洛斯公司(GLP)上市，此系中金首次在海外公司的IPO中发挥主导作用，被认为是中金在国际项目中的一次突破。","importance_score":0.82,"importance_reason":"标志中金国际化业务的关键里程碑：首次在海外公司IPO中担任主导，是其从本土投行向国际投行转型的实质性突破节点。","context_brief":"中金公司2010年15周年全球庆典期间，首次主导海外公司IPO项目。","file_date":"2026-05-17"},{"id":356,"file_name":"2026-05-17.md","piece_index":7,"original_text":"香港酒会时两任特首董建华、曾荫权均有参加，而北京酒会时北京市市长郭金龙、央行行长周小川、中投董事长楼继伟亦有出席。","importance_score":0.72,"importance_reason":"顶级政商关系网络是中金核心竞争资产之一；同时出现周小川（货币政策）、楼继伟（主权财富基金）两位金融监管/投资核心人物，反映中金在政策圈的独特地位。","context_brief":"中金15周年庆典吸引两地顶级政商人物出席，显示其政治资源网络的深度与广度。","file_date":"2026-05-17"},{"id":357,"file_name":"2026-05-17.md","piece_index":8,"original_text":"万科总裁郁亮亦承认：万科真正的对手是中海，与我们旗鼓相当的始终是中海。","importance_score":0.92,"importance_reason":"竞争对手最高管理层的公开表态，直接确立中海的行业竞争地位，具有极高的外部佐证价值；同期数据显示中海以三分之二规模实现更高净利润，印证战略差异。","context_brief":"经济观察报2010年4月对中海与万科2009年经营数据的横向对比报道，郁亮公开表态。","file_date":"2026-05-17"},{"id":358,"file_name":"2026-05-17.md","piece_index":8,"original_text":"2008年中海地产的净利率26.73%，而同年万科的净利率为9.8%，前者是后者的2.73倍。","importance_score":0.9,"importance_reason":"关键财务比率的第三方独立核实：中海净利率约为万科2.73倍，与年报中管理层自述盈利优势形成外部交叉验证；数据显示规模劣势可被利润率优势充分覆盖。","context_brief":"第三方媒体对中海vs万科盈利能力的量化比较，聚焦2008-2009年数据。","file_date":"2026-05-17"},{"id":359,"file_name":"2026-05-17.md","piece_index":8,"original_text":"根据中海多年的财报，其每年度营销、管理等费用占总收入的比例合计都低于5%。……2009年万科的管理费用和营业费用有了一定幅度的下降，两项费用占营收比例为6%。","importance_score":0.88,"importance_reason":"费用率低于5% vs 万科6-8%是中海净利率领先的核心结构性原因，且为多年持续数据，非单年异常；为理解中海盈利模式提供关键量化锚点。","context_brief":"媒体对两家公司费用管控能力的多年数据对比，揭示中海成本控制优势的量化根源。","file_date":"2026-05-17"},{"id":360,"file_name":"2026-05-17.md","piece_index":8,"original_text":"中海向来以港企和记黄埔和新鸿基等为榜样，讲究风险控制，在发展时相对谨慎，追求有质量的增长……2005年－2007年，国内房地产市场井喷之际，很多企业都选择了高负债疯狂扩张，资产负债率超过70％的比比皆是，而中海在2005－2007年的资产负债率分别是42％、45％、52％。","importance_score":0.85,"importance_reason":"提供中海保守财务风格的外部历史归因（1997年危机刻骨铭心），并以行业2005-2007年的普遍高杠杆行为作为参照，量化说明中海与同行的结构性分化；这一叙事在历史年报中均以管理层视角呈现，此处为第三方独立记录。","context_brief":"媒体归纳中海财务保守主义的历史根源与行业对比，追溯至1997年亚洲金融危机。","file_date":"2026-05-17"},{"id":361,"file_name":"2026-05-17.md","piece_index":8,"original_text":"中海称，从2015年起，全部投资物业每年将能提供不少于12亿港元的稳定租金收入。","importance_score":0.87,"importance_reason":"与历史背景中2009年报的记录完全吻合（'2015年租金≥12亿港元'），第三方媒体在2010年4月确认该目标已对外公开表达；结合2025年实际商业收入72亿元的历史走势，可追溯该承诺的完整演变轨迹。","context_brief":"媒体报道中海2010年对商业物业租金目标的外部披露，与年报内部陈述形成交叉验证。","file_date":"2026-05-17"},{"id":362,"file_name":"2026-05-17.md","piece_index":8,"original_text":"孔庆平表示，2009年中海确实买了很多地，但这些地实际上无非就是总价高一点而已，如果按平均单价来看，2009年新增的土地楼面地价也不过在2100—2200元/平方米，包括上海的长风地块，整体来看，这个并不高。","importance_score":0.8,"importance_reason":"管理层对激进拿地行为的公开解释逻辑，揭示'总价高、单价不高'的叙事框架；与年报中'逆周期拿地'战略叙事形成互补，但侧重对外舆论管理而非内部战略逻辑。","context_brief":"孔庆平就2009年下半年中海突然大规模拿地（12块、1210万平米）的策略辩护，强调平均地价合理性。","file_date":"2026-05-17"},{"id":363,"file_name":"2026-05-17.md","piece_index":8,"original_text":"万科总裁郁亮首次透露了公司这一重大决定：万科未来将加大持有型物业的储备，并在近期内陆续推出养老物业、酒店及商业配套等多种物业类型。其中，住宅产品仍将占据80%比重，其余20%则将开发持有型物业。","importance_score":0.82,"importance_reason":"行业头部竞争格局的重要变化信号：万科宣布20%持有型物业目标，与中海长期坚守的商业地产路线形成战略趋同；竞争加剧将压缩中海商业物业的先发差异化优势。","context_brief":"万科宣布战略转型，向中海商业物业模式靠拢，媒体将其解读为竞争加剧的互相学习效应。","file_date":"2026-05-17"},{"id":364,"file_name":"2026-05-17.md","piece_index":8,"original_text":"前几年中海地产的资本运作为集团整体上市让了一点路，发展慢了一点。中国建筑上市后，中海地产一定会加快发展，提高盈利。","importance_score":0.83,"importance_reason":"首次以母公司高管公开发言的形式确认，中海2006-2008年扩张速度低于潜力系主动为中建上市让路，而非能力不足；中建上市后对中海的支持承诺（决策权+资金）是后续中海加速扩张的制度性背景。","context_brief":"孙文杰在中国建筑上市路演中的公开承诺，解释中海此前发展相对放缓的内部原因。","file_date":"2026-05-17"},{"id":365,"file_name":"2026-05-17.md","piece_index":9,"original_text":"普洛斯全球总部也非常高兴这件事的发生，因为金融风暴的影响，母公司总贷款额度达到58%，在正常环境下，58%作为地产公司来说不是很高的贷款，但是在金融风暴之下这个数字就偏高。","importance_score":0.85,"importance_reason":"直接披露出售动机：金融危机使58%负债率从可接受变为危险，揭示危机对地产企业资产负债表的压迫机制，与同期中海发展逆势扩张形成鲜明对比。","context_brief":"2008年金融危机下，普洛斯以13亿美元将中国及日本资产出售给新加坡主权基金GIC，回笼现金降杠杆。","file_date":"2026-05-17"},{"id":366,"file_name":"2026-05-17.md","piece_index":9,"original_text":"这次交易还将包括普洛斯中国的所有债务，因此，在交易完成之后，普洛斯集团不仅可以消化在中国的债务，同时，也将有10多亿的现金用以冲抵贷款。","importance_score":0.78,"importance_reason":"交易结构设计揭示危机中资产剥离的典型模式：连同债务打包出售，买方承接债务，卖方同时获得现金和净负债率改善。","context_brief":"出售结构包含债务转移，使普洛斯实现资产负债表双重修复。","file_date":"2026-05-17"},{"id":367,"file_name":"2026-05-17.md","piece_index":9,"original_text":"虽然中国出口各方面会受到影响，但是国内的消费市场还有城市化的发展是不变的，将来20年、30年、40年还是会继续发展的。随着城市化的发展，我们需要很多日常用品、消费品，消费品需要一些物流、一些仓储来支撑、来服务。所以这方面我们的业务空间是很大的。更重要的是，在中国有很多老的厂房，由于城市的扩张需要不断地拆除，代替老的厂房仓库也是一个很大的发展空间。","importance_score":0.88,"importance_reason":"前瞻性判断：在2008年危机最深处明确提出内需/城镇化逻辑支撑物流地产20-40年发展空间，与此后普洛斯成为中国最大物流地产商的历史走势高度吻合，是典型的逆势布局逻辑陈述。","context_brief":"SMG基金亚洲区CEO梅志明在2008年金融危机深处对中国工业地产长期逻辑的研判。","file_date":"2026-05-17"},{"id":368,"file_name":"2026-05-17.md","piece_index":9,"original_text":"工业地产的一个好处，就是它可以给你一个稳定的资金回报率，非常适合养老基金包括保险基金。希望将来平台做得越来越大的时候，可以引进一些国内的资金，我们可以提供一个稳定的回报给投资者。","importance_score":0.82,"importance_reason":"2008年即提出工业地产+养老/保险基金配置逻辑及国内资金引入路径，与此后十余年中国物流地产REIT化进程（2021年公募REITs落地）高度预言性吻合，具有重要的前瞻价值。","context_brief":"梅志明阐述引入国内社保、养老基金进入工业地产的设想，为未来REIT化埋下伏笔。","file_date":"2026-05-17"},{"id":369,"file_name":"2026-05-17.md","piece_index":9,"original_text":"从目前中国的工业地产租金来看，受金融危机的影响，上海过去几年可能是在8%-10%的涨幅水平，可能会回到3%-5%，或者4%的涨幅水平。","importance_score":0.72,"importance_reason":"具体量化数据：披露危机前上海工业地产租金涨幅8%-10%的历史水平及危机后的预期回落区间，是2008年工业地产市场状态的珍贵一手数据。","context_brief":"SMG内部人士对2008年金融危机冲击下上海工业地产租金增速的预判。","file_date":"2026-05-17"},{"id":370,"file_name":"2026-05-17.md","piece_index":11,"original_text":"钟鼎创投投委会主席梅志明为普洛斯（GLP）创始人兼CEO，普洛斯是亚洲最大的物流设施提供商，市值超过130亿美金。","importance_score":0.55,"importance_reason":"揭示钟鼎创投与普洛斯（GLP）之间的关键人物关联：投委会主席梅志明同时是亚洲最大物流设施提供商的创始人兼CEO，显示物流基础设施资本与物流VC投资之间存在结构性利益交织，具有判断其投资逻辑和潜在利益冲突的重要参考价值。","context_brief":"介绍钟鼎创投的背景及其投委会主席身份。","file_date":"2026-05-17"},{"id":371,"file_name":"2026-05-18.md","piece_index":0,"original_text":"恒隆集团的创始人陈曾熙是其中一个较为极端的代表，他几乎彻底隐身，从不接受记者访问，甚至连地产界的活动也极少参加（继承了恒隆产业的陈启宗相对上一代的创业者，要开放许多）。","importance_score":0.3,"importance_reason":"揭示香港地产创始人与接班人代际风格差异，陈启宗相对开放的形象有助于理解恒隆集团后续战略传播与对外沟通模式的转变。","context_brief":"描述香港地产创业一代低调作风，以恒隆集团创始人陈曾熙为极端案例，并与继承人陈启宗作风对比。","file_date":"2026-05-18"},{"id":384,"file_name":"2026-05-18.md","piece_index":4,"original_text":"我在 50 余载的工作历程中，有幸参与、主导了一系列重组，包括在上海重组本地股、振兴工业、开发浦东，以及在重庆推进经济社会各领域改革，从中我深刻领悟到重组的真谛与妙趣。其真谛在于资源优化配置；其妙趣在于，「山重水复疑无路，柳暗花明又一村」。","importance_score":0.9,"importance_reason":"关键人物对其核心方法论的高度概括，揭示了重组的本质是资源优化配置","context_brief":"黄奇帆在新书《重组与突破》自序中总结50年工作经验","file_date":"2026-05-18"},{"id":385,"file_name":"2026-05-18.md","piece_index":4,"original_text":"黄奇帆认为，重组是一个广泛适用的概念，深化改革离不开重组，转变经济发展方式也离不开重组。重组有明确的目的，必须根植于市场经济的微观、宏观制度之中。不管用什么方法进行重组，都要把握住以下几点：要清楚重组是管理层的事情、不能搞「民粹主义」，要讲时机、讲机遇，重组应该是多赢的，必须在阳光下作业，要量力而行、适可而止。","importance_score":0.92,"importance_reason":"系统性归纳了重组的五大原则，尤其「不能搞民粹主义」和「量力而行」具有强烈的现实警示意义","context_brief":"黄奇帆对重组方法论的核心原则总结","file_date":"2026-05-18"},{"id":386,"file_name":"2026-05-18.md","piece_index":4,"original_text":"所谓改革，就是抓住处理政府和市场关系的「牛鼻子」，通过优化资源要素配置方式来提升综合效率。实际上，改革是体制、机制、制度的重组，重组是资源配置方式的改革，改革与重组异曲同工，是一而二、二而一的关系。","importance_score":0.88,"importance_reason":"将改革等同于制度层面的重组，为理解中国改革提供了独特的分析框架","context_brief":"黄奇帆论述改革与重组的本质关系","file_date":"2026-05-18"},{"id":387,"file_name":"2026-05-18.md","piece_index":4,"original_text":"不能在重组时搞「民粹主义」。一定要清楚，重组是管理层的事情，是有一定权力、资源、资金、实力的管理者之间默契的行动。","importance_score":0.85,"importance_reason":"直接否定民粹主义在经济重组中的角色，体现精英决策的治理理念，观点鲜明且具争议性","context_brief":"黄奇帆论重组的决策机制","file_date":"2026-05-18"},{"id":388,"file_name":"2026-05-18.md","piece_index":4,"original_text":"你有 10 元的能力，可以拿出 3 元去重组。但若拿出全部老本，甚至以高杠杆、高负债去重组，那就得不偿失了，不仅眼前的问题得不到解决，新的问题也会层出不穷，甚至会陷入意料不到的债务危机。","importance_score":0.84,"importance_reason":"以通俗比喻阐述杠杆风险，对当前地方债务和企业高杠杆并购具有直接警示价值","context_brief":"黄奇帆论重组中的风险控制","file_date":"2026-05-18"},{"id":389,"file_name":"2026-05-18.md","piece_index":4,"original_text":"重组的最高境界就是，你已经把中央的政策、法律限制的问题、手中可以操作的杠杆资源、老百姓能够接受的条件，都装在脑子里形成一个框，在这个框里，你可以对所有的东西任意地组合，但是「随心所欲不逾矩」。","importance_score":0.9,"importance_reason":"揭示了中国式治理的核心逻辑——在政策约束下寻求最大自由度的资源配置，体现政策边界内的创新空间","context_brief":"黄奇帆总结重组的最高境界","file_date":"2026-05-18"},{"id":390,"file_name":"2026-05-18.md","piece_index":4,"original_text":"2000 年美国为解决房地产不景气问题，把房地产中的问题贷款重组成次级债，引发了 2008 年的次债危机，而后，为了解决金融危机问题，美国大量的财政透支又引发了 2010 年美国政府债务危机，这些都是反面教材。","importance_score":0.82,"importance_reason":"用国际案例说明重组中转嫁风险和推延问题的严重后果，具有宏观经济分析价值","context_brief":"黄奇帆以美国次贷危机为反面案例论证重组的底线思维","file_date":"2026-05-18"},{"id":391,"file_name":"2026-05-18.md","piece_index":4,"original_text":"重组过程中会涉及资金市场、保险市场、资本市场的穿透和叠加，因此国家对三大市场监管存在一个综合监管的问题。","importance_score":0.8,"importance_reason":"预见性地指出了金融混业监管的必要性，与后来中国金融监管体制改革方向一致","context_brief":"黄奇帆论重组涉及的金融监管制度","file_date":"2026-05-18"},{"id":400,"file_name":"2026-05-20.md","piece_index":2,"original_text":"梅志明先生带领普洛斯打造以新经济资产为核心的产业生态，聚焦供应链、大数据及新能源三大领域，全球资管规模达 800 亿美元。在物流供应链方面，普洛斯引领行业，引入并不断迭代现代物流仓储标准，推动行业变革，始终处于发展前沿。普洛斯于 2018 年开始布局数据中心，以成熟的资管和运营相结合的模式取得高速发展，已经成为以高效交付、绿色运营为特色的头部数据中心运营商。同时，普洛斯以新能源提升产业和算力设施的环境表现，服务客户双碳目标，发展了光伏、风能、储能以及新能源综合服务能力，为能源转型做贡献。","importance_score":0.902,"importance_reason":"揭示普洛斯从纯物流地产商向'供应链+大数据+新能源'三大领域多元化转型的战略演变，全球资管规模800亿美元是关键规模指标。与已有知识中2008-2012年普洛斯作为纯物流仓储运营商的定位形成显著时序变化，2018年切入数据中心是重要战略拐点。","context_brief":"普洛斯GLP联合创始人梅志明的官方介绍，展示普洛斯从物流仓储向数据中心和新能源的战略转型全景。","file_date":"2026-05-20"},{"id":401,"file_name":"2026-05-20.md","piece_index":2,"original_text":"同时，梅志明先生还是钟鼎创投的联合创始人，投资并兼任了多家上市与私营公司董事，其中包括招商资本、利丰集团和香港置地等。他还是唯泰中国有限公司的联合创始人及投资人，该公司在中国开发和运营比斯特购物村系列。","importance_score":0.8580000000000001,"importance_reason":"此前知识仅记录梅志明为钟鼎创投投委会主席，此处确认其为联合创始人，角色更深。新增招商资本、利丰集团、香港置地等董事关系，以及唯泰中国（比斯特购物村）联合创始人身份，大幅扩展了梅志明的关系网络图谱。利丰集团为全球供应链巨头，香港置地为怡和系核心地产平台，关系链条具有战略意义。","context_brief":"梅志明在普洛斯之外的投资网络与董事任职披露。","file_date":"2026-05-20"}],"insights":[{"id":44,"insight_type":"connection","content":"单伟建和黄奇帆在改革方法论上形成了高度互补的「渐进主义」共识。单伟建认为「中国许多制度和治理模式，并不是事先设计好的蓝图」，而是「在应对和解决具体危机与问题的过程中逐步建立和完善起来的」，呼应邓小平「摸着石头过河」。黄奇帆则从操作层面将这一理念具体化为重组方法论：改革本质上就是「体制、机制、制度的重组」，核心是资源优化配置，最高境界是「随心所欲不逾矩」——在政策、法律、资源约束框架内寻找最优解。两人从不同角度（单伟建从制度演化史观、黄奇帆从实操方法论）共同论证了中国改革的实用主义特征。","created_at":"2026-05-21 07:35:41","excerpts":[{"date":"2026-04-14","from":"单伟建","text":"中国许多制度和治理模式，并不是事先设计好的蓝图，就像邓小平讲的「摸着石头过河」，是在应对和解决具体危机与问题的过程中逐步建立和完善起来的"},{"date":"2026-05-18","from":"黄奇帆","text":"改革是体制、机制、制度的重组，重组是资源配置方式的改革，改革与重组异曲同工"},{"date":"2026-05-18","from":"黄奇帆","text":"重组的最高境界就是……随心所欲不逾矩"}],"files":["2026-04-14.md","2026-05-18.md"]},{"id":45,"insight_type":"connection","content":"两人对高杠杆风险的警惕形成跨领域呼应。单伟建从国际投资角度警告中国海外资产面临地缘政治风险——香港和大陆净头寸合计至少5.5万亿美元，作为「世界上最大的净债权国」存在「巨大的风险」。黄奇帆则从国内重组实践出发警告高杠杆操作的危险：「以高杠杆、高负债去重组……甚至会陷入意料不到的债务危机」，并以2000年美国次级债重组引发2008年次债危机、进而导致2010年政府债务危机的案例作为反面教材。两人从不同维度（对外资产风险vs对内杠杆风险）共同指向同一个核心命题：过度扩张的资产负债表是系统性风险的根源。","created_at":"2026-05-21 07:35:41","excerpts":[{"date":"2026-04-14","from":"单伟建","text":"把香港和大陆的净头寸加起来……就至少有5.5万亿美元，那我们就是世界上最大的净债权国。这在当前的地缘政治格局下，我认为还是存在巨大的风险"},{"date":"2026-05-18","from":"黄奇帆","text":"若拿出全部老本，甚至以高杠杆、高负债去重组……甚至会陷入意料不到的债务危机"},{"date":"2026-05-18","from":"黄奇帆","text":"2000年美国为解决房地产不景气问题，把房地产中的问题贷款重组成次级债，引发了2008年的次债危机"}],"files":["2026-04-14.md","2026-05-18.md"]},{"id":47,"insight_type":"comparison","content":"单伟建与黄奇帆在「政府角色」问题上呈现微妙的视角差异。单伟建强调中国是「全球主要大国中唯一政府部门净资产为正的国家」，以此论证中国财政实力和制度优势，对5%的GDP增长目标「一定能达到」充满信心。黄奇帆则从实操经验强调政府在重组中应保持审慎：「重组是管理层的事情，不能搞民粹主义」，必须「量力而行、适可而止」，在「阳光下作业」。在房地产问题上，黄奇帆进一步指出仅靠融资端放松「不能代替市场主体造血机制的恢复」，需要土地和财税部门「主动发力」。单伟建偏向于对政府能力的乐观信任，黄奇帆则强调政府行动的边界感和执行纪律。","created_at":"2026-05-21 07:35:41","excerpts":[{"date":"2026-04-14","from":"单伟建","text":"2025年中国GDP增长5%……这在任何一个国家，都是一个很可观的数字"},{"date":"2026-05-18","from":"黄奇帆","text":"重组是管理层的事情、不能搞「民粹主义」，要讲时机、讲机遇，重组应该是多赢的，必��在阳光下作业，要量力而行、适可而止"},{"date":"2026-05-10","from":"财新","text":"融资端放松不能代替市场主体造血机制的恢复"}],"files":["2026-04-14.md","2026-05-18.md","2026-05-10.md"]},{"id":48,"insight_type":"connection","content":"单伟建的投资策略与黄奇帆对房地产危机的分析形成了有趣的「用脚投票」印证。单伟建明确表示「不投制造业，因为太卷，利润率过低；也不投出口企业」，而是「投针对消费的头部企业」。黄奇帆分析的房地产危机恰好解释了为什么制造业和出口之外的增长路径如此重要——房地产及其上下游40多个行业面临系统性风险，传统的投资驱动模式（大量依赖房地产和基建）已不可持续。单伟建作为管理亚洲最大PE基金之一的投资人，其资产配置选择实际上是对黄奇帆所描述的结构性转型的市场化验证。","created_at":"2026-05-21 07:35:41","excerpts":[{"date":"2026-04-14","from":"单伟建","text":"在投资上，我不投制造业，因为太「卷」，利润率过低；也不投出口企业……我投的是针对消费的头部企业"},{"date":"2026-05-10","from":"财新","text":"房地产行业急转直下：一方面楼市销售增速继续降至历史低点，另一方面融资端遭遇突然收紧"},{"date":"2026-05-10","from":"财新","text":"房地产业风险正在向产业链上下游40多个行业蔓延"}],"files":["2026-04-14.md","2026-05-10.md"]},{"id":35,"insight_type":"prediction","content":"万科2021年年报中，郁亮明确承诺'2022年将实现营业收入和净利润企稳回升'，然而2022年净利润实际仅增长0.4%（几乎持平），同期百强房企销售额暴跌42%，行业陷入有统计数据以来最大跌幅的危机。这一承诺的落空，揭示出管理层在2021年底对市场形势的严重误判，而彼时万科存货跌价准备余额仅51.4亿元，尚属可控，管理层的乐观预期并非毫无依据，但恰恰错判了2022年政策紧缩叠加信心崩塌的非线性冲击。","created_at":"2026-05-19 23:34:28","excerpts":[{"date":"2021","from":"万科年报·郁亮","text":"2022年将实现营业收入和净利润企稳回升"},{"date":"2022","from":"万科年报","text":"百强房企销售额同比下降42%，净利润同比增长0.4%"},{"date":"2022","from":"万科存货数据","text":"新增存货跌价准备4.5亿元，余额51.4亿元"}],"files":["2026-04-17.md","2026-04-14.md"]},{"id":36,"insight_type":"trend","content":"万科存货跌价准备从2022年到2025年呈现急剧加速恶化的趋势：新增计提金额分别为4.5亿元（2022年）、34.9亿元（2023年）、70.6亿元（2024年）、208.3亿元（2025年），四年累计跌价准备余额从51.4亿元膨胀至266.4亿元，增幅超过5倍。这一轨迹表明房地产市场的价格下行并非线性，而是在政策托底效果有限的背景下持续深化，万科资产质量的实质性恶化远超2022年管理层的预判。","created_at":"2026-05-19 23:34:28","excerpts":[{"date":"2022","from":"万科存货数据","text":"新增跌价准备4.5亿元，余额51.4亿元"},{"date":"2023","from":"万科存货数据","text":"新增跌价准备34.9亿元，余额79.9亿元"},{"date":"2024","from":"万科存货数据","text":"新增跌价准备70.6亿元，余额115.7亿元"},{"date":"2025","from":"万科存货数据","text":"新增跌价准备208.3亿元，余额266.4亿元"}],"files":["2026-04-14.md"]},{"id":38,"insight_type":"inconsistency","content":"王石在2009年成为全球最大住宅公司之际，主动发出警示：'住宅市场是经济发展缩影，规模扩张不值得如痴如醉'。然而万科此后并未收手——2013年致股东信以'全世界最大的房地产开发企业'为荣，并以此为背书强调坚守主业的正确性。直至2021年，郁亮才在利润暴跌45.7%后坦承'未能摆脱高增长惯性'、'土地投资追高冒进'。王石的预警与公司实际路径之间横跨十余年的落差，是一个典型的内部警示被组织惯性淹没的案例。","created_at":"2026-05-19 23:34:28","excerpts":[{"date":"2009","from":"万科年报·王石","text":"规模扩张不值得如痴如醉，真实需求才是本原动力"},{"date":"2013","from":"万科年报","text":"万科已成为全世界最大的房地产开发企业"},{"date":"2021","from":"万科年报·郁亮","text":"净利润下降源于投资追高冒进，未能摆脱高增长惯性"}],"files":["2026-04-17.md"]},{"id":39,"insight_type":"evolution","content":"雅戈尔的多品牌战略经历了从雄心勃勃到承认失败的完整弧线：2022年构建六品牌矩阵并投入20亿建设时尚体验馆，2021年李如成已坦承'多品牌战略执行失败——品牌沦为品类，此消彼长无增长'，并对多元化经营的可持续性提出根本质疑。2023年业绩不及预期，同年首次公开提出创业团队传承迫在眉睫。2024年彻底退出经营三十多年的地产业务，全力转向时尚产业，但引进品牌尚未产生效益。这一演变呈现出典型的'战略认知滞后于战略行动'的创始人企业路径依赖。","created_at":"2026-05-19 23:34:28","excerpts":[{"date":"2021","from":"雅戈尔年报·李如成","text":"多品牌战略失败——品牌沦为品类，此消彼长无增长"},{"date":"2022","from":"雅戈尔年报·李如成","text":"投入20亿建时尚体验馆，开始收缩房产开发投入"},{"date":"2023","from":"雅戈尔年报·李如成","text":"创业团队传承问题迫在眉睫，新老更替纳入制度性工作"},{"date":"2024","from":"雅戈尔年报·李如成","text":"退出运营三十多年的地产行业，引进品牌尚未产生效益"}],"files":["2026-04-16.md","2026-04-09.md"]},{"id":40,"insight_type":"connection","content":"万科与雅戈尔在地产与主业之间的战略取舍形成鲜明对照：雅戈尔作为以服装为主业的多元化企业，在感知到地产风险后于2022年启动收缩、2024年彻底清退，成功实现业务切割；万科作为专业房企，在2022年宣告住宅开发主导模式'不可逆转地终结'后，却因深度绑定而无法退出，只能以'开发、经营、服务并重'作为渐进转型路径，存货持续减值、现金压力持续累积。多元化企业在地产危机中反而拥有更灵活的退出能力，而专业化企业则被锁定其中——这对'专注主业必然优于多元化'的经典论断构成反例。","created_at":"2026-05-19 23:34:28","excerpts":[{"date":"2022","from":"万科年报","text":"未来行业无法再回到对住宅开发过于依赖的往日时光"},{"date":"2022","from":"雅戈尔年报·李如成","text":"及时收缩房产开发投入，严防房地产风险"},{"date":"2024","from":"雅戈尔年报·李如成","text":"2024年退出运营三十多年的地产行业，全力投入时尚产业"}],"files":["2026-04-17.md","2026-04-16.md","2026-04-09.md"]},{"id":28,"insight_type":"prediction","content":"郁亮在2021年年报中承诺'2022年将实现营业收入和净利润企稳回升'，但该预测未能兑现——2022年净利润仅微增0.4%，此后持续恶化。更早在2013年，万科致股东信对'傲慢与盲动'的双重警示，与后续公司因投资追高冒进而陷入危机形成历史性反讽。这两处预测均指向管理层对行业周期判断的系统性偏差。","created_at":"2026-05-19 23:28:31","excerpts":[{"date":"2021","from":"万科致股东信","text":"2022年将实现营业收入和净利润企稳回升（后续数据证明未能兑现）"},{"date":"2013","from":"万科致股东信","text":"因以往成功滋生的傲慢危险，但反应过度的盲动同样危险"},{"date":"2021","from":"万科致股东信","text":"净利润下降主要源于投资追高冒进，管理层承认未能摆脱高增长惯性"}],"files":["2026-04-17.md"]},{"id":29,"insight_type":"trend","content":"万科存货跌价准备呈现加速恶化态势：2022年新增计提仅4.5亿元，2023年跃升至34.9亿元，2024年扩大至70.6亿元，2025年暴增至208.3亿元——四年间新增计提规模增长约46倍。累计跌价准备从2022年的51.4亿元增至2025年的266.4亿元。这一加速曲线揭示房地产下行对万科资产质量的冲击远未触底，尤其2025年单年计提已超过此前三年总和，资产减值压力正在加剧。","created_at":"2026-05-19 23:28:31","excerpts":[{"date":"2022","from":"万科存货数据","text":"新增存货跌价准备4.5亿元，累计余额51.4亿元"},{"date":"2023","from":"万科存货数据","text":"新增计提跌价准备34.9亿元，累计余额79.9亿元"},{"date":"2024","from":"万科存货数据","text":"新增计提存货跌价准备70.6亿元，累计余额115.7亿元"},{"date":"2025","from":"万科存货数据","text":"新增计提跌价准备208.3亿元，累计跌价准备余额266.4亿元"}],"files":["2026-04-14.md"]},{"id":30,"insight_type":"trend","content":"万科存货规模自2022年起连续大幅收缩：2022年末9070.6亿元，2023年末7017亿元（降22.6%），2024年末5190.1亿元（降26%），2025年末3737.4亿元（降28%），三年间总规模缩水约59%。与此同时，已完工现房占比从2022年的10.8%升至2025年的30.6%，去化压力持续积聚。对比2001年土地储备980万平方米时的积极扩张期，万科的收缩幅度印证了行业格局的历史性逆转。","created_at":"2026-05-19 23:28:31","excerpts":[{"date":"2022","from":"万科存货数据","text":"存货9070.6亿元，已完工现房占比10.8%"},{"date":"2023","from":"万科存货数据","text":"存货7017亿元，同比下降22.6%"},{"date":"2025","from":"万科存货数据","text":"存货3737.4亿元，已完工现房占比30.6%，同比下降28%"}],"files":["2026-04-14.md"]},{"id":31,"insight_type":"connection","content":"万科与雅戈尔在'专业化vs多元化'的战略选择上走出了截然不同却又相互呼应的路径：万科2001年将万佳百货股权转让给华润退出零售业，完成专业化转型，全力押注房地产；雅戈尔则在2024年退出运营了三十多年的地产行业，转向时尚产业。两家公司相隔约二十年先后完成了向对方曾放弃领域的相向而行——万科当年退出零售聚焦地产，而雅戈尔今日退出地产聚焦消费品牌。这一历史对照揭示了企业战略专业化选择与行业周期之间的深层张力。","created_at":"2026-05-19 23:28:31","excerpts":[{"date":"2001","from":"万科年报","text":"将万佳百货72%股份转让给中国华润总公司，正式成为专一的房地产公司"},{"date":"2024","from":"雅戈尔致股东信","text":"2024年退出运营三十多年的地产行业，全力投入时尚产业"}],"files":["2026-04-10.md","2026-04-09.md"]},{"id":32,"insight_type":"inconsistency","content":"雅戈尔2021年报中李如成坦承多品牌战略执行失败——'品牌沦为品类，此消彼长无增长'，并对多元化经营的可持续性提出根本性质疑；然而仅隔一年，2022年公司不仅未收缩品牌，反而将品牌矩阵从既有格局扩展至六个品牌（雅戈尔、MAYOR、HSM、HANP、UND、HH），并投资20亿元建设时尚体验馆。承认失败后仍加码同类策略，反映雅戈尔在战略执行层面存在认知与行动的内在矛盾。","created_at":"2026-05-19 23:28:31","excerpts":[{"date":"2021","from":"雅戈尔致股东信","text":"多品牌战略执行失败——品牌沦为品类，此消彼长无增长"},{"date":"2022","from":"雅戈尔致股东信","text":"构建多层次品牌矩阵：MAYOR、HSM、HANP、UND、HH六品牌，投资20亿建时尚体验馆"}],"files":["2026-04-16.md"]},{"id":33,"insight_type":"evolution","content":"万科用二十年完成了从'专业化'到'被迫多元化'的完整历史循环：2001年出售万佳百货完成专业化转型，2003年进入全国化高速扩张期，2013年旗帜鲜明地反对多元化并视城镇化为长期红利，2021年因开发业务净利润暴跌45.7%而启动四大业务转型，2022年宣布住宅开发主导模式'不可逆转地终结'。这一演变轨迹表明，万科的战略转向并非主动选择，而是被行业拐点倒逼的结果，与2013年信中所强调的'坚守主业'形成根本性断裂。","created_at":"2026-05-19 23:28:31","excerpts":[{"date":"2001","from":"万科年报","text":"转让万佳股权退出零售业，专业化战略调整顺利完成"},{"date":"2013","from":"万科致股东信","text":"专业化是万科成立以来一直追求的方向，坚守房地产主业"},{"date":"2021","from":"万科致股东信","text":"净利润同比-45.7%，确定四大转型方向"},{"date":"2022","from":"万科致股东信","text":"未来行业无法再回到对住宅开发过于依赖的往日时光"}],"files":["2026-04-17.md","2026-04-15.md","2026-04-10.md","2026-04-09.md"]},{"id":34,"insight_type":"evolution","content":"雅戈尔在2021-2024年间完成了一次有序但痛苦的战略收缩：2021年反思多元化失败并提出'有所取舍'，2022年收缩房产开发投入防范风险，2023年业绩不及预期且创始人公开表示传承问题迫在眉睫，2024年彻底退出地产行业但新引进品牌尚未产生效益。整个过程呈现'旧业务已退出、新业务未盈利'的战略真空期，且管理层传承尚未完成，公司面临方向转型与代际交替的双重压力叠加。","created_at":"2026-05-19 23:28:31","excerpts":[{"date":"2021","from":"雅戈尔致股东信","text":"提出多产业经营需'有所取舍'，预示后续战略收缩"},{"date":"2022","from":"雅戈尔致股东信","text":"及时收缩房产开发投入，严防房地产风险"},{"date":"2023","from":"雅戈尔致股东信","text":"创业团队传承问题迫在眉睫，新老更替纳入制度性工作"},{"date":"2024","from":"雅戈尔致股东信","text":"退出运营三十多年的地产行业，引进品牌尚未产生效益"}],"files":["2026-04-16.md","2026-04-09.md"]},{"id":20,"insight_type":"trend","content":"万科存货跌价准备呈指数级恶化：2022年新增计提4.5亿元，2023年激增至34.9亿元，2024年翻倍至70.6亿元，2025年更飙升至208.3亿元，四年间单年计提规模扩大46倍。累计跌价准备余额从51.4亿元攀升至266.4亿元，占存货比例从0.57%升至7.1%。这一加速恶化的趋势表明，房地产市场下行对万科资产价值的冲击远未见底，且每一年的减值幅度都超出前一年的预期。","created_at":"2026-05-19 23:12:04","excerpts":[{"date":"2022","from":"万科年报","text":"新增存货跌价准备4.5亿元"},{"date":"2023","from":"万科年报","text":"新增计提存货跌价准备34.9亿元"},{"date":"2024","from":"万科年报","text":"新增计提存货跌价准备70.6亿元"},{"date":"2025","from":"万科年报","text":"新增计提存货跌价准备208.3亿元"}],"files":["2026-04-14.md"]},{"id":21,"insight_type":"prediction","content":"郁亮在万科2021年报中明确承诺'2022年将实现营业收入和净利润企稳回升'，但后续事实证明这一预测未能兑现。2021年净利润已同比下降45.7%，而此后万科存货持续大幅缩减（从9070亿降至3737亿），跌价准备累计达266亿元，经营状况持续恶化而非企稳。管理层对市场底部的判断再次过于乐观，与其自我批评的'市场判断过于乐观'形成讽刺性的自我印证。","created_at":"2026-05-19 23:12:04","excerpts":[{"date":"2021","from":"万科年报","text":"2022年将实现营收和净利润企稳回升"},{"date":"2021","from":"万科年报","text":"市场判断过于乐观"},{"date":"2022","from":"万科年报","text":"百强房企销售额同比下降42%"}],"files":["2026-04-17.md","2026-04-14.md"]},{"id":24,"insight_type":"inconsistency","content":"万科管理层在2021和2022年连续两年致股东信中承认'投资追高冒进'和'操盘离散度过大'，声称'正在逐步解决'，但后续三年存货跌价准备从51亿元暴增至266亿元，表明这些问题的后果远未消化完毕。管理层的措辞从2021年的'承认错误、承诺企稳'转变为2022年的'赚小钱、长钱、辛苦钱'，语气明显更为悲观和保守，但实际资产减值的加速度远超措辞调整的幅度。","created_at":"2026-05-19 23:12:04","excerpts":[{"date":"2021","from":"万科年报","text":"土地投资追高冒进、市场判断过于乐观"},{"date":"2022","from":"万科年报","text":"投资追高冒进问题正在逐步解决"},{"date":"2022","from":"万科年报","text":"赚小钱、长钱、辛苦钱"},{"date":"2025","from":"万科年报","text":"新增计提存货跌价准备208.3亿元"}],"files":["2026-04-17.md","2026-04-14.md"]},{"id":25,"insight_type":"evolution","content":"雅戈尔李如成的战略反思呈现清晰的递进轨迹：2021年坦承多品牌战略失败（'品牌沦为品类，此消彼长无增长'），2022年重新确立世界级时尚集团目标并开始收缩地产，2023年首次公开面对创业团队传承问题，2024年彻底退出地产。这一四年演进显示李如成在75岁前后（创业45周年）完成了从多元化扩张到聚焦收缩的认知转变，但'引进品牌尚未产生效益'意味着这场转型的成败仍悬而未决。","created_at":"2026-05-19 23:12:04","excerpts":[{"date":"2021","from":"雅戈尔年报","text":"多品牌实质上未带来增长"},{"date":"2022","from":"雅戈尔年报","text":"建设世界级时尚集团为主要目标"},{"date":"2023","from":"雅戈尔年报","text":"创业团队传承问题迫在眉睫"},{"date":"2024","from":"雅戈尔年报","text":"退出地产，引进品牌尚未产生效益"}],"files":["2026-04-16.md","2026-04-09.md"]},{"id":26,"insight_type":"prediction","content":"万科2003年王石预判'土地招拍挂和银行禁止土地贷款将利好品牌企业'，这在短期内确实得到验证——万科随后实现了近二十年的高速增长。然而从更长周期看，正是这种品牌优势带来的扩张信心，最终导致了郁亮2021年承认的'高增长惯性'和'投资追高冒进'。王石时代建立的竞争优势逻辑，在郁亮时代演变为战略陷阱。","created_at":"2026-05-19 23:12:04","excerpts":[{"date":"2003","from":"万科年报","text":"土地招拍挂将利好有实力的品牌企业"},{"date":"2021","from":"万科年报","text":"未能摆脱高增长惯性"},{"date":"2021","from":"万科年报","text":"土地投资追高冒进"}],"files":["2026-04-15.md","2026-04-17.md"]},{"id":14,"insight_type":"trend","content":"万科存货跌价准备呈指数级恶化：2022年新增计提4.5亿元，2023年升至34.9亿元，2024年翻倍至70.6亿元，2025年猛增至208.3亿元——四年间新增计提规模扩大了46倍。累计跌价准备余额从51.4亿元飙升至266.4亿元，反映房地产市场下行对万科资产价值的冲击在加速而非趋缓。这与2003年王石所描述的'高速增长期'形成鲜明的历史反转。","created_at":"2026-05-19 23:06:00","excerpts":[{"date":"2003","from":"万科年报","text":"房地产业务进入高速增长期，增速均约40%"},{"date":"2022","from":"万科年报","text":"新增存货跌价准备4.5亿元"},{"date":"2023","from":"万科年报","text":"新增计提存货跌价准备34.9亿元"},{"date":"2024","from":"万科年报","text":"新增计提存货跌价准备70.6亿元"},{"date":"2025","from":"万科年报","text":"新增计提存货跌价准备208.3亿元"}],"files":["2026-04-15.md","2026-04-14.md"]},{"id":18,"insight_type":"prediction","content":"万科2003年王石预判'土地招拍挂和银行禁止土地贷款将利好有实力的品牌企业'，且'大量新资金和区域开发商全国化导致竞争更趋激烈'。前半部分在中短期内得到验证——万科确实在2001-2003年的规范化浪潮中获益，全国化扩张成功。但从20年维度看，这一判断存在盲区：品牌企业的规模优势在行业系统性下行时无法提供保护，万科2025年仍需面对208亿元的巨额减值。","created_at":"2026-05-19 23:06:00","excerpts":[{"date":"2003","from":"万科年报","text":"土地招拍挂将利好有实力的品牌企业"},{"date":"2002","from":"万科年报","text":"政府加强监管将利好品牌领先企业"},{"date":"2025","from":"万科年报","text":"新增计提跌价准备208.3亿元"}],"files":["2026-04-15.md","2026-04-09.md","2026-04-14.md"]},{"id":19,"insight_type":"connection","content":"万科2001年转让万佳百货完成专业化转型，被视为战略聚焦的成功典范——此后扣非净利润增长104%，全国化扩张顺利推进。而雅戈尔2021年反思多元化、2024年退出地产聚焦时尚，本质上也是专业化收缩。两家公司在不同时代做出相似的战略选择，但万科的专业化聚焦房地产在行业上升期是正确答案，在下行期却成为枷锁；雅戈尔的专业化聚焦时尚能否成功，同样取决于行业周期，而李如成自己也承认'大环境对时尚经济带来挑战'。","created_at":"2026-05-19 23:06:00","excerpts":[{"date":"2001","from":"万科年报","text":"转让万佳股权退出零售业，专业化调整完成"},{"date":"2002","from":"万科年报","text":"专业化调整后扣非净利润增长104%"},{"date":"2021","from":"雅戈尔年报","text":"多产业经营需有所取舍"},{"date":"2024","from":"雅戈尔年报","text":"大环境对时尚经济带来挑战"}],"files":["2026-04-09.md","2026-04-16.md"]},{"id":9,"insight_type":"trend","content":"万科存货从2022年的9070.6亿元持续下降至2025年的3737.4亿元，四年间缩减近60%，但更值得关注的是存货跌价准备的加速恶化：2022年新增计提仅4.5亿元，2023年升至34.9亿元，2024年跃升至70.6亿元，2025年更是飙升至208.3亿元。跌价准备余额占存货比例从2022年的0.57%急剧攀升至2025年的7.1%，表明资产质量恶化速度远超去库存速度，市场下行对存量资产的冲击正在加速而非收敛。","created_at":"2026-05-19 22:42:03","excerpts":[{"date":"2022","from":"万科年报","text":"新增计提存货跌价准备4.5亿元"},{"date":"2023","from":"万科年报","text":"新增计提存货跌价准备34.9亿元"},{"date":"2024","from":"万科年报","text":"新增存货跌价准备70.6亿元"},{"date":"2025","from":"万科年报","text":"新增存货跌价准备208.3亿元"}],"files":["2026-04-14.md"]},{"id":10,"insight_type":"evolution","content":"万科的历史轨迹呈现出一个完整的扩张-收缩周期。2001年王石在年报中积极推进全国化扩张，新进入四个城市，土地储备达980万平方米，预判'地产行业仍将保持向上势头'；2002年进一步向珠三角和长三角区域集约化发展，扣非净利润增长104%。然而二十余年后，万科存货从2022年的9070亿元骤降至2025年的3737亿元，累计跌价准备266.4亿元，从曾经的激进扩张者变为被迫大幅收缩的防守者。这一历史性反转揭示了房地产行业长周期的残酷性——当年支撑高速增长的土地储备逻辑，在下行周期中恰恰成为最大的风险敞口。","created_at":"2026-05-19 22:42:03","excerpts":[{"date":"2001","from":"万科年报-王石","text":"土地储备达980万平方米"},{"date":"2002","from":"万科年报-王石","text":"扣非净利润同比增长104%"},{"date":"2023","from":"万科年报","text":"从扩张期进入收缩调整期"},{"date":"2025","from":"万科年报","text":"新增存货跌价准备208.3亿元"}],"files":["2026-04-14.md","2026-04-09.md"]},{"id":11,"insight_type":"trend","content":"万科已完工现房占存货比例的变化揭示了去化困境的加深：2022年已完工现房占比仅10.8%（980.7亿元），2023年为15.4%（1077.4亿元），2024年升至23.9%（1239.1亿元），2025年进一步攀升至30.6%（1144.5亿元）。尽管绝对金额在2025年有所下降，但占比持续走高，说明在建项目竣工后无法顺利销售，大量转化为现房库存，去化速度跟不上竣工速度，形成'堰塞湖'效应。","created_at":"2026-05-19 22:42:03","excerpts":[{"date":"2022","from":"万科年报","text":"已完工现房980.7亿元占比10.8%"},{"date":"2024","from":"万科年报","text":"已完工现房1239.1亿元占比23.9%"},{"date":"2025","from":"万科年报","text":"已完工现房1144.5亿元占比30.6%"}],"files":["2026-04-14.md"]},{"id":12,"insight_type":"connection","content":"雅戈尔2024年退出运营三十多年的地产业务，与万科同期面临的巨额存货减值形成行业性共振。万科2024-2025年新增计提跌价准备分别为70.6亿和208.3亿元，连行业龙头都面临如此严峻的资产减值压力，非地产主业的雅戈尔选择彻底退出房地产、转向时尚产业，某种程度上是对行业前景的'用脚投票'。两家公司的不同选择——万科被动承受减值、雅戈尔主动止损退出——反映了房地产下行周期中企业根据自身禀赋做出的差异化应对策略。","created_at":"2026-05-19 22:42:03","excerpts":[{"date":"2024","from":"雅戈尔年报-李如成","text":"退出运营三十多年的地产行业"},{"date":"2024","from":"万科年报","text":"新增计提存货跌价准备70.6亿元"},{"date":"2025","from":"万科年报","text":"新增存货跌价准备208.3亿元"}],"files":["2026-04-14.md","2026-04-09.md"]},{"id":13,"insight_type":"prediction","content":"王石在2001年年报中预判'2002年地产行业仍将保持向上势头'，2002年万科确实实现了扣非净利润104%的增长，短期预测得到验证。但王石同期提出的'区域集约化发展'和'品牌领先企业将受益于政府加强监管'的判断，在二十余年后的行业下行期面临严峻考验——即便万科已是行业最具品牌影响力的企业之一，2025年仍不得不计提208.3亿元跌价准备，说明品牌优势在系统性行业风险面前的防御力有限。","created_at":"2026-05-19 22:42:03","excerpts":[{"date":"2001","from":"万科年报-王石","text":"地产行业仍将保持向上势头"},{"date":"2002","from":"万科年报-王石","text":"政府加强监管将利好品牌领先企业"},{"date":"2025","from":"万科年报","text":"新增存货跌价准备208.3亿元"}],"files":["2026-04-14.md","2026-04-09.md"]},{"id":5,"insight_type":"evolution","content":"万科从2001年专业化转型全面聚焦房地产，到2022年存货跌价准备累计51.4亿元、存货同比下降15.7%，呈现出完整的行业周期弧线。2001-2002年万科营收从44.55亿元增至45.7亿元，扣非净利润同比增长104%，王石在年报中判断'地产行业仍将保持向上势头'。二十年后的2022年，万科存货从上年大幅缩减15.7%，新增计提跌价准备4.5亿元，已完工现房980.7亿元面临去化压力，行业从上升期进入深度调整期。这一对比揭示了中国房地产行业从黄金时代到下行周期的完整演变。","created_at":"2026-05-19 22:37:40","excerpts":[{"date":"2022","from":"万科年报","text":"存货同比下降15.7%，跌价准备余额51.4亿元"},{"date":"2001","from":"万科年报","text":"营收增长17.74%，净利润增长25.99%"},{"date":"2002","from":"万科年报","text":"扣非净利润同比增长104%"},{"date":"2001","from":"万科年报（王石）","text":"2002年地产行业仍将保持向上势头"}],"files":["2026-04-14.md","2026-04-10.md","2026-04-09.md"]},{"id":7,"insight_type":"trend","content":"万科2001年总资产仅64.38亿元，待开发占地面积980万平方米；到2022年，仅存货一项即达9070.6亿元，规模膨胀超过140倍。然而2001年万科净利润增速达25.99%、扣非净利润增长104%，处于高质量扩张期；2022年却需计提51.4亿元存货跌价准备，存货规模主动收缩15.7%。规模的急剧膨胀与后期的被迫收缩，反映出房地产行业高杠杆扩张模式的内在脆弱性。","created_at":"2026-05-19 22:37:40","excerpts":[{"date":"2001","from":"万科年报","text":"总资产64.38亿元"},{"date":"2002","from":"万科年报","text":"结算面积同比增长62.3%"},{"date":"2022","from":"万科年报","text":"存货9070.6亿元，同比下降15.7%"}],"files":["2026-04-10.md","2026-04-09.md","2026-04-14.md"]},{"id":8,"insight_type":"prediction","content":"王石在万科2002年年报中预判'土地出让方式变化将利好品牌领先企业'、'集约化调整成为行业趋势'，这一判断在短期内得到验证——万科此后确实凭借品牌和管理优势快速扩张。但从2022年数据看，即便是行业龙头万科也面临存货跌价、去化压力，品牌领先并未能完全抵御行业系统性下行风险，早期的乐观预判需要加入周期维度的修正。","created_at":"2026-05-19 22:37:40","excerpts":[{"date":"2002","from":"万科年报（王石）","text":"政府加强监管将利好品牌领先企业"},{"date":"2022","from":"万科年报","text":"已完工现房980.7亿元，存在去化压力"}],"files":["2026-04-09.md","2026-04-14.md"]},{"id":1,"insight_type":"connection","content":"万科与雅戈尔在房地产行业上形成了完美的镜像轨迹：2001年万科转让万佳百货股权退出零售业，全面聚焦房地产，开启了长达二十余年的地产黄金时代；而雅戈尔在2024年退出运营三十多年的地产行业，全力投入时尚产业。两家公司在不同时间节点做出了方向相反的战略选择——万科在行业上升期全力进入，雅戈尔在行业下行期果断退出。这反映了中国房地产行业从朝阳产业到深度调整的完整周期。","created_at":"2026-05-19 22:32:47","excerpts":[{"date":"2001","from":"万科年报","text":"转让万佳股权退出零售业，专业化战略调整顺利完成"},{"date":"2001","from":"万科年报","text":"2002年地产行业仍将保持向上势头"},{"date":"2024","from":"雅戈尔年报","text":"退出运营三十多年的地产行业，全力投入时尚产业"}],"files":["2026-04-10.md","2026-04-09.md"]},{"id":2,"insight_type":"evolution","content":"万科2001-2002年的全国化扩张战略经历了清晰的演进：2001年王石提出积极扩张，一年内新进入武汉、南京、长春、南昌四个城市，土地储备达980万平方米；但到2002年，战略方向已从单城市扩张转向珠三角和长三角的区域集约化发展，待开发项目资源反而缩减至706万平方米。这表明万科在快速扩张后迅速意识到摊子铺太大的风险，从追求城市数量转向追求区域深耕质量，体现了早期万科务实的战略纠偏能力。","created_at":"2026-05-19 22:32:47","excerpts":[{"date":"2001","from":"万科年报","text":"成功进入武汉、南京、长春、南昌四个新城市"},{"date":"2001","from":"万科年报","text":"待开发占地面积980万平方米"},{"date":"2002","from":"万科年报","text":"战略方向转向区域集约化发展模式"},{"date":"2002","from":"万科年报","text":"待开发项目资源706万平方米"}],"files":["2026-04-09.md"]},{"id":3,"insight_type":"prediction","content":"王石在2001年年报中预测'2002年地产行业仍将保持向上势头，集约化调整成为行业趋势'，2002年实际业绩验证了这一判断：万科结算面积同比增长62.3%，结算净利润增长68.5%，扣非净利润增长104%。同时战略上确实转向区域集约化，与预判完全一致。但值得注意的是，营收仅增长2.7%、净利润仅增长2.3%，这与结算指标的大幅增长存在时间差，说明高增长主要来自前期项目集中交付，而非当年新增销售的即时贡献。","created_at":"2026-05-19 22:32:47","excerpts":[{"date":"2001","from":"万科年报","text":"2002年地产行业仍将保持向上势头"},{"date":"2002","from":"万科年报","text":"扣非净利润同比增长104%"},{"date":"2002","from":"万科年报","text":"营收同比增长2.7%，净利润同比增长2.3%"}],"files":["2026-04-09.md"]},{"id":4,"insight_type":"connection","content":"万科2001年专业化转型的核心交易——将万佳百货72%股权转让给中国华润总公司——揭示了万科与华润之间远非简单的股东关系。华润既是万科第一大股东（合计持股约15.08%），又是万科剥离资产的接盘方。这种'大股东接盘非核心资产'的安排，使万科得以顺利完成专业化转型，同时也加深了双方的利益绑定。华润通过直接持股和关联公司代持两个渠道控制万科股权，架构已颇为复杂。","created_at":"2026-05-19 22:32:47","excerpts":[{"date":"2001","from":"万科年报","text":"将万佳百货72%股份转让给中国华润总公司"},{"date":"2001","from":"万科年报","text":"华润系合计控制万科约15%股权"},{"date":"2001","from":"万科年报","text":"华润北京置地代持B股2.71%"}],"files":["2026-04-10.md"]}],"qaRecords":[{"id":9,"question":"单伟建有哪些关键的思考和观点洞察？","answer":"**单伟建**（太盟投资集团PAG执行董事长，管理资产超550亿美元）2026年4月在中欧商学院分享的核心观点：\n\n### 1. 中国科技创新地位\n- 中国和美国是全球**仅有的两个**同时具备科技创新五大条件的国家：人才（STEM毕业生年均超500万）、高校、资本、制造力（制造业增加值占全球30%）、统一大市场\n\n### 2. 经济增长模式转型\n- 中国必须从出口投资驱动**转向消费驱动**\n- 居民存款超160万亿元，超过GDP（140万亿元），释放5-10%即可显著拉动增长\n- 2023年GDP增长中消费贡献82.5%，增长质量高于2025年\n- 5%的GDP增长目标一定能达到，且应定得更高\n\n### 3. 房地产判断\n- 房地产市场**基本见底**——全国出租收益率约2.8%，已高于国债收益率1.8%\n\n### 4. 投资策略\n- **聚焦消费领域头部企业，不投制造业和出口企业**\n- 典型案例：联合投资万达商管（持股60%），出租率97%以上，税后净利润80亿元\n\n### 5. 企业出海警示\n- 对中国企业出海持**严重保留态度**，地缘政治风险巨大\n- 中港澳海外净资产头寸至少5.5万亿美元，面临政治不确定性\n\n### 6. 政府财政与制度观\n- 中国是全球主要大国中**唯一政府净资产为正**的国家\n- 中国制度是在解决具体危机中渐进建立的，而非事先设计的蓝图（《通往现代之路》核心论断）\n\n---\n\n**总结**：单伟建的思考框架——看多中国长期潜力、看准消费转型方向、警惕海外地缘风险。","created_at":"2026-05-21 13:00:39","sources":[]}]};
var tab='passages',query='',page=1,PER=15;
marked.setOptions({breaks:true,gfm:true});

var typeLabels={inconsistency:'不一致性',trend:'趋势变化',connection:'关联发现',evolution:'公司演变',prediction:'预测验证'};

function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

function md(s){
  if(!s)return '';
  try{return marked.parse(s)}catch(e){return esc(s)}
}

function escRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}

function hi(s,asMarkdown){
  if(!s)return '';
  var html=asMarkdown?md(s):esc(s);
  if(!query)return html;
  var terms=query.split(/\s+/).filter(Boolean);
  for(var i=0;i<terms.length;i++){
    var r=new RegExp('('+escRe(terms[i])+')','gi');
    html=html.replace(r,'<span class="highlight">$1</span>');
  }
  return html;
}

function match(item){
  if(!query)return true;
  var terms=query.toLowerCase().split(/\s+/).filter(Boolean);
  var fields;
  if(tab==='passages'){
    fields=[item.original_text,item.context_brief,item.importance_reason,item.file_date];
  }else if(tab==='insights'){
    fields=[item.content,typeLabels[item.insight_type]];
  }else{
    fields=[item.question,item.answer];
  }
  var all=fields.map(function(f){return(f||'').toLowerCase()}).join(' ');
  return terms.every(function(t){return all.includes(t)});
}

function getFiltered(){return DATA[tab].filter(match)}

function scoreClass(v){
  var p=Math.round((v||0)*100);
  if(p>=70)return 'score-high';
  if(p>=50)return 'score-mid';
  return 'score-low';
}

function renderPassage(p){
  var sc=Math.round((p.importance_score||0)*100);
  return '<div class="card">'
    +'<div class="card-meta"><span class="date">'+(p.file_date||p.file_name)+' #'+p.piece_index+'</span>'
    +'<span class="score '+scoreClass(p.importance_score)+'">'+sc+'</span></div>'
    +(p.context_brief?'<div class="context">'+hi(p.context_brief)+'</div>':'')
    +'<div class="passage-text">'+hi(p.original_text,true)+'</div>'
    +(p.importance_reason?'<div class="reason">'+hi(p.importance_reason)+'</div>':'')
    +'</div>';
}

function renderInsight(ins){
  var label=typeLabels[ins.insight_type]||ins.insight_type;
  var tc='t-'+(ins.insight_type||'connection');
  var html='<div class="card">'
    +'<span class="insight-type '+tc+'">'+esc(label)+'</span>'
    +'<div class="insight-text">'+hi(ins.content,true)+'</div>';
  var items=ins.excerpts||[];
  if(items.length>0){
    html+='<details class="sources"><summary>来源 ('+items.length+')</summary>';
    for(var i=0;i<items.length;i++){
      var s=items[i];
      html+='<div class="source-item"><span class="from">['+(s.date||'')+'] '+(s.from||'')+'</span><span class="text">'+esc(s.text||'')+'</span></div>';
    }
    html+='</details>';
  }else if(ins.files&&ins.files.length){
    html+='<div class="sources" style="margin-top:8px">来源: '+esc(ins.files.join(', '))+'</div>';
  }
  html+='</div>';
  return html;
}

function renderQa(qa){
  var html='<div class="card">'
    +'<div class="card-meta"><span class="date">'+esc(qa.created_at||'')+'</span></div>'
    +'<div class="qa-question">'+hi(qa.question)+'</div>'
    +'<div class="qa-answer">'+hi(qa.answer,true)+'</div>';
  var items=qa.sources||[];
  if(items.length>0){
    html+='<details class="sources"><summary>参考来源 ('+items.length+')</summary>';
    for(var i=0;i<items.length;i++){
      var s=items[i];
      html+='<div class="source-item"><span class="text">'+esc(typeof s==='string'?s:(s.text||JSON.stringify(s)))+'</span></div>';
    }
    html+='</details>';
  }
  html+='</div>';
  return html;
}

function render(){
  var items=getFiltered();
  var total=items.length;
  var pages=Math.max(1,Math.ceil(total/PER));
  if(page>pages)page=pages;
  var start=(page-1)*PER;
  var slice=items.slice(start,start+PER);
  var el=document.getElementById('list');

  if(slice.length===0){
    el.innerHTML='<div class="empty">'+(query?'未找到匹配结果':'暂无内容')+'</div>';
  }else{
    var fn=tab==='passages'?renderPassage:tab==='insights'?renderInsight:renderQa;
    el.innerHTML=slice.map(fn).join('');
  }

  // Pager
  var pg=document.getElementById('pager');
  if(pages<=1){pg.innerHTML='';return}

  var h='<button onclick="go(1)" '+(page===1?'disabled':'')+'>&#171;</button>';
  h+='<button onclick="go('+(page-1)+')" '+(page===1?'disabled':'')+'>&#8249;</button>';

  // Show max 7 page buttons
  var lo=Math.max(1,page-3),ph=Math.min(pages,page+3);
  if(ph-lo<6){if(lo===1)ph=Math.min(pages,7);else lo=Math.max(1,pages-6)}
  for(var i=lo;i<=ph;i++){
    h+='<button onclick="go('+i+')"'+(i===page?' class="active"':'')+'>'+i+'</button>';
  }

  h+='<button onclick="go('+(page+1)+')" '+(page===pages?'disabled':'')+'>&#8250;</button>';
  h+='<button onclick="go('+pages+')" '+(page===pages?'disabled':'')+'>&#187;</button>';
  h+='<span class="info">'+total+' 条</span>';
  pg.innerHTML=h;
}

function go(p){page=p;render();window.scrollTo(0,0)}

function switchTab(t,btn){
  tab=t;page=1;
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  render();
}

var searchTimer;
function onSearch(){
  clearTimeout(searchTimer);
  searchTimer=setTimeout(function(){
    query=document.getElementById('search').value.trim();
    page=1;
    render();
  },200);
}

function renderLatex(){
  if(typeof renderMathInElement==='function'){
    renderMathInElement(document.getElementById('list'),{
      delimiters:[
        {left:'$$',right:'$$',display:true},
        {left:'$',right:'$',display:false},
        {left:'\\(',right:'\\)',display:false},
        {left:'\\[',right:'\\]',display:true}
      ],
      throwOnError:false
    });
  }
}

var _origRender=render;
render=function(){_origRender();renderLatex()};

/* ===== TTS Module ===== */
var TTS = (function(){
  var synth = window.speechSynthesis;
  var state = 'idle'; // idle | playing | paused
  var sessionId = 0;
  var items = [];
  var total = 0;
  var idx = 0;        // index into items (global across all pages)
  var chunks = [];
  var chunkIdx = 0;
  var zhVoice = null;
  var wdog = null;
  var keepAlive = null;

  function pickVoice(){
    var v = synth.getVoices();
    for(var i=0;i<v.length;i++) if(v[i].lang==='zh-CN') return v[i];
    for(var i=0;i<v.length;i++) if(v[i].lang.indexOf('zh')===0) return v[i];
    return null;
  }
  zhVoice = pickVoice();
  if(synth.onvoiceschanged!==undefined) synth.onvoiceschanged=function(){zhVoice=pickVoice()};

  function plain(s){
    if(!s)return '';
    var d=document.createElement('div');
    try{d.innerHTML=marked.parse(s)}catch(e){d.textContent=s}
    return (d.textContent||'').trim();
  }

  function textOf(item){
    var p=[];
    if(tab==='passages'){
      if(item.context_brief) p.push(item.context_brief);
      p.push(item.original_text||'');
      if(item.importance_reason) p.push(item.importance_reason);
    }else if(tab==='insights'){
      var label=typeLabels[item.insight_type]||item.insight_type||'';
      if(label) p.push(label);
      p.push(item.content||'');
    }else{
      p.push(item.question||'');
      p.push(item.answer||'');
    }
    return p.map(plain).join('。');
  }

  function chunk(text){
    if(!text) return [];
    var MAX=120, res=[], buf='';
    var sents=text.split(/(?<=[。！？；\n])/);
    for(var i=0;i<sents.length;i++){
      var s=sents[i].trim();
      if(!s) continue;
      if(buf.length+s.length<=MAX){ buf+=s; continue; }
      if(buf) res.push(buf);
      if(s.length<=MAX){ buf=s; continue; }
      var sub=s.split(/(?<=[，、,；：])/), sb='';
      for(var j=0;j<sub.length;j++){
        if(sb.length+sub[j].length<=MAX){ sb+=sub[j]; }
        else{ if(sb) res.push(sb); sb=sub[j]; }
      }
      buf=sb;
    }
    if(buf) res.push(buf);
    return res.length?res:[text.slice(0,MAX)];
  }

  function clearHL(){
    document.querySelectorAll('.card.tts-speaking').forEach(function(c){c.classList.remove('tts-speaking')});
  }

  function highlight(){
    clearHL();
    var cards=document.querySelectorAll('#list .card');
    var local=idx-(page-1)*PER;
    if(local>=0&&local<cards.length){
      cards[local].classList.add('tts-speaking');
      cards[local].scrollIntoView({behavior:'smooth',block:'center'});
    }
  }

  function goPage(i){
    var tp=Math.floor(i/PER)+1;
    if(tp!==page){ page=tp; render(); }
  }

  function ui(){
    var ctrl=document.getElementById('ttsCtrl');
    if(state==='idle'){
      ctrl.innerHTML='<button onclick="ttsPlay()">&#9654; 播放</button><span class="tts-status" id="ttsStatus"></span>';
      clearHL();
    }else if(state==='playing'){
      ctrl.innerHTML='<button class="tts-playing" onclick="ttsPause()">&#10074;&#10074; 暂停</button><button class="tts-stop" onclick="ttsStopBtn()">&#9632; 停止</button><span class="tts-status" id="ttsStatus">'+(idx+1)+' / '+total+'</span>';
    }else{
      ctrl.innerHTML='<button onclick="ttsResume()">&#9654; 继续</button><button class="tts-stop" onclick="ttsStopBtn()">&#9632; 停止</button><span class="tts-status" id="ttsStatus">已暂停 '+(idx+1)+' / '+total+'</span>';
    }
  }

  function clearWdog(){ if(wdog){clearTimeout(wdog);wdog=null} }
  function startWdog(sid){
    clearWdog();
    wdog=setTimeout(function(){
      if(sessionId!==sid||state!=='playing') return;
      if(!synth.speaking&&!synth.pending) next(sid);
    },8000);
  }

  function next(sid){
    if(sid!==sessionId) return;
    clearWdog();
    // Chrome keep-alive
    if(!keepAlive) keepAlive=setInterval(function(){
      if(synth.speaking&&state==='playing'){synth.pause();synth.resume()}
    },10000);

    if(chunkIdx>=chunks.length){
      idx++;
      if(idx>=total){ stop(); return; }
      goPage(idx);
      highlight();
      chunks=chunk(textOf(items[idx]));
      chunkIdx=0;
      ui();
    }
    if(chunkIdx>=chunks.length){ next(sid); return; }

    var u=new SpeechSynthesisUtterance(chunks[chunkIdx]);
    u.lang='zh-CN'; u.rate=1.0;
    if(zhVoice) u.voice=zhVoice;
    u.onend=function(){ if(sid===sessionId){chunkIdx++;next(sid)} };
    u.onerror=function(e){ if(sid===sessionId&&e.error!=='canceled'&&e.error!=='interrupted'){chunkIdx++;next(sid)} };
    synth.speak(u);
    startWdog(sid);
  }

  function play(){
    synth.cancel();
    sessionId++;
    items=getFiltered();
    total=items.length;
    if(!total){ state='idle'; ui(); return; }
    // Start from first item on current page
    idx=(page-1)*PER;
    if(idx>=total) idx=0;
    goPage(idx);
    highlight();
    chunks=chunk(textOf(items[idx]));
    chunkIdx=0;
    state='playing';
    ui();
    next(sessionId);
  }

  function pause(){
    synth.pause(); state='paused'; clearWdog(); ui();
  }

  function resume(){
    synth.resume(); state='playing'; ui(); startWdog(sessionId);
  }

  function stop(){
    sessionId++; synth.cancel(); state='idle'; clearWdog();
    if(keepAlive){clearInterval(keepAlive);keepAlive=null}
    ui();
  }

  // When user manually jumps page during playback, reset to that page
  function onPageJump(){
    if(state==='idle') return;
    synth.cancel();
    var newIdx=(page-1)*PER;
    if(newIdx>=total){ stop(); return; }
    idx=newIdx;
    chunks=chunk(textOf(items[idx]));
    chunkIdx=0;
    highlight(); ui();
    if(state==='playing') next(sessionId);
  }

  return {play:play,pause:pause,resume:resume,stop:stop,onPageJump:onPageJump,
    getState:function(){return state}};
})();

function ttsPlay(){ TTS.play(); }
function ttsPause(){ TTS.pause(); }
function ttsResume(){ TTS.resume(); }
function ttsStopBtn(){ TTS.stop(); }

// Hook page navigation for manual jumps
var _origGo=go;
go=function(p){ _origGo(p); TTS.onPageJump(); };

// Stop TTS on tab switch or search
var _origSwitchTab=switchTab;
switchTab=function(t,btn){ TTS.stop(); _origSwitchTab(t,btn); };
var _origOnSearch=onSearch;
onSearch=function(){ TTS.stop(); _origOnSearch(); };

render();
</script>
</body>
</html>
