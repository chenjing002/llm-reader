":0.6,"importance_reason":"提供了万科专业化转型完成时的基础财务数据（总资产64.38亿、净资产31.24亿），可作为后续年份增长对比的基准。","context_brief":"万科2001年末的资产规模和组织架构概况。","file_date":"2026-04-10"},{"id":18,"file_name":"2026-04-10.md","piece_index":2,"original_text":"利润总额 520,011,132.06；净利润 382,421,274.06；扣除非经常性损益后的净利润 389,191,474.65；主营业务利润 885,939,077.30；营业利润 528,568,327.64；经营活动产生的现金流量净额 128,843,264.54；现金及现金等价物净增加额 382,024,149.11","importance_score":0.75,"importance_reason":"提供万科2002年关键财务数据，与历史背景中提到的净利润3.82亿元完全吻合（382,421,274.06元），且扣非净利润3.89亿元高于净利润，说明非经常性损益为负值（即扣除的是非经常性亏损），印证了历史背景中'扣非净利润同比增长104%'的说法——主营业务盈利能力确实强于表面净利润。","context_brief":"万科A 2002年度主要会计数据，包含利润、现金流等核心财务指标。","file_date":"2026-04-10"},{"id":19,"file_name":"2026-04-10.md","piece_index":2,"original_text":"非经常性收益总额 -6,770,200.59 元，明细如下：营业外收支净额 -2,754,318.76 元，股权投资差额摊销 -4,499,186.52 元，出售、处理部门或投资单位 -829,665.82 元，股票、股权投资收益 1,135,227.20 元","importance_score":0.65,"importance_reason":"非经常性损益为负值，意味着扣非净利润（3.89亿）反而高于净利润（3.82亿），说明万科在完成专业化转型（如转让万佳股权退出零售业）后，非经常性项目主要产生了损失（股权投资差额摊销449万为最大项），但主营房地产业务盈利质量扎实。投资收益为负580万元也与退出非地产业务的战略一致。","context_brief":"万科2002年非经常性损益明细，总额为负677万元。","file_date":"2026-04-10"},{"id":1,"file_name":"2026-04-09.md","piece_index":0,"original_text":"2024年是雅戈尔进入深度调整的年份，我们退出了运营三十多年的地产行业，全力投入时尚产业的发展，不断加强对雅戈尔品牌的投入与提升，同时对引进的品牌进行消化与拓展。尽管目前还没有产生效益，但我坚信，有志者事竟成。","importance_score":0.9,"importance_reason":"公司退出经营三十多年的地产行业，全面转向时尚产业，属于重大战略决策和商业模式根本性变化。同时坦承新业务尚未产生效益，信息量大。","context_brief":"雅戈尔2024年年报致股东信，董事长李如成阐述公司重大战略转型。","file_date":"2026-04-09"},{"id":2,"file_name":"2026-04-09.md","piece_index":0,"original_text":"2025年是雅戈尔承前启后的一年，我们将编制新的五年规划，继续坚持朝着时尚产业目标稳步前进，尽管当前大环境对时尚经济带来挑战，但我们坚信，只要努力，一往无前，我们定会克服当前的困难，走向成长的通道。","importance_score":0.7,"importance_reason":"前瞻性陈述，涉及新五年规划编制和时尚产业战略方向确认，同时承认宏观环境对时尚经济存在挑战。","context_brief":"董事长对2025年展望及未来五年规划方向。","file_date":"2026-04-09"},{"id":3,"file_name":"2026-04-09.md","piece_index":1,"original_text":"过去的一年，在全面完成专业化调整后，集团从房地产业务中获得了令人满意的回报，保持了业绩的持续稳定增长，实现营业收入人民币457,436万元，净利润人民币38,242万元，分别较上年增长 2.7% 和 2.3% ，每股盈利0.606元，亦较上年提升；扣除非经常性损益后的净利润同比增长达 104% 。","importance_score":0.9,"importance_reason":"包含关键财务数据：营收45.7亿元、净利润3.82亿元、EPS 0.606元，以及扣非净利润同比增长104%这一显著指标，反映专业化调整完成后盈利质量大幅提升。","context_brief":"万科A 2002年年报董事长致辞，王石总结全年业绩。","file_date":"2026-04-09"},{"id":4,"file_name":"2026-04-09.md","piece_index":1,"original_text":"过去的一年，是集团从2000年开始实施的市场扩张策略和业已形成的战略布局中获得预期良好回报的一年，房地产项目开发和销售取得快速增长，其结算面积、结算收入、结算净利润分别达112万平方米、44.2亿元和3.82亿元，较上年同期分别增长 62.3% 、 32.1% 和 68.5% 。集团在深圳、上海、北京、沈阳和成都的业务发展获得稳定回报，继续成为集团主要盈利来源；在2001年进入的武汉、南京、长春、南昌四个市场均取得理想业绩，为集团整体盈利作出重要贡献。","importance_score":0.85,"importance_reason":"展示了万科全国化扩张战略的阶段性成果，结算面积增长62.3%、净利润增长68.5%，且新进入城市已开始贡献利润，验证了跨区域扩张模式的可行性。","context_brief":"万科回顾2000年以来市场扩张策略的成果。","file_date":"2026-04-09"},{"id":5,"file_name":"2026-04-09.md","piece_index":1,"original_text":"期内，集团的发展策略主要是巩固和加强现有市场的资源配置，并继续在该等城市寻找新的项目资源；同时，我们亦积极探讨了以珠江三角洲和长江三角洲为目标的区域发展策略。集团在上海、深圳、武汉、成都、南昌等城市获得了新的项目资源，为可持续发展打下了一定的基础。此外，集团在佛山市南海区获得了项目资源，开始了以深圳为核心，辐射珠江三角洲的集约化区域投资策略。截至期末，集团拥有待开发项目资源706万平方米建筑面积。","importance_score":0.8,"importance_reason":"标志万科战略从单点城市扩张向珠三角、长三角区域深耕转型，706万平方米土储为后续增长提供保障，佛山南海项目是珠三角辐射战略的起点。","context_brief":"万科阐述从单城市扩张转向区域集约化发展的战略转型。","file_date":"2026-04-09"},{"id":6,"file_name":"2026-04-09.md","piece_index":1,"original_text":"集团成功发行了15亿元可转换公司债券，为主营业务的规模增长提供了保障。集团整体财务和资金状况良好，资产负债比例合理。","importance_score":0.65,"importance_reason":"15亿可转债是万科早期重要融资事件，为其全国化扩张提供资金支持。","context_brief":"万科2002年融资情况。","file_date":"2026-04-09"},{"id":7,"file_name":"2026-04-09.md","piece_index":1,"original_text":"在未来的一年，集团将积极应对政府土地政策的调整并密切关注市场的变化，在保持持续稳健增长的同时，积极推进新的发展布局的形成。根据集约化的发展方向，集团将积极推进区域发展模式，在原有单个城市继续扩大项目资源的基础上，向珠江三角洲和长江三角洲地区的城市扩张。","importance_score":0.75,"importance_reason":"前瞻性陈述明确了珠三角和长三角双区域扩张战略，这一布局对万科后续十年发展具有深远影响。","context_brief":"万科展望2003年发展方向。","file_date":"2026-04-09"},{"id":8,"file_name":"2026-04-09.md","piece_index":2,"original_text":"2001年，本集团业绩稳步增长，实现营业收入人民币445,506万元，净利润人民币37,375万元，分别较上年增长 17.74%和 25.99% ，每股盈利0.59元，较上年增长 25.99%。","importance_score":0.9,"importance_reason":"关键财务数据：营收、净利润、每股盈利及同比增长率，反映公司经营状况。","context_brief":"万科A 2001年年报董事长致辞，披露全年核心财务数据。","file_date":"2026-04-09"},{"id":9,"file_name":"2026-04-09.md","piece_index":2,"original_text":"基于对房地产行业发展的良好预期，为集中资源优势，集团在2001年实现对万佳股权的成功转让，退出零售行业，至此集团的专业化战略调整得以顺利完成。","importance_score":0.95,"importance_reason":"重大战略决策：退出零售行业、聚焦房地产，标志万科专业化转型完成，是公司发展史上的里程碑事件。","context_brief":"万科通过转让万佳股权完成专业化战略调整，彻底退出零售业务。","file_date":"2026-04-09"},{"id":10,"file_name":"2026-04-09.md","piece_index":2,"original_text":"年内，集团房地产业务实施了稳健而有成效的扩张。期间成功进入武汉、南京、长春、南昌四个城市，在原有的深圳、上海、北京、沈阳、成都、天津等城市也加大了投资力度。各地业务呈现良好发展态势。","importance_score":0.85,"importance_reason":"重大战略扩张：一年内进入四个新城市，体现万科全国化扩张战略的推进力度和节奏。","context_brief":"万科2001年加速全国化布局，新进入四个城市。","file_date":"2026-04-09"},{"id":11,"file_name":"2026-04-09.md","piece_index":2,"original_text":"在过去的一年，集团在项目资源的获得方面付出了努力，截至2001年底，集团待开发项目占地面积 980万平方米；在资金方面，集团建立了良好的融资渠道。融资优势和开发项目等资源优势的取得，为集团可持续发展提供了有力的保障。","importance_score":0.8,"importance_reason":"关键经营数据：980万平方米土地储备反映公司未来发展潜力和资源积累情况。","context_brief":"万科披露土地储备规模及融资能力。","file_date":"2026-04-09"},{"id":12,"file_name":"2026-04-09.md","piece_index":2,"original_text":"基于潜力巨大的市场需求，2002年地产行业仍将保持向上势头。随着相关法规的逐步完善，消费者品牌意识、权益意识的不断成长，集约化调整成为行业发展的重要趋势，成熟企业的优势地位将日趋明显。董事会选择地产行业、选择专业化经营的决心坚定不移，对实现集团的发展战略目标充满信心。","importance_score":0.75,"importance_reason":"前瞻性陈述：对行业趋势的判断（集约化、品牌化）以及坚持专业化的战略决心，体现管理层的行业洞察。","context_brief":"王石对2002年房地产行业的前瞻性判断及万科战略定力的表态。","file_date":"2026-04-09"}],"insights":[{"id":49,"insight_type":"evolution","content":"中海地产自2006年孔庆平时代提出'投资物业盈利占集团盈利20%'的量化目标，此后在2007-2015年连续十年年报中以几乎完全相同的措辞反复重申，但始终未能实现。2009年目标形式从'占比20%'悄然调整为'2015年租金不少于12亿港元'，实质降标。到2020年颜建国时代，目标再次变形为'2025年商业资产管理收入120亿元'，而2025年实际仅达72亿元（缺口约40%）。最终，这一跨越近二十年的战略承诺从官方叙事中彻底消失，被REIT资产证券化框架所替代。这是一个经典的'战略目标漂移'案例：管理层通过不断更换目标口径（盈利占比→绝对租金→资管收入→REIT平台），在形式上维持战略连续性的同时，实质上回避了商业地产转型始终未能突破的事实。","created_at":"2026-05-26 23:37:16","excerpts":[{"date":"2006","from":"中海年报","text":"投资物业盈利占比20%为中期目标"},{"date":"2009","from":"中海年报","text":"2015年租金不少于12亿港元"},{"date":"2020","from":"中海年报","text":"2025年商业资产管理收入目标120亿元"},{"date":"2025","from":"中海年报","text":"商业物业收入72亿元首次覆盖利息支出"},{"date":"2025","from":"中海公司简介","text":"投资物业盈利占比目标已从官方叙事消失"}],"files":["2026-05-08.md","2026-05-11.md","2026-05-10.md"]},{"id":50,"insight_type":"comparison","content":"中海地产与万科在2008-2025年间走出了截然相反的命运曲线，其分野根源可追溯至1997年亚洲金融危机的不同'创伤记忆'。中海因1997年危机形成根深蒂固的财务保守主义，以港企和黄、新鸿基为标杆，2005-2007年行业疯狂扩张期资产负债率仅42-52%，费用率常年低于5%，郁亮本人承认'万科真正的对手是中海'。万科则在同期走向另一极端：事业合伙人制度下管理层'成为主人'的意识催生了'影子万科'体外资金体系（鹏金所+博商系），289亿元坏账损失率高达89%。2025年结局：中海以130亿元核心利润、2.8%融资成本、行业最高信用评级维持行业第一；万科两年合计巨亏约1380亿元，其中信用减值（体外资金坏账）占最大比重。同一行业、同一周期，治理逻辑的差异导致了'冰火两重天'的终局。","created_at":"2026-05-26 23:37:16","excerpts":[{"date":"2010","from":"经济观察报","text":"中海费用率多年低于5%，万科承认中海是真正对手"},{"date":"2008","from":"中海年报","text":"1997年金融危机教训，以港企为标杆"},{"date":"2025","from":"秦朔文章","text":"博商系坏账准备288亿元，损失率89%"},{"date":"2025","from":"万科年报","text":"两年合计亏损约1380亿元"},{"date":"2025","from":"中海年报","text":"融资成本2.8%历史最低，权益销售行业第一"}],"files":["2026-05-25.md","2026-05-17.md","2026-05-11.md","2026-05-10.md","2026-05-08.md"]},{"id":51,"insight_type":"relationship","content":"傅育宁的职业轨迹串联起三家央企巨头（招商局→华润→万科大股东），其在华润任上与万科管理层的冲突，本质是央企治理传统与职业经理人自主模式的深层碰撞。傅育宁在招商局体系深耕数十年，历任招商银行董事长、招商局国际主席等多个核心职务，习惯于母公司对子公司的强控制模式。2014年接替宋林任华润董事长后，面对的是已运行十余年、管理层高度自治的万科。他明确表示与万科管理层'价值观不同，这是更核心的东西'，而万科管理层引入深铁时绕开董事会的做法进一步激化矛盾。2017年华润以每股22元、总价372亿元清仓退出。事后来看，傅育宁对万科治理问题的判断具有前瞻性——博商系体外资金体系恰恰是治理失控的产物，但华润作为大股东未能纠偏就选择了退出。","created_at":"2026-05-26 23:37:16","excerpts":[{"date":"2025","from":"秦朔文章","text":"傅育宁认为与万科管理层'价值观不同'"},{"date":"2017","from":"秦朔文章","text":"华润以每股22元总价372亿元清仓退出"},{"date":"2010-2014","from":"招商局履历","text":"傅育宁任招商局董事长兼招商银行董事长"},{"date":"2025","from":"秦朔文章","text":"影子万科体系由鹏金所+博商系构成"}],"files":["2026-05-25.md"]},{"id":52,"insight_type":"prediction","content":"恒隆地产陈启宗在2017年年报中做出两个重要预判：一是'内地零售六年寒冬已结束，奢侈品复苏尤其强劲'；二是'预判2020年起恒隆进入新增长阶段'。第一个判断在短期内得到验证（上海恒隆广场零售额增长26%），但第二个判断遭遇疫情、房地产危机和中美冲突三重黑天鹅。到2022年，陈启宗在年报中做出与五年前截然不同的判断：'香港经济可能高峰已过'、'中美对抗下无中立之地'。讽刺的是，陈启宗本人曾在2017年警告'中国体制易出现黑天鹅事件'、'最大风险是政策决策高度集中导致的政策错误'——他准确预见了风险类型，却未能预见风险会直接冲击自己的增长计划。2024年恒隆24年来首次录得内地租赁收入减少，陈启宗之子陈文博接任后转向轻资产防御策略。","created_at":"2026-05-26 23:37:16","excerpts":[{"date":"2017","from":"恒隆年报","text":"预判2020年起进入新增长阶段"},{"date":"2017","from":"恒隆年报","text":"中国体制易出现黑天鹅事件"},{"date":"2022","from":"恒隆年报","text":"香港经济可能高峰已过"},{"date":"2024","from":"恒隆年报","text":"24年来首次录得内地租赁收入减少"},{"date":"2025","from":"恒隆年报","text":"恒隆V.3轻资产战略，防御优先"}],"files":["2026-05-25.md"]},{"id":53,"insight_type":"trend","content":"中海地产连续12年（2003-2014）兑现年净利润增长不低于20%的承诺，是中国房地产行业最长的持续增长纪录之一。但这一增长曲线的终结方式揭示了行业周期的不可抗力：2021年股东溢利达到401.6亿元的历史峰值，此后急剧下滑至2025年的130.1亿元（降幅68%）。即便是财务最保守、治理最规范的央企龙头，也无法在行业系统性下行中独善其身。值得注意的是，中海管理层的行业判断时间线高度精准：2010年预判'汰弱留强'、2018年判断行业进入'平稳发展期'、2021年提出'三大分化'、2022年宣告'上半场结束'——每一次判断都准确捕捉了行业拐点，但盈利仍不可避免地随行业大势下行，说明即使正确的战略认知也无法完全对冲系统性风险。","created_at":"2026-05-26 23:37:16","excerpts":[{"date":"2010","from":"中海年报","text":"预判行业整合加速、汰弱留强"},{"date":"2018","from":"中海年报","text":"内地房地产从高速增长调整进入平稳发展期"},{"date":"2021","from":"中海年报","text":"股东溢利401.6亿元（历史峰值）"},{"date":"2022","from":"中海年报","text":"上半场已结束，百强销售降幅42.2%"},{"date":"2025","from":"中海年报","text":"核心溢利130.1亿元，较峰值降68%"}],"files":["2026-05-08.md","2026-05-11.md"]},{"id":54,"insight_type":"evolution","content":"恒隆地产三代掌门人的战略选择精确映射了中国房地产行业三个时代：创始人陈曾熙建立V.1模式（香港住宅开发），对应1960-1990年代香港地产黄金期；陈启宗建立V.2模式（内地高端商业租赁），对应2000-2020年中国城镇化与消费升级周期，高峰期上海恒隆广场租赁边际利润率达90%；陈文博推出V.3（轻资产、非高端、社区营造），则回应2024年后奢侈品在岸消费比例从82%骤降至60%、行业进入零和博弈的新现实。每一代战略转型都发生在上一代模式触及天花板之际，且新模式在定位上刻意与前代相反——陈启宗追求'最高端'，陈文博明确选择'非高端'定位下沉。这种代际间的战略钟摆效应，既是家族企业适应力的体现，也暗含新模式是否仍需漫长验证期的风险。","created_at":"2026-05-26 23:37:16","excerpts":[{"date":"历史","from":"恒隆资料","text":"陈曾熙从不接受记者访问，极度低调"},{"date":"2017","from":"恒隆年报","text":"上海恒隆广场租赁边际利润率90%"},{"date":"2024","from":"恒隆年报","text":"奢侈品在岸消费比例从82%骤降至60%"},{"date":"2025","from":"恒隆年报","text":"V.3新增资产多属非高端物业"}],"files":["2026-05-18.md","2026-05-25.md"]},{"id":55,"insight_type":"connection","content":"万科前高管毛大庆2014年在万科任上公开表示'金融化将是房企发展的必然倾向'，并推动万科物流地产对标普洛斯模式、引入黑石基金。这一判断本身具有前瞻性，但讽刺的是，万科内部同期正在发生的'金融化'走向了完全不同的方向——祝九胜打造的'影子万科'体系（鹏金所+博商系）将上市公司资金导给体外公司使用，本质上是一种失控的、非透明的金融化。毛大庆2015年离开万科创办优客工场，万科的金融化则以体外循环的形式隐秘发展，最终在2024-2025年以289亿元坏账准备的方式暴露。同一家公司、同一时期，对'金融化'的理解分裂为阳光路径（资产证券化/基金合作）与暗路径（体外资金循环），前者未能成为主流，后者却酿成灾难。","created_at":"2026-05-26 23:37:16","excerpts":[{"date":"2014","from":"毛大庆讲话","text":"金融化将是房企发展必然倾向"},{"date":"2014","from":"毛大庆讲话","text":"万科物流地产对标普洛斯模式"},{"date":"2025","from":"秦朔文章","text":"祝九胜打造影子万科鹏金所+博商系"},{"date":"2025","from":"万科年报","text":"博商系坏账损失率89%"}],"files":["2026-05-17.md","2026-05-25.md","2026-05-11.md"]},{"id":56,"insight_type":"insight","content":"赵燕菁2022-2023年间的系列论述构成了一个完整的理论预警体系，其核心预判在万科和恒隆的实际数据中得到了分层验证。赵燕菁提出'房价如同生育率，压下来不容易，恢复增长更不容易'、'2023年很可能是避免债务危机的最后机会'，万科2024年即出现上市33年来首次亏损（450亿元），2025年扩大至886亿元，母公司可用资金仅11.89亿元。赵燕菁提出'房地产崩盘导致银行缩表→系统性需求萎缩'的传导链，恒隆2024年数据呈现了消费端的映射：奢侈品在岸消费比例从82%骤降至60%，但恒隆确认消费者总购买力并未下降，只是消费地点转移——这恰好印证了赵燕菁'资本品定价一旦破裂，流动性而非实际需求是问题核心'的论断。负财富效应改变的不是购买力，而是购买意愿和信心。","created_at":"2026-05-26 23:37:16","excerpts":[{"date":"2022","from":"赵燕菁文章","text":"房价不可逆恢复，基于预期的资本定价一旦破裂"},{"date":"2023","from":"赵燕菁文章","text":"2023年很可能是避免债务危机最后机会"},{"date":"2025","from":"万科年报","text":"母公司可动用资金仅11.89亿元"},{"date":"2024","from":"恒隆年报","text":"在岸消费比例从82%骤降至60%"},{"date":"2024","from":"恒隆年报","text":"消费者总购买力未下降，消费地点转移"}],"files":["2026-05-24.md","2026-05-25.md"]},{"id":57,"insight_type":"lesson","content":"2008年金融危机中，普洛斯因母公司负债率58%被迫以13亿美元出售中国及日本资产给新加坡主权基金GIC，管理层在最低谷明确坚守中国内需逻辑，联合GIC成立SMG基金接管运营。此后普洛斯在梅志明领导下从物流仓储拓展至数据中心（2018年起）和新能源，全球资管规模达800亿美元，并成功在新加坡IPO（中金公司首次主导海外公司IPO）。与此形成对照的是，万科2014年试图对标普洛斯模式进入物流地产，引入黑石基金，但最终万科的'金融化'走向了体外资金循环的歧路。普洛斯危机中'被迫卖身'反而实现了从重资产向平台化资管的蜕变，万科主动'金融化'却酿成治理灾难——资本危机的结局取决于管理层在压力下选择透明化还是隐蔽化。","created_at":"2026-05-26 23:37:16","excerpts":[{"date":"2008","from":"普洛斯报道","text":"母公司负债率58%被迫以13亿美元出售"},{"date":"2020","from":"梅志明履历","text":"普洛斯资管规模达800亿美元"},{"date":"2010","from":"中金公司报道","text":"GLP IPO系中金首次主导海外公司IPO"},{"date":"2014","from":"毛大庆讲话","text":"万科物流地产对标普洛斯"},{"date":"2025","from":"秦朔文章","text":"影子万科体系为治理失控产物"}],"files":["2026-05-17.md","2026-05-20.md","2026-05-25.md"]},{"id":58,"insight_type":"connection","content":"万科的人才外流路径揭示了一个隐性的行业人才生态图谱：毛大庆（万科高级副总裁、北京万科总经理）2015年离开创办优客工场；叶兴安1993-2002年在万科任职后辗转至绿景地产任执行董事；2010年外部报道确认万科高管向富力、合生等同行流入。而中海地产恰恰是反向的人才'虹吸者'——其费用率常年低于5%的运营效率被行业视为标杆，大量中海系管理人员流入其他房企。这一'万科出人、中海出方法论'的格局，与两家公司的最终命运形成了深刻呼应：万科以'成为主人'的合伙人文化留人，却催生了体外利益输送；中海以严格的费用管控和制度纪律治企，人才虽有流失但体系稳健依旧。","created_at":"2026-05-26 23:37:16","excerpts":[{"date":"2015","from":"毛大庆履历","text":"万科前高级副总裁，离职创办优客工场"},{"date":"2002","from":"绿景地产年报","text":"叶兴安1993-2002年在万科任职"},{"date":"2010","from":"经济观察报","text":"万科、富力、合生均有中海高管流入"},{"date":"2025","from":"秦朔文章","text":"事业合伙人制度异化为治理失控"}],"files":["2026-05-25.md","2026-05-18.md","2026-05-17.md"]},{"id":59,"insight_type":"trend","content":"赵燕菁提出中国在高质量发展阶段'大量城市将破产'的预判，与中海地产2025年年报披露的一个政策信号形成呼应：2026年3月自然资源部出台政策，新增建设用地原则上不用于经营性房地产开发，这是供给端的历史性收缩。赵燕菁的理论框架认为，城市化完成后基础设施折旧维护成本将成为核心压力，'中国城市20-30年即快速老化，远逊于英国城市的冻龄能力'。黄奇帆的数据佐证了需求饱和：人均住房建筑面积已达41.76平方米、全国空置房约20%。三方信息叠加指向一个结论：中国房地产正从增量开发时代不可逆地转入存量管理时代，但现有的财税体系（依赖土地出让金）和城市治理模式（依赖基建投资拉动GDP）尚未完成适配转型，赵燕菁所警告的'城市鹤岗化'风险正在从理论预警变为现实威胁。","created_at":"2026-05-26 23:37:16","excerpts":[{"date":"2023","from":"赵燕菁文章","text":"高质量阶段会有大量城市破产"},{"date":"2023","from":"赵燕菁文章","text":"地方政府为还债拼命卖地是竭泽而渔"},{"date":"2022","from":"黄奇帆文章","text":"人均住房41.76平方米，空置房约20%"},{"date":"2026","from":"中海年报","text":"新增建设用地原则上不用于经营性房地产"}],"files":["2026-05-24.md","2026-05-10.md","2026-05-11.md"]},{"id":60,"insight_type":"management","content":"中海地产在2007年报中首次披露成立风险管理委员会，同年新增土储1030万平米创历史纪录（较上年增58%），管理层明确识别出货币政策从'稳健'转'从紧'的风险信号，但土储扩张计划未见收缩——'措辞审慎、行动激进'。仅一年后2008年金融危机爆发，中海净负债率从30%升至46.8%。然而中海的'行动与认知背离'与万科形成鲜明对比：中海在2009年立即将净负债率从46.8%压降至22.4%，获穆迪上调评级，并在此后十余年始终维持行业最低融资成本；万科郁亮2021年年报承认'未能坚决摆脱高增长惯性'，但到2024年才被迫面对后果。中海的纠错速度以季度计，万科的纠错延迟以年计，这一时间差最终决定了两家公司截然不同的生存状态。","created_at":"2026-05-26 23:37:16","excerpts":[{"date":"2007","from":"中海年报","text":"首次披露成立风险管理委员会"},{"date":"2007","from":"中海年报","text":"新增土储1030万平米，扩张加速"},{"date":"2009","from":"中海年报","text":"净负债率从46.8%压降至22.4%"},{"date":"2021","from":"万科年报","text":"郁亮承认未能摆脱高增长惯性"},{"date":"2025","from":"万科年报","text":"母公司可用资金仅11.89亿元"}],"files":["2026-05-08.md","2026-05-25.md"]},{"id":44,"insight_type":"connection","content":"单伟建和黄奇帆在改革方法论上形成了高度互补的「渐进主义」共识。单伟建认为「中国许多制度和治理模式，并不是事先设计好的蓝图」，而是「在应对和解决具体危机与问题的过程中逐步建立和完善起来的」，呼应邓小平「摸着石头过河」。黄奇帆则从操作层面将这一理念具体化为重组方法论：改革本质上就是「体制、机制、制度的重组」，核心是资源优化配置，最高境界是「随心所欲不逾矩」——在政策、法律、资源约束框架内寻找最优解。两人从不同角度（单伟建从制度演化史观、黄奇帆从实操方法论）共同论证了中国改革的实用主义特征。","created_at":"2026-05-21 07:35:41","excerpts":[{"date":"2026-04-14","from":"单伟建","text":"中国许多制度和治理模式，并不是事先设计好的蓝图，就像邓小平讲的「摸着石头过河」，是在应对和解决具体危机与问题的过程中逐步建立和完善起来的"},{"date":"2026-05-18","from":"黄奇帆","text":"改革是体制、机制、制度的重组，重组是资源配置方式的改革，改革与重组异曲同工"},{"date":"2026-05-18","from":"黄奇帆","text":"重组的最高境界就是……随心所欲不逾矩"}],"files":["2026-04-14.md","2026-05-18.md"]},{"id":45,"insight_type":"connection","content":"两人对高杠杆风险的警惕形成跨领域呼应。单伟建从国际投资角度警告中国海外资产面临地缘政治风险——香港和大陆净头寸合计至少5.5万亿美元，作为「世界上最大的净债权国」存在「巨大的风险」。黄奇帆则从国内重组实践出发警告高杠杆操作的危险：「以高杠杆、高负债去重组……甚至会陷入意料不到的债务危机」，并以2000年美国次级债重组引发2008年次债危机、进而导致2010年政府债务危机的案例作为反面教材。两人从不同维度（对外资产风险vs对内杠杆风险）共同指向同一个核心命题：过度扩张的资产负债表是系统性风险的根源。","created_at":"2026-05-21 07:35:41","excerpts":[{"date":"2026-04-14","from":"单伟建","text":"把香港和大陆的净头寸加起来……就至少有5.5万亿美元，那我们就是世界上最大的净债权国。这在当前的地缘政治格局下，我认为还是存在巨大的风险"},{"date":"2026-05-18","from":"黄奇帆","text":"若拿出全部老本，甚至以高杠杆、高负债去重组……甚至会陷入意料不到的债务危机"},{"date":"2026-05-18","from":"黄奇帆","text":"2000年美国为解决房地产不景气问题，把房地产中的问题贷款重组成次级债，引发了2008年的次债危机"}],"files":["2026-04-14.md","2026-05-18.md"]},{"id":47,"insight_type":"comparison","content":"单伟建与黄奇帆在「政府角色」问题上呈现微妙的视角差异。单伟建强调中国是「全球主要大国中唯一政府部门净资产为正的国家」，以此论证中国财政实力和制度优势，对5%的GDP增长目标「一定能达到」充满信心。黄奇帆则从实操经验强调政府在重组中应保持审慎：「重组是管理层的事情，不能搞民粹主义」，必须「量力而行、适可而止」，在「阳光下作业」。在房地产问题上，黄奇帆进一步指出仅靠融资端放松「不能代替市场主体造血机制的恢复」，需要土地和财税部门「主动发力」。单伟建偏向于对政府能力的乐观信任，黄奇帆则强调政府行动的边界感和执行纪律。","created_at":"2026-05-21 07:35:41","excerpts":[{"date":"2026-04-14","from":"单伟建","text":"2025年中国GDP增长5%……这在任何一个国家，都是一个很可观的数字"},{"date":"2026-05-18","from":"黄奇帆","text":"重组是管理层的事情、不能搞「民粹主义」，要讲时机、讲机遇，重组应该是多赢的，必��在阳光下作业，要量力而行、适可而止"},{"date":"2026-05-10","from":"财新","text":"融资端放松不能代替市场主体造血机制的恢复"}],"files":["2026-04-14.md","2026-05-18.md","2026-05-10.md"]},{"id":48,"insight_type":"connection","content":"单伟建的投资策略与黄奇帆对房地产危机的分析形成了有趣的「用脚投票」印证。单伟建明确表示「不投制造业，因为太卷，利润率过低；也不投出口企业」，而是「投针对消费的头部企业」。黄奇帆分析的房地产危机恰好解释了为什么制造业和出口之外的增长路径如此重要——房地产及其上下游40多个行业面临系统性风险，传统的投资驱动模式（大量依赖房地产和基建）已不可持续。单伟建作为管理亚洲最大PE基金之一的投资人，其资产配置选择实际上是对黄奇帆所描述的结构性转型的市场化验证。","created_at":"2026-05-21 07:35:41","excerpts":[{"date":"2026-04-14","from":"单伟建","text":"在投资上，我不投制造业，因为太「卷」，利润率过低；也不投出口企业……我投的是针对消费的头部企业"},{"date":"2026-05-10","from":"财新","text":"房地产行业急转直下：一方面楼市销售增速继续降至历史低点，另一方面融资端遭遇突然收紧"},{"date":"2026-05-10","from":"财新","text":"房地产业风险正在向产业链上下游40多个行业蔓延"}],"files":["2026-04-14.md","2026-05-10.md"]},{"id":35,"insight_type":"prediction","content":"万科2021年年报中，郁亮明确承诺'2022年将实现营业收入和净利润企稳回升'，然而2022年净利润实际仅增长0.4%（几乎持平），同期百强房企销售额暴跌42%，行业陷入有统计数据以来最大跌幅的危机。这一承诺的落空，揭示出管理层在2021年底对市场形势的严重误判，而彼时万科存货跌价准备余额仅51.4亿元，尚属可控，管理层的乐观预期并非毫无依据，但恰恰错判了2022年政策紧缩叠加信心崩塌的非线性冲击。","created_at":"2026-05-19 23:34:28","excerpts":[{"date":"2021","from":"万科年报·郁亮","text":"2022年将实现营业收入和净利润企稳回升"},{"date":"2022","from":"万科年报","text":"百强房企销售额同比下降42%，净利润同比增长0.4%"},{"date":"2022","from":"万科存货数据","text":"新增存货跌价准备4.5亿元，余额51.4亿元"}],"files":["2026-04-17.md","2026-04-14.md"]},{"id":36,"insight_type":"trend","content":"万科存货跌价准备从2022年到2025年呈现急剧加速恶化的趋势：新增计提金额分别为4.5亿元（2022年）、34.9亿元（2023年）、70.6亿元（2024年）、208.3亿元（2025年），四年累计跌价准备余额从51.4亿元膨胀至266.4亿元，增幅超过5倍。这一轨迹表明房地产市场的价格下行并非线性，而是在政策托底效果有限的背景下持续深化，万科资产质量的实质性恶化远超2022年管理层的预判。","created_at":"2026-05-19 23:34:28","excerpts":[{"date":"2022","from":"万科存货数据","text":"新增跌价准备4.5亿元，余额51.4亿元"},{"date":"2023","from":"万科存货数据","text":"新增跌价准备34.9亿元，余额79.9亿元"},{"date":"2024","from":"万科存货数据","text":"新增跌价准备70.6亿元，余额115.7亿元"},{"date":"2025","from":"万科存货数据","text":"新增跌价准备208.3亿元，余额266.4亿元"}],"files":["2026-04-14.md"]},{"id":38,"insight_type":"inconsistency","content":"王石在2009年成为全球最大住宅公司之际，主动发出警示：'住宅市场是经济发展缩影，规模扩张不值得如痴如醉'。然而万科此后并未收手——2013年致股东信以'全世界最大的房地产开发企业'为荣，并以此为背书强调坚守主业的正确性。直至2021年，郁亮才在利润暴跌45.7%后坦承'未能摆脱高增长惯性'、'土地投资追高冒进'。王石的预警与公司实际路径之间横跨十余年的落差，是一个典型的内部警示被组织惯性淹没的案例。","created_at":"2026-05-19 23:34:28","excerpts":[{"date":"2009","from":"万科年报·王石","text":"规模扩张不值得如痴如醉，真实需求才是本原动力"},{"date":"2013","from":"万科年报","text":"万科已成为全世界最大的房地产开发企业"},{"date":"2021","from":"万科年报·郁亮","text":"净利润下降源于投资追高冒进，未能摆脱高增长惯性"}],"files":["2026-04-17.md"]},{"id":39,"insight_type":"evolution","content":"雅戈尔的多品牌战略经历了从雄心勃勃到承认失败的完整弧线：2022年构建六品牌矩阵并投入20亿建设时尚体验馆，2021年李如成已坦承'多品牌战略执行失败——品牌沦为品类，此消彼长无增长'，并对多元化经营的可持续性提出根本质疑。2023年业绩不及预期，同年首次公开提出创业团队传承迫在眉睫。2024年彻底退出经营三十多年的地产业务，全力转向时尚产业，但引进品牌尚未产生效益。这一演变呈现出典型的'战略认知滞后于战略行动'的创始人企业路径依赖。","created_at":"2026-05-19 23:34:28","excerpts":[{"date":"2021","from":"雅戈尔年报·李如成","text":"多品牌战略失败——品牌沦为品类，此消彼长无增长"},{"date":"2022","from":"雅戈尔年报·李如成","text":"投入20亿建时尚体验馆，开始收缩房产开发投入"},{"date":"2023","from":"雅戈尔年报·李如成","text":"创业团队传承问题迫在眉睫，新老更替纳入制度性工作"},{"date":"2024","from":"雅戈尔年报·李如成","text":"退出运营三十多年的地产行业，引进品牌尚未产生效益"}],"files":["2026-04-16.md","2026-04-09.md"]},{"id":40,"insight_type":"connection","content":"万科与雅戈尔在地产与主业之间的战略取舍形成鲜明对照：雅戈尔作为以服装为主业的多元化企业，在感知到地产风险后于2022年启动收缩、2024年彻底清退，成功实现业务切割；万科作为专业房企，在2022年宣告住宅开发主导模式'不可逆转地终结'后，却因深度绑定而无法退出，只能以'开发、经营、服务并重'作为渐进转型路径，存货持续减值、现金压力持续累积。多元化企业在地产危机中反而拥有更灵活的退出能力，而专业化企业则被锁定其中——这对'专注主业必然优于多元化'的经典论断构成反例。","created_at":"2026-05-19 23:34:28","excerpts":[{"date":"2022","from":"万科年报","text":"未来行业无法再回到对住宅开发过于依赖的往日时光"},{"date":"2022","from":"雅戈尔年报·李如成","text":"及时收缩房产开发投入，严防房地产风险"},{"date":"2024","from":"雅戈尔年报·李如成","text":"2024年退出运营三十多年的地产行业，全力投入时尚产业"}],"files":["2026-04-17.md","2026-04-16.md","2026-04-09.md"]},{"id":28,"insight_type":"prediction","content":"郁亮在2021年年报中承诺'2022年将实现营业收入和净利润企稳回升'，但该预测未能兑现——2022年净利润仅微增0.4%，此后持续恶化。更早在2013年，万科致股东信对'傲慢与盲动'的双重警示，与后续公司因投资追高冒进而陷入危机形成历史性反讽。这两处预测均指向管理层对行业周期判断的系统性偏差。","created_at":"2026-05-19 23:28:31","excerpts":[{"date":"2021","from":"万科致股东信","text":"2022年将实现营业收入和净利润企稳回升（后续数据证明未能兑现）"},{"date":"2013","from":"万科致股东信","text":"因以往成功滋生的傲慢危险，但反应过度的盲动同样危险"},{"date":"2021","from":"万科致股东信","text":"净利润下降主要源于投资追高冒进，管理层承认未能摆脱高增长惯性"}],"files":["2026-04-17.md"]},{"id":29,"insight_type":"trend","content":"万科存货跌价准备呈现加速恶化态势：2022年新增计提仅4.5亿元，2023年跃升至34.9亿元，2024年扩大至70.6亿元，2025年暴增至208.3亿元——四年间新增计提规模增长约46倍。累计跌价准备从2022年的51.4亿元增至2025年的266.4亿元。这一加速曲线揭示房地产下行对万科资产质量的冲击远未触底，尤其2025年单年计提已超过此前三年总和，资产减值压力正在加剧。","created_at":"2026-05-19 23:28:31","excerpts":[{"date":"2022","from":"万科存货数据","text":"新增存货跌价准备4.5亿元，累计余额51.4亿元"},{"date":"2023","from":"万科存货数据","text":"新增计提跌价准备34.9亿元，累计余额79.9亿元"},{"date":"2024","from":"万科存货数据","text":"新增计提存货跌价准备70.6亿元，累计余额115.7亿元"},{"date":"2025","from":"万科存货数据","text":"新增计提跌价准备208.3亿元，累计跌价准备余额266.4亿元"}],"files":["2026-04-14.md"]},{"id":30,"insight_type":"trend","content":"万科存货规模自2022年起连续大幅收缩：2022年末9070.6亿元，2023年末7017亿元（降22.6%），2024年末5190.1亿元（降26%），2025年末3737.4亿元（降28%），三年间总规模缩水约59%。与此同时，已完工现房占比从2022年的10.8%升至2025年的30.6%，去化压力持续积聚。对比2001年土地储备980万平方米时的积极扩张期，万科的收缩幅度印证了行业格局的历史性逆转。","created_at":"2026-05-19 23:28:31","excerpts":[{"date":"2022","from":"万科存货数据","text":"存货9070.6亿元，已完工现房占比10.8%"},{"date":"2023","from":"万科存货数据","text":"存货7017亿元，同比下降22.6%"},{"date":"2025","from":"万科存货数据","text":"存货3737.4亿元，已完工现房占比30.6%，同比下降28%"}],"files":["2026-04-14.md"]},{"id":31,"insight_type":"connection","content":"万科与雅戈尔在'专业化vs多元化'的战略选择上走出了截然不同却又相互呼应的路径：万科2001年将万佳百货股权转让给华润退出零售业，完成专业化转型，全力押注房地产；雅戈尔则在2024年退出运营了三十多年的地产行业，转向时尚产业。两家公司相隔约二十年先后完成了向对方曾放弃领域的相向而行——万科当年退出零售聚焦地产，而雅戈尔今日退出地产聚焦消费品牌。这一历史对照揭示了企业战略专业化选择与行业周期之间的深层张力。","created_at":"2026-05-19 23:28:31","excerpts":[{"date":"2001","from":"万科年报","text":"将万佳百货72%股份转让给中国华润总公司，正式成为专一的房地产公司"},{"date":"2024","from":"雅戈尔致股东信","text":"2024年退出运营三十多年的地产行业，全力投入时尚产业"}],"files":["2026-04-10.md","2026-04-09.md"]},{"id":32,"insight_type":"inconsistency","content":"雅戈尔2021年报中李如成坦承多品牌战略执行失败——'品牌沦为品类，此消彼长无增长'，并对多元化经营的可持续性提出根本性质疑；然而仅隔一年，2022年公司不仅未收缩品牌，反而将品牌矩阵从既有格局扩展至六个品牌（雅戈尔、MAYOR、HSM、HANP、UND、HH），并投资20亿元建设时尚体验馆。承认失败后仍加码同类策略，反映雅戈尔在战略执行层面存在认知与行动的内在矛盾。","created_at":"2026-05-19 23:28:31","excerpts":[{"date":"2021","from":"雅戈尔致股东信","text":"多品牌战略执行失败——品牌沦为品类，此消彼长无增长"},{"date":"2022","from":"雅戈尔致股东信","text":"构建多层次品牌矩阵：MAYOR、HSM、HANP、UND、HH六品牌，投资20亿建时尚体验馆"}],"files":["2026-04-16.md"]},{"id":33,"insight_type":"evolution","content":"万科用二十年完成了从'专业化'到'被迫多元化'的完整历史循环：2001年出售万佳百货完成专业化转型，2003年进入全国化高速扩张期，2013年旗帜鲜明地反对多元化并视城镇化为长期红利，2021年因开发业务净利润暴跌45.7%而启动四大业务转型，2022年宣布住宅开发主导模式'不可逆转地终结'。这一演变轨迹表明，万科的战略转向并非主动选择，而是被行业拐点倒逼的结果，与2013年信中所强调的'坚守主业'形成根本性断裂。","created_at":"2026-05-19 23:28:31","excerpts":[{"date":"2001","from":"万科年报","text":"转让万佳股权退出零售业，专业化战略调整顺利完成"},{"date":"2013","from":"万科致股东信","text":"专业化是万科成立以来一直追求的方向，坚守房地产主业"},{"date":"2021","from":"万科致股东信","text":"净利润同比-45.7%，确定四大转型方向"},{"date":"2022","from":"万科致股东信","text":"未来行业无法再回到对住宅开发过于依赖的往日时光"}],"files":["2026-04-17.md","2026-04-15.md","2026-04-10.md","2026-04-09.md"]},{"id":34,"insight_type":"evolution","content":"雅戈尔在2021-2024年间完成了一次有序但痛苦的战略收缩：2021年反思多元化失败并提出'有所取舍'，2022年收缩房产开发投入防范风险，2023年业绩不及预期且创始人公开表示传承问题迫在眉睫，2024年彻底退出地产行业但新引进品牌尚未产生效益。整个过程呈现'旧业务已退出、新业务未盈利'的战略真空期，且管理层传承尚未完成，公司面临方向转型与代际交替的双重压力叠加。","created_at":"2026-05-19 23:28:31","excerpts":[{"date":"2021","from":"雅戈尔致股东信","text":"提出多产业经营需'有所取舍'，预示后续战略收缩"},{"date":"2022","from":"雅戈尔致股东信","text":"及时收缩房产开发投入，严防房地产风险"},{"date":"2023","from":"雅戈尔致股东信","text":"创业团队传承问题迫在眉睫，新老更替纳入制度性工作"},{"date":"2024","from":"雅戈尔致股东信","text":"退出运营三十多年的地产行业，引进品牌尚未产生效益"}],"files":["2026-04-16.md","2026-04-09.md"]},{"id":20,"insight_type":"trend","content":"万科存货跌价准备呈指数级恶化：2022年新增计提4.5亿元，2023年激增至34.9亿元，2024年翻倍至70.6亿元，2025年更飙升至208.3亿元，四年间单年计提规模扩大46倍。累计跌价准备余额从51.4亿元攀升至266.4亿元，占存货比例从0.57%升至7.1%。这一加速恶化的趋势表明，房地产市场下行对万科资产价值的冲击远未见底，且每一年的减值幅度都超出前一年的预期。","created_at":"2026-05-19 23:12:04","excerpts":[{"date":"2022","from":"万科年报","text":"新增存货跌价准备4.5亿元"},{"date":"2023","from":"万科年报","text":"新增计提存货跌价准备34.9亿元"},{"date":"2024","from":"万科年报","text":"新增计提存货跌价准备70.6亿元"},{"date":"2025","from":"万科年报","text":"新增计提存货跌价准备208.3亿元"}],"files":["2026-04-14.md"]},{"id":21,"insight_type":"prediction","content":"郁亮在万科2021年报中明确承诺'2022年将实现营业收入和净利润企稳回升'，但后续事实证明这一预测未能兑现。2021年净利润已同比下降45.7%，而此后万科存货持续大幅缩减（从9070亿降至3737亿），跌价准备累计达266亿元，经营状况持续恶化而非企稳。管理层对市场底部的判断再次过于乐观，与其自我批评的'市场判断过于乐观'形成讽刺性的自我印证。","created_at":"2026-05-19 23:12:04","excerpts":[{"date":"2021","from":"万科年报","text":"2022年将实现营收和净利润企稳回升"},{"date":"2021","from":"万科年报","text":"市场判断过于乐观"},{"date":"2022","from":"万科年报","text":"百强房企销售额同比下降42%"}],"files":["2026-04-17.md","2026-04-14.md"]},{"id":24,"insight_type":"inconsistency","content":"万科管理层在2021和2022年连续两年致股东信中承认'投资追高冒进'和'操盘离散度过大'，声称'正在逐步解决'，但后续三年存货跌价准备从51亿元暴增至266亿元，表明这些问题的后果远未消化完毕。管理层的措辞从2021年的'承认错误、承诺企稳'转变为2022年的'赚小钱、长钱、辛苦钱'，语气明显更为悲观和保守，但实际资产减值的加速度远超措辞调整的幅度。","created_at":"2026-05-19 23:12:04","excerpts":[{"date":"2021","from":"万科年报","text":"土地投资追高冒进、市场判断过于乐观"},{"date":"2022","from":"万科年报","text":"投资追高冒进问题正在逐步解决"},{"date":"2022","from":"万科年报","text":"赚小钱、长钱、辛苦钱"},{"date":"2025","from":"万科年报","text":"新增计提存货跌价准备208.3亿元"}],"files":["2026-04-17.md","2026-04-14.md"]},{"id":25,"insight_type":"evolution","content":"雅戈尔李如成的战略反思呈现清晰的递进轨迹：2021年坦承多品牌战略失败（'品牌沦为品类，此消彼长无增长'），2022年重新确立世界级时尚集团目标并开始收缩地产，2023年首次公开面对创业团队传承问题，2024年彻底退出地产。这一四年演进显示李如成在75岁前后（创业45周年）完成了从多元化扩张到聚焦收缩的认知转变，但'引进品牌尚未产生效益'意味着这场转型的成败仍悬而未决。","created_at":"2026-05-19 23:12:04","excerpts":[{"date":"2021","from":"雅戈尔年报","text":"多品牌实质上未带来增长"},{"date":"2022","from":"雅戈尔年报","text":"建设世界级时尚集团为主要目标"},{"date":"2023","from":"雅戈尔年报","text":"创业团队传承问题迫在眉睫"},{"date":"2024","from":"雅戈尔年报","text":"退出地产，引进品牌尚未产生效益"}],"files":["2026-04-16.md","2026-04-09.md"]},{"id":26,"insight_type":"prediction","content":"万科2003年王石预判'土地招拍挂和银行禁止土地贷款将利好品牌企业'，这在短期内确实得到验证——万科随后实现了近二十年的高速增长。然而从更长周期看，正是这种品牌优势带来的扩张信心，最终导致了郁亮2021年承认的'高增长惯性'和'投资追高冒进'。王石时代建立的竞争优势逻辑，在郁亮时代演变为战略陷阱。","created_at":"2026-05-19 23:12:04","excerpts":[{"date":"2003","from":"万科年报","text":"土地招拍挂将利好有实力的品牌企业"},{"date":"2021","from":"万科年报","text":"未能摆脱高增长惯性"},{"date":"2021","from":"万科年报","text":"土地投资追高冒进"}],"files":["2026-04-15.md","2026-04-17.md"]},{"id":14,"insight_type":"trend","content":"万科存货跌价准备呈指数级恶化：2022年新增计提4.5亿元，2023年升至34.9亿元，2024年翻倍至70.6亿元，2025年猛增至208.3亿元——四年间新增计提规模扩大了46倍。累计跌价准备余额从51.4亿元飙升至266.4亿元，反映房地产市场下行对万科资产价值的冲击在加速而非趋缓。这与2003年王石所描述的'高速增长期'形成鲜明的历史反转。","created_at":"2026-05-19 23:06:00","excerpts":[{"date":"2003","from":"万科年报","text":"房地产业务进入高速增长期，增速均约40%"},{"date":"2022","from":"万科年报","text":"新增存货跌价准备4.5亿元"},{"date":"2023","from":"万科年报","text":"新增计提存货跌价准备34.9亿元"},{"date":"2024","from":"万科年报","text":"新增计提存货跌价准备70.6亿元"},{"date":"2025","from":"万科年报","text":"新增计提存货跌价准备208.3亿元"}],"files":["2026-04-15.md","2026-04-14.md"]},{"id":18,"insight_type":"prediction","content":"万科2003年王石预判'土地招拍挂和银行禁止土地贷款将利好有实力的品牌企业'，且'大量新资金和区域开发商全国化导致竞争更趋激烈'。前半部分在中短期内得到验证——万科确实在2001-2003年的规范化浪潮中获益，全国化扩张成功。但从20年维度看，这一判断存在盲区：品牌企业的规模优势在行业系统性下行时无法提供保护，万科2025年仍需面对208亿元的巨额减值。","created_at":"2026-05-19 23:06:00","excerpts":[{"date":"2003","from":"万科年报","text":"土地招拍挂将利好有实力的品牌企业"},{"date":"2002","from":"万科年报","text":"政府加强监管将利好品牌领先企业"},{"date":"2025","from":"万科年报","text":"新增计提跌价准备208.3亿元"}],"files":["2026-04-15.md","2026-04-09.md","2026-04-14.md"]},{"id":19,"insight_type":"connection","content":"万科2001年转让万佳百货完成专业化转型，被视为战略聚焦的成功典范——此后扣非净利润增长104%，全国化扩张顺利推进。而雅戈尔2021年反思多元化、2024年退出地产聚焦时尚，本质上也是专业化收缩。两家公司在不同时代做出相似的战略选择，但万科的专业化聚焦房地产在行业上升期是正确答案，在下行期却成为枷锁；雅戈尔的专业化聚焦时尚能否成功，同样取决于行业周期，而李如成自己也承认'大环境对时尚经济带来挑战'。","created_at":"2026-05-19 23:06:00","excerpts":[{"date":"2001","from":"万科年报","text":"转让万佳股权退出零售业，专业化调整完成"},{"date":"2002","from":"万科年报","text":"专业化调整后扣非净利润增长104%"},{"date":"2021","from":"雅戈尔年报","text":"多产业经营需有所取舍"},{"date":"2024","from":"雅戈尔年报","text":"大环境对时尚经济带来挑战"}],"files":["2026-04-09.md","2026-04-16.md"]},{"id":9,"insight_type":"trend","content":"万科存货从2022年的9070.6亿元持续下降至2025年的3737.4亿元，四年间缩减近60%，但更值得关注的是存货跌价准备的加速恶化：2022年新增计提仅4.5亿元，2023年升至34.9亿元，2024年跃升至70.6亿元，2025年更是飙升至208.3亿元。跌价准备余额占存货比例从2022年的0.57%急剧攀升至2025年的7.1%，表明资产质量恶化速度远超去库存速度，市场下行对存量资产的冲击正在加速而非收敛。","created_at":"2026-05-19 22:42:03","excerpts":[{"date":"2022","from":"万科年报","text":"新增计提存货跌价准备4.5亿元"},{"date":"2023","from":"万科年报","text":"新增计提存货跌价准备34.9亿元"},{"date":"2024","from":"万科年报","text":"新增存货跌价准备70.6亿元"},{"date":"2025","from":"万科年报","text":"新增存货跌价准备208.3亿元"}],"files":["2026-04-14.md"]},{"id":10,"insight_type":"evolution","content":"万科的历史轨迹呈现出一个完整的扩张-收缩周期。2001年王石在年报中积极推进全国化扩张，新进入四个城市，土地储备达980万平方米，预判'地产行业仍将保持向上势头'；2002年进一步向珠三角和长三角区域集约化发展，扣非净利润增长104%。然而二十余年后，万科存货从2022年的9070亿元骤降至2025年的3737亿元，累计跌价准备266.4亿元，从曾经的激进扩张者变为被迫大幅收缩的防守者。这一历史性反转揭示了房地产行业长周期的残酷性——当年支撑高速增长的土地储备逻辑，在下行周期中恰恰成为最大的风险敞口。","created_at":"2026-05-19 22:42:03","excerpts":[{"date":"2001","from":"万科年报-王石","text":"土地储备达980万平方米"},{"date":"2002","from":"万科年报-王石","text":"扣非净利润同比增长104%"},{"date":"2023","from":"万科年报","text":"从扩张期进入收缩调整期"},{"date":"2025","from":"万科年报","text":"新增存货跌价准备208.3亿元"}],"files":["2026-04-14.md","2026-04-09.md"]},{"id":11,"insight_type":"trend","content":"万科已完工现房占存货比例的变化揭示了去化困境的加深：2022年已完工现房占比仅10.8%（980.7亿元），2023年为15.4%（1077.4亿元），2024年升至23.9%（1239.1亿元），2025年进一步攀升至30.6%（1144.5亿元）。尽管绝对金额在2025年有所下降，但占比持续走高，说明在建项目竣工后无法顺利销售，大量转化为现房库存，去化速度跟不上竣工速度，形成'堰塞湖'效应。","created_at":"2026-05-19 22:42:03","excerpts":[{"date":"2022","from":"万科年报","text":"已完工现房980.7亿元占比10.8%"},{"date":"2024","from":"万科年报","text":"已完工现房1239.1亿元占比23.9%"},{"date":"2025","from":"万科年报","text":"已完工现房1144.5亿元占比30.6%"}],"files":["2026-04-14.md"]},{"id":12,"insight_type":"connection","content":"雅戈尔2024年退出运营三十多年的地产业务，与万科同期面临的巨额存货减值形成行业性共振。万科2024-2025年新增计提跌价准备分别为70.6亿和208.3亿元，连行业龙头都面临如此严峻的资产减值压力，非地产主业的雅戈尔选择彻底退出房地产、转向时尚产业，某种程度上是对行业前景的'用脚投票'。两家公司的不同选择——万科被动承受减值、雅戈尔主动止损退出——反映了房地产下行周期中企业根据自身禀赋做出的差异化应对策略。","created_at":"2026-05-19 22:42:03","excerpts":[{"date":"2024","from":"雅戈尔年报-李如成","text":"退出运营三十多年的地产行业"},{"date":"2024","from":"万科年报","text":"新增计提存货跌价准备70.6亿元"},{"date":"2025","from":"万科年报","text":"新增存货跌价准备208.3亿元"}],"files":["2026-04-14.md","2026-04-09.md"]},{"id":13,"insight_type":"prediction","content":"王石在2001年年报中预判'2002年地产行业仍将保持向上势头'，2002年万科确实实现了扣非净利润104%的增长，短期预测得到验证。但王石同期提出的'区域集约化发展'和'品牌领先企业将受益于政府加强监管'的判断，在二十余年后的行业下行期面临严峻考验——即便万科已是行业最具品牌影响力的企业之一，2025年仍不得不计提208.3亿元跌价准备，说明品牌优势在系统性行业风险面前的防御力有限。","created_at":"2026-05-19 22:42:03","excerpts":[{"date":"2001","from":"万科年报-王石","text":"地产行业仍将保持向上势头"},{"date":"2002","from":"万科年报-王石","text":"政府加强监管将利好品牌领先企业"},{"date":"2025","from":"万科年报","text":"新增存货跌价准备208.3亿元"}],"files":["2026-04-14.md","2026-04-09.md"]},{"id":5,"insight_type":"evolution","content":"万科从2001年专业化转型全面聚焦房地产，到2022年存货跌价准备累计51.4亿元、存货同比下降15.7%，呈现出完整的行业周期弧线。2001-2002年万科营收从44.55亿元增至45.7亿元，扣非净利润同比增长104%，王石在年报中判断'地产行业仍将保持向上势头'。二十年后的2022年，万科存货从上年大幅缩减15.7%，新增计提跌价准备4.5亿元，已完工现房980.7亿元面临去化压力，行业从上升期进入深度调整期。这一对比揭示了中国房地产行业从黄金时代到下行周期的完整演变。","created_at":"2026-05-19 22:37:40","excerpts":[{"date":"2022","from":"万科年报","text":"存货同比下降15.7%，跌价准备余额51.4亿元"},{"date":"2001","from":"万科年报","text":"营收增长17.74%，净利润增长25.99%"},{"date":"2002","from":"万科年报","text":"扣非净利润同比增长104%"},{"date":"2001","from":"万科年报（王石）","text":"2002年地产行业仍将保持向上势头"}],"files":["2026-04-14.md","2026-04-10.md","2026-04-09.md"]},{"id":7,"insight_type":"trend","content":"万科2001年总资产仅64.38亿元，待开发占地面积980万平方米；到2022年，仅存货一项即达9070.6亿元，规模膨胀超过140倍。然而2001年万科净利润增速达25.99%、扣非净利润增长104%，处于高质量扩张期；2022年却需计提51.4亿元存货跌价准备，存货规模主动收缩15.7%。规模的急剧膨胀与后期的被迫收缩，反映出房地产行业高杠杆扩张模式的内在脆弱性。","created_at":"2026-05-19 22:37:40","excerpts":[{"date":"2001","from":"万科年报","text":"总资产64.38亿元"},{"date":"2002","from":"万科年报","text":"结算面积同比增长62.3%"},{"date":"2022","from":"万科年报","text":"存货9070.6亿元，同比下降15.7%"}],"files":["2026-04-10.md","2026-04-09.md","2026-04-14.md"]},{"id":8,"insight_type":"prediction","content":"王石在万科2002年年报中预判'土地出让方式变化将利好品牌领先企业'、'集约化调整成为行业趋势'，这一判断在短期内得到验证——万科此后确实凭借品牌和管理优势快速扩张。但从2022年数据看，即便是行业龙头万科也面临存货跌价、去化压力，品牌领先并未能完全抵御行业系统性下行风险，早期的乐观预判需要加入周期维度的修正。","created_at":"2026-05-19 22:37:40","excerpts":[{"date":"2002","from":"万科年报（王石）","text":"政府加强监管将利好品牌领先企业"},{"date":"2022","from":"万科年报","text":"已完工现房980.7亿元，存在去化压力"}],"files":["2026-04-09.md","2026-04-14.md"]},{"id":1,"insight_type":"connection","content":"万科与雅戈尔在房地产行业上形成了完美的镜像轨迹：2001年万科转让万佳百货股权退出零售业，全面聚焦房地产，开启了长达二十余年的地产黄金时代；而雅戈尔在2024年退出运营三十多年的地产行业，全力投入时尚产业。两家公司在不同时间节点做出了方向相反的战略选择——万科在行业上升期全力进入，雅戈尔在行业下行期果断退出。这反映了中国房地产行业从朝阳产业到深度调整的完整周期。","created_at":"2026-05-19 22:32:47","excerpts":[{"date":"2001","from":"万科年报","text":"转让万佳股权退出零售业，专业化战略调整顺利完成"},{"date":"2001","from":"万科年报","text":"2002年地产行业仍将保持向上势头"},{"date":"2024","from":"雅戈尔年报","text":"退出运营三十多年的地产行业，全力投入时尚产业"}],"files":["2026-04-10.md","2026-04-09.md"]},{"id":2,"insight_type":"evolution","content":"万科2001-2002年的全国化扩张战略经历了清晰的演进：2001年王石提出积极扩张，一年内新进入武汉、南京、长春、南昌四个城市，土地储备达980万平方米；但到2002年，战略方向已从单城市扩张转向珠三角和长三角的区域集约化发展，待开发项目资源反而缩减至706万平方米。这表明万科在快速扩张后迅速意识到摊子铺太大的风险，从追求城市数量转向追求区域深耕质量，体现了早期万科务实的战略纠偏能力。","created_at":"2026-05-19 22:32:47","excerpts":[{"date":"2001","from":"万科年报","text":"成功进入武汉、南京、长春、南昌四个新城市"},{"date":"2001","from":"万科年报","text":"待开发占地面积980万平方米"},{"date":"2002","from":"万科年报","text":"战略方向转向区域集约化发展模式"},{"date":"2002","from":"万科年报","text":"待开发项目资源706万平方米"}],"files":["2026-04-09.md"]},{"id":3,"insight_type":"prediction","content":"王石在2001年年报中预测'2002年地产行业仍将保持向上势头，集约化调整成为行业趋势'，2002年实际业绩验证了这一判断：万科结算面积同比增长62.3%，结算净利润增长68.5%，扣非净利润增长104%。同时战略上确实转向区域集约化，与预判完全一致。但值得注意的是，营收仅增长2.7%、净利润仅增长2.3%，这与结算指标的大幅增长存在时间差，说明高增长主要来自前期项目集中交付，而非当年新增销售的即时贡献。","created_at":"2026-05-19 22:32:47","excerpts":[{"date":"2001","from":"万科年报","text":"2002年地产行业仍将保持向上势头"},{"date":"2002","from":"万科年报","text":"扣非净利润同比增长104%"},{"date":"2002","from":"万科年报","text":"营收同比增长2.7%，净利润同比增长2.3%"}],"files":["2026-04-09.md"]},{"id":4,"insight_type":"connection","content":"万科2001年专业化转型的核心交易——将万佳百货72%股权转让给中国华润总公司——揭示了万科与华润之间远非简单的股东关系。华润既是万科第一大股东（合计持股约15.08%），又是万科剥离资产的接盘方。这种'大股东接盘非核心资产'的安排，使万科得以顺利完成专业化转型，同时也加深了双方的利益绑定。华润通过直接持股和关联公司代持两个渠道控制万科股权，架构已颇为复杂。","created_at":"2026-05-19 22:32:47","excerpts":[{"date":"2001","from":"万科年报","text":"将万佳百货72%股份转让给中国华润总公司"},{"date":"2001","from":"万科年报","text":"华润系合计控制万科约15%股权"},{"date":"2001","from":"万科年报","text":"华润北京置地代持B股2.71%"}],"files":["2026-04-10.md"]}],"qaRecords":[{"id":10,"question":"请基于知识库中所有关于赵燕菁的资料，做一次深度研究，生成一篇高密度的memo备忘录。要求不是泛泛介绍，而是从原文中提炼他的核心思想体系、关键判断、底层逻辑、主要研究领域、问题意识、方法论特征及观点之间的内在关系。","answer":"赵燕菁，厦门大学建筑与土木工程学院、经济学院双聘教授，曾任厦门市规划局局长十一年，此前在中国城市规划设计研究院做了近二十年规划师。本科就读于重庆建工学院城市规划专业，博士在卡迪夫大学研究城市化与发展理论。学术思想受张五常、杨小凯、周其仁影响，兼具制度经济学训练和城市规划实务经验，形成了一套独特的、以资产负债表为核心工具的经济分析体系。\n\n一、元框架：两阶段模型\n\n赵燕菁全部论述的底层结构是一个资本积累—运营盈利的两阶段划分。第一阶段的核心任务是融资建设，关键能力是花钱；第二阶段的核心任务是维护还债，关键能力是省钱。他明确指出：高速度阶段的成功可能成为高质量阶段的问题——建设标准越高，运营还债压力越大。在他看来，高质量对政府而言归根到底就是税收，省钱是高质量阶段的核心本领。\n\n中国靠土地金融完成了第一阶段的资本积累，但进入第二阶段后，基础设施折旧与维护成本将成为核心压力。他以美国铁锈带和英国城市为对照，警告高质量阶段会有大量城市破产，城市竞争将如产业洗牌般惨烈，城市出局，国家也就出局。中国城市二三十年即快速老化，远逊于英国城市的冻龄能力，铁锈带正是中国城市未来的前车之鉴。\n\n二、信用创造：房地产的真正功能\n\n赵燕菁反复强调，房地产最主要的功能不是直接融资而是创造信用。房地产作为银行贷款的核心抵押品，是货币创造的基石。由此推出一个关键判断：融资和消费本质上互不兼容，住与炒在金融逻辑上不可调和——试图让同一种资产同时承担居住消费和信用抵押两种功能，在逻辑上必然产生冲突。\n\n在此基础上，他提出人民币就是房地产的本位货币，房地产是中国货币最主要的信用基础。中国房地产市场的规模几乎等于美国股票市场和房地产市场资本的总和，中美竞争的本质就是这两个核心资本市场之间的较量。\n\n三、土地财政：制度演进与关键节点\n\n赵燕菁用三次危机复苏来论证制度变革而非要素投入才是经济起飞的根本动力：1990年土地出让条例帮助中国走出1989年的经济困局；1998年房改是走出亚洲金融危机的核心政策，他称之为中国被严重低估的伟大创新，创造了第一代中产阶级；2004年8月31日招拍挂大限则是土地财政真正形成的分水岭。\n\n他特别强调，中国经济真正起飞不是因为2001年入世，而是2003至2004年土地招拍挂制度确立后的土地金融化。加入WTO的红利能够兑现，前提恰恰是土地招拍挂提供了资本基础。华为、阿里巴巴等科技企业的崛起与房地产繁荣同步，不是偶然——房地产繁荣通过创造三亿中产阶级和消费市场，为科技企业提供了成长土壤。深圳的资本积累模式源自香港卖地制度，并非中央拨款。\n\n在制度解释上，他直接挑战主流政治经济学的锦标赛体制说法，认为地方政府竞争的根本原因是间接税制度而非GDP晋升锦标赛。间接税加中央集权的组合才是中国地方政府竞争模式的制度基础。\n\n四、泡沫论：廉价资本即竞争力\n\n赵燕菁对泡沫持一种极为独特的肯定态度。他指出：房地产泡沫最大时也是日本经济最繁荣时，泡沫等于廉价资本等于竞争力。资本市场存在格雷欣法则——泡沫大的资本驱除泡沫小的资本。房价高不是坏事，崩盘才是坏事，因为资本廉价的经济能承受更大冲击。房地产市场的高估值恰恰意味着融资便宜，这是国家层面的融资优势。\n\n由此得出政策结论：不应主动缩小债务规模，而应维持泡沫等待对手先破裂。日本失去三十年的根本原因正是主动捅破泡沫加上逆周期投资未形成有效资产。1989年日本企业占全球市值前五十名多达三十二家，到2022年归零。美国则从不主动捅破泡沫，逆势创新，绩效远优于日本的主动缩表。\n\n他以合肥为正面案例，说明如何利用房地产泡沫创造的廉价资本实现产业升级。同时主张，中国因为内债结构和资本市场未对外开放，比日本更有底气抵御外部冲击。关于救市中的道德风险争议，他的回应很干脆：防止道德风险是救市要解决的问题，而不是不救市的理由。\n\n五、房价不可逆与政策主张\n\n赵燕菁对房价走势有一个核心判断：房价如同生育率，压下来不容易，恢复增长更不容易，基于预期的资本定价一旦破裂不可逆恢复。市场从供不应求到供大于求的转变不是线性的，而是非线性跳转，一旦发生便难以逆转。因此，即便房地产有严重问题，所有问题加起来也不构成打垮它的理由。\n\n在政策上，他主张存量时代的核心应是维持流动性而非控制价格。拯救房地产的关键是保存量价值而非刺激增量，需要通过减少供给来制造供不应求、恢复流动性。政府应当在房地产市场主动逆回购抄底资产，而不仅仅是提供流动性。住房体系应实行双轨制：保障房保居住，商品房放开价格管制。他认为中国保障进、市场出的时序双轨制比新加坡的并行双轨制效率更高。\n\n六、地方债：不可消灭，必须转化\n\n赵燕菁在债务问题上的立场非常鲜明：地方债不能直接消灭，否则货币同步消灭导致通缩。他进一步推到极端：债务不是问题，能否形成资产才是问题——只要能形成资产，项目越大越好，债务越多越好。\n\n他的解决方案是地方债转为国债，即政府层面的债转股，实现金融系统从房地产信用向国债信用的迁移。国债将替代房地产成为金融体系的新信用锚。在他看来，中央政府在地方债务危机中袖手旁观是严重渎职，而地方政府为还债拼命卖地则是竭泽而渔，将导致城市鹤岗化。\n\n关于2008年四万亿刺激，他认为其成功归因于房地产市场复活而非财政投资本身，并引用辜朝明《大衰退》中对中国四万亿的正面评价来支持这一论点。四万亿的实际结构是中央约一万亿、地方约三万亿，撬动配套投资约三十万亿。\n\n七、房地产税：制度性警告\n\n赵燕菁在2001年建设部内部会议上曾建议征收房地产税，但后来转为强烈反对。他认为房地产税是土地资本化的逆过程，征收相当于把未来资产还原为现金流，这将摧毁中国最大的资本市场，导致货币生成阻滞，终结地方政府竞争引擎，甚至使中国在中美高科技竞争中失败。\n\n他还指出制度层面的根本矛盾：房地产税需匹配地方民主自治制度，否则会出现制度错配。直接税本质上要求纳税人对税收用途有直接监督权，这在中国现行体制下缺乏制度基础。此外，征收财产税的国家无一因此缩小贫富差距，引用皮凯蒂的研究作为佐证。他还澄清一个常见混淆：香港差饷税的税基是房租即现金流，与房地产税的税基是房价即资本，两者本质不同。\n\n他提出一个反直觉的命题：想发展什么行业就要对什么行业征税而非减税——因为税收倒逼效率提升，淘汰低效参与者。2021年房地产税试点授权在税权下放方面的意义堪比央地分权改革，但他警告局部正确的改革可能合成整体系统性风险。\n\n八、全球化视角与战略判断\n\n赵燕菁用资产负债表框架来理解全球化：全球化本质是中美资产负债表的镜像扩张，中国为资产端、美国为债务端。脱钩的后果不对称——中国面临产能过剩和通缩，美国面临债务过剩和通胀。他认为中国经济真正的短板在债务端而非资产端，这是由全球化分工决定的。\n\n对于中国的战略转型，他主张在金砖、上合框架内转型为债务和市场的提供者，扮演美国在全球化中的角色。对于美国的债务模式，他的评价很直接：美国以债养债是典型庞氏骗局，MMT是痴人说梦。他在2023年初判断2023年很可能是避免债务危机的最后机会，最大危险是通缩而非通胀。\n\n九、方法论特征\n\n赵燕菁的分析有几个鲜明特点。第一是自觉的反主流立场，他自称持非主流观点，系统性地挑战住建部、财政部和主流经济学的政策共识。第二是制度优先的分析路径，从制度变迁而非要素投入来理解经济增长，三次危机复苏皆由制度变革驱动。第三是非线性思维，反复强调经济系统中的相变和不可逆性。第四是资本视角优先，一切最终回归信用创造和资本市场逻辑，拒绝用消费品视角看待资产。第五是频繁使用国际比较，日本、美国、新加坡、香港、英国铁锈带都是他反复调用的对照组。第六是实践者视角，十一年规划局长的经历使其论述带有强烈的政策操作感，而非纯学术推演。\n\n十、预见性验证\n\n赵燕菁2022至2023年间的多项判断在此后得到了验证。他2022年6月提出的房价不可逆恢复判断，对应了万科2024年首次年度亏损四百五十亿元。他关于债务端断崖式暴跌的警告，映射在万科母公司可用资金仅剩十一点八九亿元、流动性缺口达千亿的困境中。他的理论框架——房地产崩盘导致银行缩表进而引发系统性危机——精确描述了2024至2025年房企流动性困境的传导机制。","created_at":"2026-05-25 03:55:05","sources":[]},{"id":9,"question":"单伟建有哪些关键的思考和观点洞察？","answer":"**单伟建**（太盟投资集团PAG执行董事长，管理资产超550亿美元）2026年4月在中欧商学院分享的核心观点：\n\n### 1. 中国科技创新地位\n- 中国和美国是全球**仅有的两个**同时具备科技创新五大条件的国家：人才（STEM毕业生年均超500万）、高校、资本、制造力（制造业增加值占全球30%）、统一大市场\n\n### 2. 经济增长模式转型\n- 中国必须从出口投资驱动**转向消费驱动**\n- 居民存款超160万亿元，超过GDP（140万亿元），释放5-10%即可显著拉动增长\n- 2023年GDP增长中消费贡献82.5%，增长质量高于2025年\n- 5%的GDP增长目标一定能达到，且应定得更高\n\n### 3. 房地产判断\n- 房地产市场**基本见底**——全国出租收益率约2.8%，已高于国债收益率1.8%\n\n### 4. 投资策略\n- **聚焦消费领域头部企业，不投制造业和出口企业**\n- 典型案例：联合投资万达商管（持股60%），出租率97%以上，税后净利润80亿元\n\n### 5. 企业出海警示\n- 对中国企业出海持**严重保留态度**，地缘政治风险巨大\n- 中港澳海外净资产头寸至少5.5万亿美元，面临政治不确定性\n\n### 6. 政府财政与制度观\n- 中国是全球主要大国中**唯一政府净资产为正**的国家\n- 中国制度是在解决具体危机中渐进建立的，而非事先设计的蓝图（《通往现代之路》核心论断）\n\n---\n\n**总结**：单伟建的思考框架——看多中国长期潜力、看准消费转型方向、警惕海外地缘风险。","created_at":"2026-05-21 13:00:39","sources":[]}]};
var tab='passages',query='',page=1,PER=15;
marked.setOptions({breaks:true,gfm:true});

var typeLabels={inconsistency:'不一致性',trend:'趋势变化',connection:'关联发现',evolution:'公司演变',prediction:'预测验证',relationship:'关系图谱',comparison:'对比分析',lesson:'投资启示',insight:'认知更新',signal:'信号捕捉',management:'管理评估',risk:'风险识别'};

function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

function md(s){
  if(!s)return '';
  try{return marked.parse(s)}catch(e){return esc(s)}
}

function escRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}

function hi(s,asMarkdown){
  if(!s)return '';
  var html=asMarkdown?md(s):esc(s);
  if(!query)return html;
  var terms=query.split(/\s+/).filter(Boolean);
  for(var i=0;i<terms.length;i++){
    var r=new RegExp('('+escRe(terms[i])+')','gi');
    html=html.replace(r,'<span class="highlight">$1</span>');
  }
  return html;
}

function match(item){
  if(!query)return true;
  var terms=query.toLowerCase().split(/\s+/).filter(Boolean);
  var fields;
  if(tab==='passages'){
    fields=[item.original_text,item.context_brief,item.importance_reason,item.file_date];
  }else if(tab==='insights'){
    fields=[item.content,typeLabels[item.insight_type]];
  }else{
    fields=[item.question,item.answer];
  }
  var all=fields.map(function(f){return(f||'').toLowerCase()}).join(' ');
  return terms.every(function(t){return all.includes(t)});
}

function getFiltered(){return DATA[tab].filter(match)}

function scoreClass(v){
  var p=Math.round((v||0)*100);
  if(p>=70)return 'score-high';
  if(p>=50)return 'score-mid';
  return 'score-low';
}

function renderPassage(p){
  var sc=Math.round((p.importance_score||0)*100);
  return '<div class="card">'
    +'<div class="card-meta"><span class="date">'+(p.file_date||p.file_name)+' #'+p.piece_index+'</span>'
    +'<span class="score '+scoreClass(p.importance_score)+'">'+sc+'</span></div>'
    +(p.context_brief?'<div class="context">'+hi(p.context_brief)+'</div>':'')
    +'<div class="passage-text">'+hi(p.original_text,true)+'</div>'
    +(p.importance_reason?'<div class="reason">'+hi(p.importance_reason)+'</div>':'')
    +'</div>';
}

function renderInsight(ins){
  var label=typeLabels[ins.insight_type]||ins.insight_type;
  var tc='t-'+(ins.insight_type||'connection');
  var html='<div class="card">'
    +'<span class="insight-type '+tc+'">'+esc(label)+'</span>'
    +'<div class="insight-text">'+hi(ins.content,true)+'</div>';
  var items=ins.excerpts||[];
  if(items.length>0){
    html+='<details class="sources"><summary>来源 ('+items.length+')</summary>';
    for(var i=0;i<items.length;i++){
      var s=items[i];
      html+='<div class="source-item"><span class="from">['+(s.date||'')+'] '+(s.from||'')+'</span><span class="text">'+esc(s.text||'')+'</span></div>';
    }
    html+='</details>';
  }else if(ins.files&&ins.files.length){
    html+='<div class="sources" style="margin-top:8px">来源: '+esc(ins.files.join(', '))+'</div>';
  }
  html+='</div>';
  return html;
}

function renderQa(qa){
  var html='<div class="card">'
    +'<div class="card-meta"><span class="date">'+esc(qa.created_at||'')+'</span></div>'
    +'<div class="qa-question">'+hi(qa.question)+'</div>'
    +'<div class="qa-answer">'+hi(qa.answer,true)+'</div>';
  var items=qa.sources||[];
  if(items.length>0){
    html+='<details class="sources"><summary>参考来源 ('+items.length+')</summary>';
    for(var i=0;i<items.length;i++){
      var s=items[i];
      html+='<div class="source-item"><span class="text">'+esc(typeof s==='string'?s:(s.text||JSON.stringify(s)))+'</span></div>';
    }
    html+='</details>';
  }
  html+='</div>';
  return html;
}

function render(){
  var items=getFiltered();
  var total=items.length;
  var pages=Math.max(1,Math.ceil(total/PER));
  if(page>pages)page=pages;
  var start=(page-1)*PER;
  var slice=items.slice(start,start+PER);
  var el=document.getElementById('list');

  if(slice.length===0){
    el.innerHTML='<div class="empty">'+(query?'未找到匹配结果':'暂无内容')+'</div>';
  }else{
    var fn=tab==='passages'?renderPassage:tab==='insights'?renderInsight:renderQa;
    el.innerHTML=slice.map(fn).join('');
  }

  // Pager
  var pg=document.getElementById('pager');
  if(pages<=1){pg.innerHTML='';return}

  var h='<button onclick="go(1)" '+(page===1?'disabled':'')+'>&#171;</button>';
  h+='<button onclick="go('+(page-1)+')" '+(page===1?'disabled':'')+'>&#8249;</button>';

  // Show max 7 page buttons
  var lo=Math.max(1,page-3),ph=Math.min(pages,page+3);
  if(ph-lo<6){if(lo===1)ph=Math.min(pages,7);else lo=Math.max(1,pages-6)}
  for(var i=lo;i<=ph;i++){
    h+='<button onclick="go('+i+')"'+(i===page?' class="active"':'')+'>'+i+'</button>';
  }

  h+='<button onclick="go('+(page+1)+')" '+(page===pages?'disabled':'')+'>&#8250;</button>';
  h+='<button onclick="go('+pages+')" '+(page===pages?'disabled':'')+'>&#187;</button>';
  h+='<span class="info">'+total+' 条</span>';
  pg.innerHTML=h;
}

function go(p){page=p;render();window.scrollTo(0,0)}

function switchTab(t,btn){
  tab=t;page=1;
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  render();
}

var searchTimer;
function onSearch(){
  clearTimeout(searchTimer);
  searchTimer=setTimeout(function(){
    query=document.getElementById('search').value.trim();
    page=1;
    render();
  },200);
}

function renderLatex(){
  if(typeof renderMathInElement==='function'){
    renderMathInElement(document.getElementById('list'),{
      delimiters:[
        {left:'$$',right:'$$',display:true},
        {left:'$',right:'$',display:false},
        {left:'\\(',right:'\\)',display:false},
        {left:'\\[',right:'\\]',display:true}
      ],
      throwOnError:false
    });
  }
}

var _origRender=render;
render=function(){_origRender();renderLatex()};

/* ===== TTS Module ===== */
var TTS = (function(){
  var synth = window.speechSynthesis;
  var state = 'idle'; // idle | playing | paused
  var sessionId = 0;
  var items = [];
  var total = 0;
  var idx = 0;        // index into items (global across all pages)
  var chunks = [];
  var chunkIdx = 0;
  var zhVoice = null;
  var wdog = null;
  var keepAlive = null;

  function pickVoice(){
    var v = synth.getVoices();
    for(var i=0;i<v.length;i++) if(v[i].lang==='zh-CN') return v[i];
    for(var i=0;i<v.length;i++) if(v[i].lang.indexOf('zh')===0) return v[i];
    return null;
  }
  zhVoice = pickVoice();
  if(synth.onvoiceschanged!==undefined) synth.onvoiceschanged=function(){zhVoice=pickVoice()};

  function plain(s){
    if(!s)return '';
    var d=document.createElement('div');
    try{d.innerHTML=marked.parse(s)}catch(e){d.textContent=s}
    return (d.textContent||'').trim();
  }

  function textOf(item){
    var p=[];
    if(tab==='passages'){
      if(item.context_brief) p.push(item.context_brief);
      p.push(item.original_text||'');
      if(item.importance_reason) p.push(item.importance_reason);
    }else if(tab==='insights'){
      var label=typeLabels[item.insight_type]||item.insight_type||'';
      if(label) p.push(label);
      p.push(item.content||'');
    }else{
      p.push(item.question||'');
      p.push(item.answer||'');
    }
    return p.map(plain).join('。');
  }

  function chunk(text){
    if(!text) return [];
    var MAX=120, res=[], buf='';
    var sents=text.split(/(?<=[。！？；\n])/);
    for(var i=0;i<sents.length;i++){
      var s=sents[i].trim();
      if(!s) continue;
      if(buf.length+s.length<=MAX){ buf+=s; continue; }
      if(buf) res.push(buf);
      if(s.length<=MAX){ buf=s; continue; }
      var sub=s.split(/(?<=[，、,；：])/), sb='';
      for(var j=0;j<sub.length;j++){
        if(sb.length+sub[j].length<=MAX){ sb+=sub[j]; }
        else{ if(sb) res.push(sb); sb=sub[j]; }
      }
      buf=sb;
    }
    if(buf) res.push(buf);
    return res.length?res:[text.slice(0,MAX)];
  }

  function clearHL(){
    document.querySelectorAll('.card.tts-speaking').forEach(function(c){c.classList.remove('tts-speaking')});
  }

  function highlight(){
    clearHL();
    var cards=document.querySelectorAll('#list .card');
    var local=idx-(page-1)*PER;
    if(local>=0&&local<cards.length){
      cards[local].classList.add('tts-speaking');
      cards[local].scrollIntoView({behavior:'smooth',block:'center'});
    }
  }

  function goPage(i){
    var tp=Math.floor(i/PER)+1;
    if(tp!==page){ page=tp; render(); }
  }

  var svgPlay='<svg viewBox="0 0 16 16"><polygon points="4,2 14,8 4,14"/></svg>';
  var svgPause='<svg viewBox="0 0 16 16"><rect x="3" y="2" width="3.5" height="12" rx="1"/><rect x="9.5" y="2" width="3.5" height="12" rx="1"/></svg>';
  var svgStop='<svg viewBox="0 0 16 16"><rect x="3" y="3" width="10" height="10" rx="1.5"/></svg>';
  var eqBars='<span class="tts-eq"><span></span><span></span><span></span></span>';

  function ui(){
    var c=document.getElementById('ttsCtrl');
    if(state==='idle'){
      c.innerHTML='<button class="tts-btn-play" onclick="ttsPlay()" title="播放">'+svgPlay+'</button>';
      clearHL();
    }else if(state==='playing'){
      c.innerHTML='<button class="tts-btn-play is-playing" onclick="ttsPause()" title="暂停">'+eqBars+'</button>'
        +'<button class="tts-btn-stop" onclick="ttsStopBtn()" title="停止">'+svgStop+'</button>'
        +'<span class="tts-status">'+(idx+1)+' / '+total+'</span>';
    }else{
      c.innerHTML='<button class="tts-btn-play" onclick="ttsResume()" title="继续">'+svgPlay+'</button>'
        +'<button class="tts-btn-stop" onclick="ttsStopBtn()" title="停止">'+svgStop+'</button>'
        +'<span class="tts-status">已暂停 '+(idx+1)+' / '+total+'</span>';
    }
  }

  function clearWdog(){ if(wdog){clearTimeout(wdog);wdog=null} }
  function startWdog(sid){
    clearWdog();
    wdog=setTimeout(function(){
      if(sessionId!==sid||state!=='playing') return;
      if(!synth.speaking&&!synth.pending) next(sid);
    },8000);
  }

  function next(sid){
    if(sid!==sessionId) return;
    clearWdog();
    // Chrome keep-alive
    if(!keepAlive) keepAlive=setInterval(function(){
      if(synth.speaking&&state==='playing'){synth.pause();synth.resume()}
    },10000);

    if(chunkIdx>=chunks.length){
      idx++;
      if(idx>=total){ stop(); return; }
      goPage(idx);
      highlight();
      chunks=chunk(textOf(items[idx]));
      chunkIdx=0;
      ui();
    }
    if(chunkIdx>=chunks.length){ next(sid); return; }

    var u=new SpeechSynthesisUtterance(chunks[chunkIdx]);
    u.lang='zh-CN'; u.rate=1.0;
    if(zhVoice) u.voice=zhVoice;
    u.onend=function(){ if(sid===sessionId){chunkIdx++;next(sid)} };
    u.onerror=function(e){ if(sid===sessionId&&e.error!=='canceled'&&e.error!=='interrupted'){chunkIdx++;next(sid)} };
    synth.speak(u);
    startWdog(sid);
  }

  function play(){
    synth.cancel();
    sessionId++;
    items=getFiltered();
    total=items.length;
    if(!total){ state='idle'; ui(); return; }
    // Start from first item on current page
    idx=(page-1)*PER;
    if(idx>=total) idx=0;
    goPage(idx);
    highlight();
    chunks=chunk(textOf(items[idx]));
    chunkIdx=0;
    state='playing';
    ui();
    next(sessionId);
  }

  function pause(){
    synth.pause(); state='paused'; clearWdog(); ui();
  }

  function resume(){
    synth.resume(); state='playing'; ui(); startWdog(sessionId);
  }

  function stop(){
    sessionId++; synth.cancel(); state='idle'; clearWdog();
    if(keepAlive){clearInterval(keepAlive);keepAlive=null}
    ui();
  }

  // When user manually jumps page during playback, reset to that page
  function onPageJump(){
    if(state==='idle') return;
    synth.cancel();
    var newIdx=(page-1)*PER;
    if(newIdx>=total){ stop(); return; }
    idx=newIdx;
    chunks=chunk(textOf(items[idx]));
    chunkIdx=0;
    highlight(); ui();
    if(state==='playing') next(sessionId);
  }

  return {play:play,pause:pause,resume:resume,stop:stop,onPageJump:onPageJump,
    getState:function(){return state}};
})();

function ttsPlay(){ TTS.play(); }
function ttsPause(){ TTS.pause(); }
function ttsResume(){ TTS.resume(); }
function ttsStopBtn(){ TTS.stop(); }

// Hook page navigation for manual jumps
var _origGo=go;
go=function(p){ _origGo(p); TTS.onPageJump(); };

// Stop TTS on tab switch or search
var _origSwitchTab=switchTab;
switchTab=function(t,btn){ TTS.stop(); _origSwitchTab(t,btn); };
var _origOnSearch=onSearch;
onSearch=function(){ TTS.stop(); _origOnSearch(); };

render();
</script>
</body>
