,"importance_reason":"关键运营数据（12.3万间、出租率95.5%）；长租公寓为'租购并举'国策的重要载体，龙湖在该赛道的规模和运营质量具有行业参考价值；参与存量改造与城市更新是未来增量空间所在。","context_brief":"龙湖长租公寓（冠寓）运营数据及战略方向。","file_date":"2026-04-19"},{"id":96,"file_name":"2026-04-19.md","piece_index":2,"original_text":"二零二四年，本集團於南京、合肥、蘇州、重慶、長沙等地新增運營 11 座天街項目，疊加既有開業項目，商業板塊以 97%的出租率（截止二零二四年末）實現經營利潤與現金流的同步穩增。商業團隊通過場景創新與消費痛點捕捉，在核心城市打造兼具活力與品質的消費空間，銷售額及客流均實現逆勢同店增長。","importance_score":0.82,"importance_reason":"97%出租率和逆势同店增长是关键经营指标，体现商业运营在地产下行期的抗周期能力，与万科同期依赖开发业务的困境形成对比。","context_brief":"龙湖集团2024年主席报告，陈序平署名。行业整体下行背景下商业板块表现。","file_date":"2026-04-19"},{"id":97,"file_name":"2026-04-19.md","piece_index":2,"original_text":"龍湖智創生活全年實現收入 114.2 億元，同比增長 8%，不斷拓寬服務半徑，住宅、商企、美居、優選及租售五大飛輪業務服務超過 325 萬戶業主，在管面積超過 4 億平方米。通過智慧科技系統升級，針對安全防控、節能降耗、空間運維等多場景管理，讓空間的使用更便捷、服務更人性化、管理更高效，客戶滿意度連續第 16 年超過 90%。","importance_score":0.75,"importance_reason":"114.2亿元收入、8%增速、4亿平方米在管面积为可量化的关键指标；连续16年满意度超90%是竞争差异化数据点。","context_brief":"物业服务板块（龙湖智创生活）2024年业绩披露。","file_date":"2026-04-19"},{"id":98,"file_name":"2026-04-19.md","piece_index":2,"original_text":"本集團穿越週期的韌性，源於對戰略定力的長期堅守、對風險底線的恪守敬畏、對客戶導向的深度錨定。我們相信，惟有穩固企業基底，才能在週期中逐步築底，進而實現高質量的轉型與發展。","importance_score":0.7,"importance_reason":"'逐步築底'表述承认公司仍处于底部调整阶段，与'穿越周期的韧性'并置，隐含对未来不确定性的审慎判断，是前瞻性立场声明。","context_brief":"主席致辞结语，阐述公司穿越周期的核心逻辑。","file_date":"2026-04-19"},{"id":99,"file_name":"2026-04-19.md","piece_index":2,"original_text":"龍湖龍智資管作為資產管理航道，通過長租公寓、產業辦公、服務式公寓、活力街區、婦兒醫院及健康養老六大業務板塊，構建出全週期、全業態的資產管理能力，全年貢獻運營收入 31.8 億元。","importance_score":0.72,"importance_reason":"31.8亿元运营收入及六大业务板块布局是可量化指标；涵盖健康养老、妇儿医院等非传统地产业态，显示多元化运营路径，与万科四大转型方向存在业态重叠可作横向对比。","context_brief":"龙湖资产管理板块（龙智资管）2024年业绩及业务结构。","file_date":"2026-04-19"},{"id":73,"file_name":"2026-04-18.md","piece_index":0,"original_text":"互为补充的房地产和投资业务使本集团在多变的经济环境中仍能取得理想业绩，这正是本集团的优势之一。本集团其他业务占用公司资源较少，随着自身业务的发展和市场的成熟，将会独立发展，井成为公司较为稳定的盈利来源之一。","importance_score":0.92,"importance_reason":"与历史背景形成鲜明对比：1993年王石将多元化（房地产+投资）定义为核心优势，而8年后（2001年）万科却将多元化视为包袱，出售万佳百货完成专业化转型。这一立场的根本逆转揭示了万科战略思维的重大演变。","context_brief":"王石1993年报致股东信，阐述万科多元化业务组合的战略逻辑。","file_date":"2026-04-18"},{"id":74,"file_name":"2026-04-18.md","piece_index":0,"original_text":"房地产业务将在重点发展上海、北京、天津、青岛、石家庄的城市居民住宅项目，同时自留部分商业及办公物业以谋取较为稳定的租金收入。股权投资业务将向参股及控股经营等领域探索，寻求新的投资机会，以期壮大公司的实业基础。增辟稳定的盈利来源。贸易业务在集团营业收入中的比重虽趋下降，但仍将占相当比重。工业项目将试图在合作加工的基础上加强自有产品的开发。娱乐和广告业务将为未来发展积蓄力量。","importance_score":0.88,"importance_reason":"记录了万科专业化转型前的多元化全貌：房地产、股权投资、贸易、工业、娱乐、广告六线并进。与2001年（仅剩房地产）和2022年（开发+经营+服务三轨）的历史节点对比，构成万科战略演变的最早基准线。自留商业物业获取租金的思路，与2022年提出的经营性不动产战略遥相呼应，跨越三十年形成回环。","context_brief":"1994年业务计划，列举万科六大业务板块的战略部署。","file_date":"2026-04-18"},{"id":75,"file_name":"2026-04-18.md","piece_index":0,"original_text":"中国运用经济紧锯等多种手段压抑通货膨胀，对税收和汇率制度进行重大改革，这将有助于中国经济的持续健康发展。然而宏观经济政策和发展形势的剧烈变化，对正迈向市场经济的企业却是严峻的挑战。","importance_score":0.78,"importance_reason":"万科在1993年将宏观调控定性为'严峻挑战'，而2006年报王石则将宏观调控重新定性为'行业升级转折点'和利好。同一公司对宏观调控的态度从防御转为进取，折射出其从规模小、抗风险能力弱到行业龙头后认知框架的根本转变。","context_brief":"1993年宏观背景描述，彼时中国正经历1993-1994年宏观调控。","file_date":"2026-04-18"},{"id":76,"file_name":"2026-04-18.md","piece_index":0,"original_text":"为适应业务发展和提高企业素质，本集团将加强与国际资本市场的联系，引进国际资本和管理经验，共同开发中国市场。","importance_score":0.72,"importance_reason":"早期万科将国际化定位为引进资本和经验的被动学习姿态；2006年报中王石则以帕尔迪为标杆主动对标，定位从学习者转向变革先锋。记录万科国际化战略从'引进来'到'对标超越'的认知演变。","context_brief":"1993年报提出国际化融资和引进外资管理经验的战略方向。","file_date":"2026-04-18"},{"id":77,"file_name":"2026-04-18.md","piece_index":1,"original_text":"以合理的地域和业务组合来降低经营风险,这是本集团在多变复杂的市场形势下能保持不断稳健发展的重要原因。","importance_score":0.88,"importance_reason":"与历史背景形成强烈反差：1994年万科以多元业务组合分散风险为战略核心，而2001年王石将退出零售等非核心业务的专业化集中定性为公司最重大战略转型，两种逻辑截然对立，揭示战略思维的根本性转变。","context_brief":"1994年报董事会展望，阐述集团核心经营哲学。","file_date":"2026-04-18"},{"id":78,"file_name":"2026-04-18.md","piece_index":1,"original_text":"同时引进国际上成熟的零售业经营管理经验,积极培养连锁零售业务,使之在数年内成为本集团业务新的增长点。零售业务将侧重在深圳拓展,以便取得规模经济和管理经验,为跨地域连锁经营作准备。","importance_score":0.92,"importance_reason":"此处积极培育的连锁零售业务正是后来的万佳百货——2001年王石将其72%股权转让给华润，作为专业化转型的标志性动作。1994年的增长点，7年后成为主动剥离的包袱，战略逆转具有重要历史意义。","context_brief":"1994年报明确将连锁零售业务列为重点培育方向，规划先深圳后全国扩张路径。","file_date":"2026-04-18"},{"id":79,"file_name":"2026-04-18.md","piece_index":1,"original_text":"工业、影视及广告业务仍将是集团盈利来源的有力补充。","importance_score":0.78,"importance_reason":"揭示1994年万科业务多元程度远超后来印象——除地产、贸易、零售外还有工业、影视、广告，这些在2001年专业化转型中均已退出，与后来'专一房地产公司'形象形成历史对比。","context_brief":"1994年万科仍保有工业、影视、广告等多元业务线。","file_date":"2026-04-18"},{"id":80,"file_name":"2026-04-18.md","piece_index":4,"original_text":"本集团零售业务连锁经营规模优势显示成效，全年零售业务实现营业收入55,021万元，盈利2,590万元，分别较上年增长88.1％和56.6％。鉴于对万佳百货发展前景的良好判断，本集团董事会决议增持万佳股份至68％。","importance_score":0.92,"importance_reason":"与历史背景形成直接矛盾：1997年董事会基于'良好判断'主动增持万佳至68%，而仅四年后（2001年）即将该72%股权全部转让给华润、完成专业化转型退出零售业。这一反转揭示战略判断的180度转向，是理解万科专业化转型时间线的关键节点。","context_brief":"万科1997年报，董事会决议增持零售业务万佳百货股份。","file_date":"2026-04-18"},{"id":81,"file_name":"2026-04-18.md","piece_index":4,"original_text":"本集团继续按照专业化的发展战略对非核心业务进行调整，年内，深圳万科工业扬声器制造厂及深圳万科供电公司股权的转让使集团资源进一步集中。","importance_score":0.85,"importance_reason":"1997年'专业化'的内涵与2001年完全不同：此时专业化是退出制造业（扬声器、供电），零售业务（万佳）和多元投资仍被保留甚至加码。这与2001年致股东信中'转让万佳股权退出零售业，专业化战略调整顺利完成'的表述形成鲜明对比，说明专业化战略的边界在持续收窄。","context_brief":"万科1997年正在推进专业化战略，但'专业化'彼时仅指退出工业制造，零售业务仍被视为核心。","file_date":"2026-04-18"},{"id":82,"file_name":"2026-04-18.md","piece_index":4,"original_text":"在过去的一年，本集团整体经营业绩令人鼓舞，实现利润总额25,043万元,税后利润18,712万元，分别较上年增长25.7％和25％；房地产在本集团的盈利份额稳定上升至67.5％，前景乐观。","importance_score":0.82,"importance_reason":"关键财务基准数据。1997年税后利润1.87亿元，增速25%，房地产占利润67.5%。对比后续数据：2001年净利润3.74亿元（增25.99%）、2002年3.82亿元、2003年5.42亿元，可完整还原万科从多元化向专业化房地产公司转型过程中的利润增长曲线。","context_brief":"万科1997年整体财务业绩及房地产业务盈利占比。","file_date":"2026-04-18"},{"id":83,"file_name":"2026-04-18.md","piece_index":4,"original_text":"本集团之核心业务房地产业务取得理想经营业绩，全年结算楼宇面积24.7万平方米，其营业额与盈利分别较上年增长71.5％和61.6％……期内，本集团在深圳、上海、北京、天津和沈阳等地增开住宅面积达35万平方米。","importance_score":0.78,"importance_reason":"1997年结算面积仅24.7万平方米，布局深圳、上海、北京、天津、沈阳5城。对比2001年已进入10城、土地储备980万平方米，以及后续成为全球最大开发商的历程，可量化全国化战略的扩张速度与规模级差。","context_brief":"1997年万科房地产业务规模及城市布局。","file_date":"2026-04-18"},{"id":84,"file_name":"2026-04-18.md","piece_index":4,"original_text":"在未来一年，深圳仍将是本集团利润中心。","importance_score":0.75,"importance_reason":"与2003年年报形成鲜明对比：2003年上海市场利润贡献首次与深圳持平（38.38% vs 37.43%），全国化战略得以兑现。1997年深圳仍是唯一利润中心，全国化布局尚在初期，这一转变历经约六年时间。","context_brief":"万科1997年对1998年的业务展望，明确深圳为核心利润来源。","file_date":"2026-04-18"},{"id":41,"file_name":"2026-04-17.md","piece_index":3,"original_text":"2022年，行业形势的严峻性远远超出了我们在年初的预计。全年商品房市场出现了有统计数据以来最大幅度的下跌。根据有关机构监测，百强房企销售额同比下降 42%。行业融资能力大幅萎缩，海外债务市场失去功能。大量房企资金链断裂，并冲击上下游。市场预期降至冰点，信心危机导致的恶性循环开始向所有企业蔓延。","importance_score":0.92,"importance_reason":"记录了中国房地产行业有统计数据以来最大幅度下跌的关键历史时刻，百强房企销售额同比下降42%，海外债务市场失去功能，大量房企资金链断裂，是行业系统性危机的标志性数据。","context_brief":"万科2022年致股东信，描述房地产行业遭遇历史性冲击。","file_date":"2026-04-17"},{"id":42,"file_name":"2026-04-17.md","piece_index":3,"original_text":"这给公司经营造成了巨大压力。所幸我们的战略选择和经营策略承受住了严苛检验。2022年，公司营业收入同比增长 11.3%，净利润同比增长 0.4%。","importance_score":0.85,"importance_reason":"关键财务数据：营收增长11.3%、净利润增长0.4%。在行业整体下跌42%的背景下实现正增长，但净利润仅增0.4%已显示盈利压力。结合历史数据——2003年营收净利润增速均约40%——万科从高增长彻底转入微增长阶段。","context_brief":"万科在行业暴跌42%的背景下仍实现正增长。","file_date":"2026-04-17"},{"id":43,"file_name":"2026-04-17.md","piece_index":3,"original_text":"我们认为，无论是从客户、城市、政策导向还是投资角度，未来行业都无法再回到对住宅开发过于依赖的往日时光，开发、经营、服务并重是唯一选择。开发业务规模不再也不应是衡量房企的唯一标准。","importance_score":0.93,"importance_reason":"重大战略判断——明确宣布住宅开发主导模式不可逆转地结束。'唯一选择'的措辞极为坚决，这是万科从开发商向综合不动产服务商转型的纲领性表述。与2003年王石时代追求规模扩张、全国化布局形成根本性对比。","context_brief":"万科管理层对行业未来的战略判断。","file_date":"2026-04-17"},{"id":44,"file_name":"2026-04-17.md","piece_index":3,"original_text":"公司的经营服务业务体现出了较强的韧性，全口径收入达到512.6亿元，同比增长 23.1%。万物云收入首次突破300亿元，并成功分拆上市。物流业务经营收入同比增长 17.9%。长租公寓业务在规模和效率上保持行业第一，领先优势继续扩大，运营管理租赁住房21.5万间，其中保障性租赁住房5.9万间。商业营业收入同比增长 14.3%，新开业25个项目，集团内资源协同整合取得较大进展。","importance_score":0.88,"importance_reason":"关键财务数据和业务结构变化：经营服务业务收入512.6亿元增长23.1%，万物云分拆上市是里程碑事件。长租公寓21.5万间行业第一。这些数据支撑了'开发、经营、服务并重'战略的可行性，是万科商业模式转型的实质性证据。","context_brief":"万科经营服务业务在开发业务承压时逆势增长。","file_date":"2026-04-17"},{"id":45,"file_name":"2026-04-17.md","piece_index":3,"original_text":"十多年的积累之下，房地产行业的资产结构已经发生了显著变化。无论是从市场未来趋势角度，还是从自身可持续发展角度，与城市同步发展，和客户共同成长，接受和学会赚小钱、长钱、辛苦钱，都尤为关键。这不仅需要企业自身变革的勇气，也需要所有市场参与者的智慧和支持。","importance_score":0.9,"importance_reason":"'赚小钱、长钱、辛苦钱'是对房地产暴利时代终结的高度概括性表达，标志着万科从追求高增长、高回报彻底转向接受低利润率的经营性收入模式。这一表述与2003年王石时期40%增速、全国化扩张的豪迈形成鲜明的历史对照。","context_brief":"万科管理层对未来盈利模式的定性表述。","file_date":"2026-04-17"},{"id":46,"file_name":"2026-04-17.md","piece_index":3,"original_text":"但也不能回避，在取得上述成绩的同时，公司全年销售金额和毛利水平出现了下滑，对未来一段时间的业绩呈现构成一定挑战。我们还远未到可以高枕无忧的时候，未来还需加倍努力。","importance_score":0.82,"importance_reason":"前瞻性预警：销售金额和毛利双降将影响未来业绩。结合历史数据——2023年存货跌价准备34.9亿、2024年70.6亿、2025年208.3亿——这段预警在事后看来严重低估了后续冲击的烈度，'一定挑战'的表述过于保守。","context_brief":"万科坦承销售和毛利下滑对未来构成挑战。","file_date":"2026-04-17"},{"id":47,"file_name":"2026-04-17.md","piece_index":3,"original_text":"公司以确保安全为首要目标，继续保持业内领先信用评级，成为市场中为数不多还能依靠自身信用发行债券的房地产企业。与此同时，我们的债务结构明显优化，长期负债占比提高，新增融资成本下降，进一步提高了抗风险能力。","importance_score":0.78,"importance_reason":"2022年万科仍能依靠自身信用发债，是行业信用分化的重要标志。但结合后续2024-2025年万科面临的巨额存货减值（累计跌价准备266.4亿元），这段对安全性的自信在事后需要重新审视。","context_brief":"万科强调自身在行业信用危机中的安全地位。","file_date":"2026-04-17"},{"id":48,"file_name":"2026-04-17.md","piece_index":3,"original_text":"面对市场下行、交付洪峰和施工时间受限三重问题的叠加，我们动员全部资源和力量，克服重重困难，确保了超过34万套新房交付，进一步巩固了消费者对万科的信赖。新增投资的精准度和投后管理进一步优化，新项目的质量明显提高，全年权益总投496亿元，已开项目投资兑现度近 90%。","importance_score":0.76,"importance_reason":"关键经营数据：34万套交付、496亿元权益投资、90%兑现度。在行业信用崩塌背景下保交付是关键竞争优势。同时坦承'过去几年投资追高冒进、操盘离散度过大'，是对此前扩张策略失误的反思。","context_brief":"万科2022年交付和投资数据。","file_date":"2026-04-17"},{"id":49,"file_name":"2026-04-17.md","piece_index":4,"original_text":"2021年，对万科集团来说，是我们进入新发展阶段以来刻骨铭心的一年。这一年，尽管公司仍然保持经营稳健，但净利润继1995年、2008年后，出现上市31年以来第三次下滑，交出这样的成绩单，我倍感压力，内心充满紧迫感。","importance_score":0.9,"importance_reason":"净利润31年来仅第三次下滑，标志万科从高速增长进入下行拐点。结合历史数据，2022-2025年跌价准备从4.5亿飙升至208.3亿，说明这封信中的危机感远未充分反映后续恶化程度。","context_brief":"万科2021年致股东信开篇，郁亮直面净利润下滑。","file_date":"2026-04-17"},{"id":50,"file_name":"2026-04-17.md","piece_index":4,"original_text":"公司营业收入4,528亿元，同比仅增长 8.0%，归属于上市公司股东的净利润225亿元，同比下降45.7%。尤其是净利润指标，相较于股东期望和我们自身追求，有很大的差距。","importance_score":0.95,"importance_reason":"净利润下降45.7%是关键财务数据。与2003年王石致股东信中营收和净利润均增长约40%形成历史性反转，万科从高速扩张期彻底转入收缩期。","context_brief":"万科2021年核心财务数据披露。","file_date":"2026-04-17"},{"id":51,"file_name":"2026-04-17.md","piece_index":4,"original_text":"近几年来，土地市场竞争激烈，对行业毛利率水平造成明显影响，尽管公司在行业中较早意识到高速增长终将结束，但惭愧的是，我们的行为未能坚决摆脱高增长惯性。当追逐规模仍然流行、土地争夺愈演愈烈的时候，部分城市的投资追高冒进，对市场判断过于乐观，一些项目的投资预期没有实现，导致毛利率下滑。","importance_score":0.92,"importance_reason":"管理层罕见的自我批评和战略失误检讨。承认'知道但没做到'——早已意识到增长放缓却未能控制扩张冲动，这一认知-行为脱节是理解万科后续危机的关键。","context_brief":"郁亮反思万科未能摆脱高增长惯性，部分城市投资追高冒进。","file_date":"2026-04-17"},{"id":52,"file_name":"2026-04-17.md","piece_index":4,"original_text":"充分授权、分布式实施是万科过往快速发展的机制保障。在追求效率优先的高速增长阶段，这一机制能更快地响应市场、捕捉机会，最大程度地释放前线战斗力。随着业务复杂度逐步提高，市场竞争日趋激烈，部分城市公司暴露出能力短板。尽管我们依然拥有一批优秀公司和拔尖人才，但操盘表现离散度在上升。","importance_score":0.82,"importance_reason":"揭示万科组织管理模式从优势变为劣势的转折。2003年王石信中骄傲地描述深圳、上海、沈阳三大区域管理中心的扩张架构，到2021年同样的分布式架构成为能力参差不齐的根源。","context_brief":"郁亮反思万科分布式管理机制在新阶段的弊端。","file_date":"2026-04-17"},{"id":53,"file_name":"2026-04-17.md","piece_index":4,"original_text":"我们最终将物业服务、物流仓储、长租公寓和商业确定为主要方向。","importance_score":0.78,"importance_reason":"明确万科从纯开发商向'城市配套服务商'转型的四条新赛道。结合后续数据（2022-2025年存货持续大幅下降），开发业务收缩后这些业务的成败决定万科未来。","context_brief":"万科确定四大经营服务业务方向。","file_date":"2026-04-17"},{"id":54,"file_name":"2026-04-17.md","piece_index":4,"original_text":"万物云收入首次超过200亿元，同比增长 32.1%。……万纬物流近三年收入复合增速 52%，其中2021年收入32亿元，同比增长 69%，稳定期项目NOI率达到 6.5%。……泊寓开业15.95万间，全年平均出租率 95%……印力近五年收入复合增速为 20%，其中2021年收入同比增长 24%。","importance_score":0.85,"importance_reason":"四大新业务均保持高速增长，是万科转型成效的关键证据。但郁亮也坦承'这些业务现在及将来都无法与房地产开发相提并论'，新旧业务体量差距巨大。","context_brief":"万科四大经营服务业务2021年经营数据汇总。","file_date":"2026-04-17"},{"id":55,"file_name":"2026-04-17.md","piece_index":4,"original_text":"我相信，这些行动和努力，将支撑公司在2022年实现营业收入和净利润企稳回升，并为未来价值增长打下基础。","importance_score":0.88,"importance_reason":"这一前瞻性承诺与历史数据严重矛盾——2022年存货跌价准备仅4.5亿看似平稳，但2023年跳升至34.9亿，2024年70.6亿，2025年208.3亿，说明所谓'企稳回升'完全未能实现，局势持续恶化。这是判断管理层预判能力的重要标尺。","context_brief":"郁亮对2022年业绩企稳回升的承诺。","file_date":"2026-04-17"},{"id":56,"file_name":"2026-04-17.md","piece_index":12,"original_text":"2013年是万科第三个十年发展阶段的收官之年，而2014年是第四个十年段的开始。过去十年，中国房地产行业的大发展造就了众多企业的辉煌。万科也由一个年销售不足百亿的小公司，成长为全世界最大的房地产开发企业。2013年8月全国工商联合会公布的中国民营企业500强榜单中，万科的营业收入名列第九，而纳税额则排到了第二位。","importance_score":0.85,"importance_reason":"关键里程碑：万科从年销售不足百亿成长为全球最大房地产开发商，营收列民企500强第九，纳税列第二。与历史背景中2001-2003年的扩张轨迹形成完整闭环，是战略成果的最终体现。","context_brief":"万科2013年致股东信开篇，总结过去十年发展成就。","file_date":"2026-04-17"},{"id":57,"file_name":"2026-04-17.md","piece_index":12,"original_text":"面对难以准确预测的未来，因以往的成功而滋生的傲慢与麻木不仁固然危险，但反应过度的盲动和自暴自弃，同样可能导向歧途。","importance_score":0.82,"importance_reason":"战略定力的罕见表述：在行业悲观情绪和互联网泡沫双重压力下，管理层明确拒绝两种极端——过度自信与盲目跟风。结合后续历史（2022-2025年存货大幅减值、公司陷入困境），这句话具有强烈的历史预警意味，但当时未能转化为战略行动。","context_brief":"管理层对行业前景悲观论调和移动互联网热潮的双重回应。","file_date":"2026-04-17"},{"id":58,"file_name":"2026-04-17.md","piece_index":12,"original_text":"当新时代的大幕揭开时，传统企业应该做的，不是远离自己熟悉的领域，而是理解新的规则，寻找新的伙伴，运用新的工具，将原有的业务做得更好。这就是我们的答案。","importance_score":0.88,"importance_reason":"明确拒绝多元化转型，坚守专业化路线——与雅戈尔同期多品牌多元化战略形成鲜明对比。同时，这一判断在十年后（2022-2025年）随房地产行业崩塌而受到严峻考验，是理解万科战略演变的关键节点。","context_brief":"万科对互联网时代战略方向的最终表态，坚持专注房地产主业。","file_date":"2026-04-17"},{"id":59,"file_name":"2026-04-17.md","piece_index":12,"original_text":"我们相信，性价比在任何时候都是竞争力的核心。而随着产业链透明度的提高，信息不对称的减弱，在未来它会变得更加清晰和重要。","importance_score":0.7,"importance_reason":"前瞻性竞争战略表述，将性价比定位为永续竞争优势，并预判互联网将强化而非削弱这一逻辑。","context_brief":"万科对核心竞争力的判断，强调性价比在互联网时代将更凸显。","file_date":"2026-04-17"},{"id":60,"file_name":"2026-04-17.md","piece_index":12,"original_text":"我们依然可以看到，中国的城市化还远未结束。互联网时代的来临固然是世界历史的新篇章，但中国的城市化、现代化，同样是影响全球格局的重大事件。当两个伟大的进程并进之时，我们无须厚此薄彼。","importance_score":0.78,"importance_reason":"核心战略假设的公开表述：城市化支撑房地产长期需求。这一假设在2013年具有合理性，但2022年后被政策收紧和人口结构变化所颠覆，是理解万科后期战略困境的历史根源。","context_brief":"万科对行业长期逻辑的判断，以城市化持续作为坚守地产主业的根本依据。","file_date":"2026-04-17"},{"id":61,"file_name":"2026-04-17.md","piece_index":16,"original_text":"2009年的成交量，有一部分本应属于2008年——在这样的解释下，2009年创出的历史新高其实不足为奇。如果将这两年的数据平摊一下，那么2007年到2009年，全国新房成交量的年化增长率约为10%，而这恰与经济的年增长速度相接近。","importance_score":0.88,"importance_reason":"提供了核心量化框架：将两年数据平摊后年化增长率约10%，与GDP增速匹配，揭示房地产市场本质上只是经济发展缩影，是反泡沫叙事的关键论断。","context_brief":"王石在2009年报中分析房市V形反转的真实逻辑，认为2009年高成交量是2008年压抑需求的释放。","file_date":"2026-04-17"},{"id":62,"file_name":"2026-04-17.md","piece_index":16,"original_text":"在那些时间成本最高的大都市，轨道交通甚至电梯将成为最主要的交通工具，纯粹的住宅区将不再是建筑主流，取而代之的是城市综合体。","importance_score":0.78,"importance_reason":"2009年即提出城市综合体将取代纯住宅区的前瞻性判断，对应万科后来产品线多元化战略，具有战略预见价值。","context_brief":"王石分析中国城市化差异化趋势，预判大都市建筑形态演变。","file_date":"2026-04-17"},{"id":63,"file_name":"2026-04-17.md","piece_index":16,"original_text":"高速铁路网、城际交通网的兴建，也缩短了城市之间的距离。这可能加速城市带的布局，带动现有大都市周边地域的发展，甚至导致中心城市向卫星城市的逆向移民。","importance_score":0.75,"importance_reason":"2009年即预见高铁推动卫星城发展和逆向移民趋势，与后来环京、环沪楼市分化高度吻合，体现出色的战略前瞻性。","context_brief":"王石分析高铁对城市格局的影响，预判人口流向变化。","file_date":"2026-04-17"},{"id":64,"file_name":"2026-04-17.md","piece_index":16,"original_text":"中国单位建筑面积能耗可能达到发达国家的2至3倍，新建筑中八成以上为高耗能建筑，存量建筑中95%以上是高能耗建筑。根据2008年《中国建筑节能年度发展研究报告》，我国城乡建筑运行能耗约占我国商品能源总量的25.5%。","importance_score":0.72,"importance_reason":"关键行业数据，阐明绿色建筑的宏观背景，是万科将绿色建筑定位为未来核心竞争力的重要依据。","context_brief":"万科在哥本哈根气候大会前夕引用数据，论证中国建筑行业节能紧迫性。","file_date":"2026-04-17"},{"id":65,"file_name":"2026-04-17.md","piece_index":16,"original_text":"绿色竞争优势要真正作为货币化的收益清晰呈现在财务报表上，应该不会在2010年，甚至不会在未来的两三年。但作为永续经营的企业，万科将努力确保当这一趋势变为现实时，万科的客户可以率先享受到最符合绿色标准要求的产品和服务，万科的股东可以从绿色经济浪潮中获得最大程度的收益。","importance_score":0.82,"importance_reason":"罕见的前瞻性坦诚表态——明确承认3年内不产生财务回报仍坚持投入，体现万科在2009年的长期主义战略立场，与后来万科绿色建筑标准领先行业的结果形成呼应。","context_brief":"王石坦承绿色建筑短期不贡献财务收益，但明确将其作为长期战略投入。","file_date":"2026-04-17"},{"id":66,"file_name":"2026-04-17.md","piece_index":16,"original_text":"万科也已经连续两年成为全球最大住宅公司。但市场的一时起落并不需要患得患失，规模的一时扩张也并不值得如痴如醉。真实的需求与购买力才是一个行业复苏和持续成长的本原动力，而以最少资源消耗来最大程度满足客户需求的能力才是企业竞争力的最终源泉。","importance_score":0.85,"importance_reason":"在成为全球最大住宅公司后仍明确反对规模崇拜，与历史背景中2001-2003年积极扩张期形成鲜明对比，体现管理层的战略定力；也与后来2022-2025年存货大规模减值的困境形成深刻历史对照。","context_brief":"王石在规模登顶全球第一后，主动降温规模崇拜，强调效率与需求本原。","file_date":"2026-04-17"},{"id":67,"file_name":"2026-04-17.md","piece_index":19,"original_text":"2006年，万科销售金额、主营收入、净利润、开工面积、竣工面积同比增长都超过50%，为既定计划中的2006到2008三年快速发展谱写了一个良好的开篇。这一年，万科成为第一家进入全国纳税百强榜的地产企业。","importance_score":0.92,"importance_reason":"关键财务数据：五项核心指标全部超过50%增速，且是规划中三年高速发展期的开局年，与历史背景中2003年40%增速相比进一步加速，增长动能显著增强。","context_brief":"万科2006年致股东信开篇，回顾全年核心业绩。","file_date":"2026-04-17"},{"id":68,"file_name":"2026-04-17.md","piece_index":19,"original_text":"在万科看来，一切关于住宅行业长期前景的问题，其答案都包含在人口变迁之中……因此某种程度上说，经济史就是人口史，而房地产史更是人口史。","importance_score":0.88,"importance_reason":"前瞻性战略判断：将人口结构作为行业长期需求的核心分析框架，是独特且系统性的行业观，为后续三年激进扩张提供理论依据。结合历史背景，2025年万科存货跌价准备高达266亿元，这一乐观判断与20年后的现实形成鲜明反差。","context_brief":"王石在信中阐述万科对住宅行业长期繁荣底层逻辑的核心判断。","file_date":"2026-04-17"},{"id":69,"file_name":"2026-04-17.md","piece_index":19,"original_text":"房地产尤其住宅市场在我国未来至少十年、沿海城市带在未来至少二十年，仍将是最具潜力和发展空间的行业之一。","importance_score":0.95,"importance_reason":"前瞻性陈述，且可与历史背景形成跨越时间的对比验证：2022-2025年万科存货持续大幅下降、跌价准备累计达266亿元，行业深度下行，与此判断形成历史性背离，是重要的拐点参照。","context_brief":"王石对房地产行业长期前景的明确预判，时间点为2006年。","file_date":"2026-04-17"},{"id":70,"file_name":"2026-04-17.md","piece_index":19,"original_text":"1998年之后中国住宅行业的发展，既是高速的增长，但也是粗放的增长……正是这一系列的问题，催生了2005年到2006年的宏观调控，也使得行业进入了第二个转折点。在第一个转折点之后，行业实现的是量的突破，而在第二个转折点之后，行业将要跨越的是质的升华。","importance_score":0.87,"importance_reason":"重大行业判断：将宏观调控解读为行业升级的正向催化剂而非利空，认为强者恒强、集中度提升，这是万科决策三年高速扩张的重要逻辑支撑。","context_brief":"王石将2005-2006年宏观调控定义为行业第二个转折点，判断行业将从量变走向质变。","file_date":"2026-04-17"},{"id":71,"file_name":"2026-04-17.md","piece_index":19,"original_text":"在第二个转折点之后更凸显的是挑战……大型综合开发商、专业制造企业、金融企业、配套服务企业并存的全新格局……万科将义不容辞地担当起先行者的责任。这一责任，不仅包括率先实现商业模式和生产方式的变迁，而且包含引领行业承担企业公民的社会责任。","importance_score":0.82,"importance_reason":"战略声明：万科自我定位为行业变革引领者，提出标准化设计、工业化生产、社会化整合的方向，这是2006年后万科持续扩张并成为全国最大地产商的战略宣言。","context_brief":"王石描绘行业未来格局演变，并宣示万科的先行者定位。","file_date":"2026-04-17"},{"id":72,"file_name":"2026-04-17.md","piece_index":19,"original_text":"2006年，历史终于被改写，美国的前四大住宅企业，联袂进入了这个名单。其中之一的帕尔迪住宅公司，是万科在新十年的标杆企业……它现在的目标已经定到了全美国市场的20%。如果这个目标能够实现，我们看到的将是一个年销售千亿美元级别的企业。","importance_score":0.78,"importance_reason":"战略标杆与雄心展示：以帕尔迪为学习对象，隐含万科对未来超大规模的目标想象，与历史背景中2003年全国布局15城相比，战略雄心进一步跃升。","context_brief":"王石以美国帕尔迪公司为标杆，阐述住宅企业规模化路径。","file_date":"2026-04-17"},{"id":31,"file_name":"2026-04-16.md","piece_index":1,"original_text":"多元化经营，不把鸡蛋放在一个篮子里，是对还是错？在战略上，公司也进行了认真的探索。","importance_score":0.85,"importance_reason":"这是公司高层对多元化战略的公开反思，预示了后续2024年退出地产业务的重大战略转向。从2021年的质疑到2024年的退出，形成清晰的战略演变脉络。","context_brief":"雅戈尔2021年报致股东信中，李如成对公司长期坚持的多元化经营战略提出根本性质疑。","file_date":"2026-04-16"},{"id":32,"file_name":"2026-04-16.md","piece_index":1,"original_text":"雅戈尔在品牌战略上开始认真思索，几年来，雅戈尔开始实行多品牌战略，但为了控制成本，把所有品牌都放在一个店铺里运营，实际上还是一个品牌，许多品牌无非是一个品类，此消彼长，实际上没有增长。壮士割腕，品牌分拆，独立运行，公司又面临新的阵痛。","importance_score":0.82,"importance_reason":"罕见的管理层对自身战略执行失败的坦诚反思。结合2024年历史背景中'引进品牌尚未产生效益'，说明品牌战略困境持续多年未能有效解决。","context_brief":"李如成坦承多品牌战略执行失败，品牌实质上沦为品类，未带来增长，且品牌分拆独立运营造成新的阵痛。","file_date":"2026-04-16"},{"id":33,"file_name":"2026-04-16.md","piece_index":1,"original_text":"同时，公司关注起国内外品牌的收购与合作，HH、UND等运动品牌、潮牌纳入雅戈尔合作范围，但商务品牌转入运动品牌、潮牌又是一个重新学习和尝试的过程...","importance_score":0.72,"importance_reason":"揭示公司时尚转型路径——从商务服装向运动/潮牌扩展，但语气中充满不确定性。与2024年'引进品牌尚未产生效益'形成印证，说明这些尝试最终未达预期。","context_brief":"雅戈尔尝试从商务品牌跨界进入运动和潮牌领域，引入HH、UND等品牌。","file_date":"2026-04-16"},{"id":34,"file_name":"2026-04-16.md","piece_index":1,"original_text":"多产业经营雅戈尔能维持多久？新踏入的很多新兴产业雅戈尔能否成功？公司也将重新探索，有所取舍。总之，过去的一年，是雅戈尔无论从战略上还是战术上都重新转型的一年，而且必须在今后几年不断地革新，有时甚至是革命。","importance_score":0.88,"importance_reason":"这段话是2024年退出地产的重要前兆。'有所取舍'暗示将放弃部分产业，'革命'一词的激烈程度预示了后续退出经营三十多年地产业务的重大决断。","context_brief":"李如成对多产业经营的可持续性提出质疑，提出'有所取舍'和'革命'的表述。","file_date":"2026-04-16"},{"id":35,"file_name":"2026-04-16.md","piece_index":2,"original_text":"我们审时度势，及时地调整了公司的第六个五年规划，把建世界级时尚集团作为公司未来发展的主要目标。在积极做强做大雅戈尔核心品牌的同时，我们优化提升了MAYOR高端男奢品牌，又对HSM和HANP做了较大调整，分别定位为都市休闲品牌和健康环保品牌。在调整优化存量的同时，我们将国际合作品牌UND和HH逆势推向市场，并得到了市场的认同。","importance_score":0.82,"importance_reason":"揭示雅戈尔多品牌矩阵的完整布局：核心品牌雅戈尔+高端MAYOR+都市休闲HSM+健康环保HANP+国际合作UND和HH，这是公司从地产向时尚转型的关键战略路径。与2024年历史背景对比，可追溯时尚产业战略的起点。","context_brief":"雅戈尔2022年报致股东信，李如成阐述公司战略调整方向。","file_date":"2026-04-16"},{"id":36,"file_name":"2026-04-16.md","piece_index":2,"original_text":"我们出资20亿元在全国核心城市建设雅戈尔时尚体验馆，希望为品牌发展探索新的模式。","importance_score":0.78,"importance_reason":"20亿元的重大资本投入决策，体现公司对线下体验式零售的战略押注，是时尚转型中最具体的资金承诺。","context_brief":"面对线下萎缩和电商滞缓，雅戈尔探索线上线下融合新模式。","file_date":"2026-04-16"},{"id":37,"file_name":"2026-04-16.md","piece_index":2,"original_text":"在修改未来发展规划中，我们及时收缩了房产开发的投入，严防房地产的风险，保证公司未来健康稳健发展。","importance_score":0.85,"importance_reason":"与历史背景中2024年'退出运营三十多年的地产行业'形成关键时间线：2022年开始收缩→2024年彻底退出。说明地产退出是渐进过程而非突然决策，且2022年已明确将地产视为风险源。","context_brief":"2022年报中李如成提及收缩地产业务。","file_date":"2026-04-16"},{"id":38,"file_name":"2026-04-16.md","piece_index":3,"original_text":"首先，公司上下对未来的发展目标更加清晰和坚定，按照建设世界级时尚集团的目标，各项工作积极有序地推进。加大了对时尚产业的投入，缩减了其他非相关产业的投资，主题更加明确！","importance_score":0.75,"importance_reason":"明确了'建设世界级时尚集团'的战略目标，并提出缩减非相关产业投资，这是2024年正式退出地产行业的前奏信号，与历史背景中2024年退出地产的决策形成因果链。","context_brief":"雅戈尔2023年报致股东信中，李如成阐述公司战略方向。","file_date":"2026-04-16"},{"id":39,"file_name":"2026-04-16.md","piece_index":3,"original_text":"雅戈尔面临创业团队的传承问题迫在眉睫。公司更加重视对团队的培养和人才的引进，新老更替纳入制度性工作，各项班子梯队加速搭建，努力使公司发展后继有人。","importance_score":0.72,"importance_reason":"创始人李如成公开承认传承问题紧迫，属于重大公司治理信号。对于一家创业45年的企业，领导层交接是影响长期价值的关键风险因素。","context_brief":"李如成在致股东信中首次将管理层传承问题定性为'迫在眉睫'。","file_date":"2026-04-16"},{"id":40,"file_name":"2026-04-16.md","piece_index":3,"original_text":"充满期待的2023年匆匆地过去了。过去的一年，尽管公司的业绩不如预期，但也有许多地方令人回味。","importance_score":0.6,"importance_reason":"董事长直接承认业绩不如预期，措辞委婉但信号明确，结合历史背景中2024年退出地产、引进品牌尚未产生效益，反映公司正处于战略转型的阵痛期。","context_brief":"李如成对2023年业绩的总体评价。","file_date":"2026-04-16"},{"id":24,"file_name":"2026-04-15.md","piece_index":2,"original_text":"2003年，集团房地产业务进入高速增长期，并取得理想回报，全年实现营业收入人民币63.80亿元，净利润人民币5.42亿元，分别较去年增长 39.47% 和 41.80% ，每股盈利0.39元。以深圳和上海为核心的重点投资以及过去三年不断推进的二线城市扩张是保障集团业绩获得快速增长的主要因素。","importance_score":0.92,"importance_reason":"关键财务数据，营收和净利润均实现近40%的高速增长，标志着万科从专业化转型后进入高速增长期。与2002年营收45.7亿、净利润3.82亿相比，增速显著加快。","context_brief":"万科2003年年报董事长致辞，王石回顾全年业绩表现。","file_date":"2026-04-15"},{"id":25,"file_name":"2026-04-15.md","piece_index":2,"original_text":"特别值得关注的是，在深圳市场继续提供稳定增长的盈利来源的同时，上海市场在集团的盈利贡献比例大幅提升并与深圳市场的贡献旗鼓相当，上海、深圳市场的盈利贡献分别占集团净利润的 38.38%和 37.43%，这一变化基于过去三年集团对上海市场的成功投资策略。不可忽视的是，作为一家全国品牌的房地产开发商，集团在二线城市的投资亦成为集团重要的利润来源，这些城市主要包括南京、成都、沈阳、南昌、武汉和长春。","importance_score":0.88,"importance_reason":"利润结构发生重大变化——上海从新进入市场成长为与深圳旗鼓相当的利润核心，验证了2002年报提出的'以珠三角和长三角为核心的区域集约化发展'战略的成效。二线城市也开始贡献重要利润，全国化扩张战略全面兑现。","context_brief":"王石阐述万科利润结构变化，上海市场崛起与二线城市贡献。","file_date":"2026-04-15"},{"id":26,"file_name":"2026-04-15.md","piece_index":2,"original_text":"年内，集团积极开拓以深圳为核心的珠江三角洲市场、以上海为核心的长江三角洲市场以及以沈阳为核心的东北市场，并形成深圳、上海和沈阳区域管理中心。在深圳区域，集团先后进入中山和广州市场；在沈阳区域，集团进入大连和鞍山市场；在上海区域，集团积极寻求在苏南区域的合作机会。截至年末，公司已在15个城市拥有项目资源，待开发项目资源建筑面积744万平方米，为未来三年的稳定增长奠定了基础。","importance_score":0.85,"importance_reason":"战略升级——从单城市扩张转变为三大区域管理中心架构（深圳、上海、沈阳），城市数量从2001年的10个扩展到15个。待开发面积744万平方米较2001年的980万平方米有所下降，反映加速开发消化的节奏。组织架构随业务规模演进。","context_brief":"万科2003年区域扩张布局，从城市扩张升级为区域管理架构。","file_date":"2026-04-15"},{"id":27,"file_name":"2026-04-15.md","piece_index":2,"original_text":"国土资源部2002年7月1日颁布的《关于招标拍卖挂牌出让国有土地使用权规定》的政策在各地相继实施，使土地交易公开化的同时，加强了对地价支付方式和支付期限的管理，而与之相配合的中国人民银行《关于进一步加强房地产信贷业务管理的通知》禁止了商业银行对房地产开发商购买土地给予贷款，这一限制对开发商的资金状况提出了更高的要求，从长远看，有实力、有资信、有品牌的发展上将获得更大的发展空间，为此，董事会对集团未来的发展充满信心。","importance_score":0.82,"importance_reason":"重要政策环境变化——土地招拍挂制度落地和银行禁止土地贷款两项政策叠加，提高行业资金门槛。王石判断这将利好品牌龙头企业，与2002年报'政府加强监管将利好品牌领先企业'的论断一脉相承，且政策力度进一步加大。","context_brief":"王石分析2003年行业政策变化对竞争格局的影响。","file_date":"2026-04-15"},{"id":28,"file_name":"2026-04-15.md","piece_index":2,"original_text":"我们看到，随着行业的日益规范、市场需求的持续旺盛以及市场对长远增长的看好，大量新的资金通过公开土地交易的方式进入这一行业，与此同时，一批相当成熟的区域开发商开始走向全国市场，集团在土地、资金、客户、人力资源等方面面临更激烈的竞争环境。","importance_score":0.78,"importance_reason":"竞争格局出现重要变化——新资金涌入叠加区域开发商全国化，万科首次明确提出在多个维度面临'更激烈的竞争环境'，语调相比前两年更为审慎，预示行业竞争加剧的新阶段。","context_brief":"王石对行业竞争格局变化的判断。","file_date":"2026-04-15"},{"id":29,"file_name":"2026-04-15.md","piece_index":2,"original_text":"为实现公司业绩的持续增长并以期更好地回报股东，董事会在充分均衡市场和各方利益的前提下，提出了发行19.9亿元可转换公司债券的议案并获得股东大会对议案的顺利通过以及中小股东的认同，公司与投资者关系更趋成熟。","importance_score":0.75,"importance_reason":"重大融资决策——19.9亿元可转债是万科规模扩张的重要资金来源，金额相对于当年净利润5.42亿元接近4倍，反映公司以较大杠杆推动扩张的意图。","context_brief":"万科2003年提出可转债融资方案。","file_date":"2026-04-15"},{"id":30,"file_name":"2026-04-15.md","piece_index":2,"original_text":"面对集团业已具备的竞争优势以及确保三年可持续增长的条件，集团将根据未来竞争环境的变化态势，开始制定集团未来5~10年的中长期发展规划，探索公司的核心竞争力。","importance_score":0.73,"importance_reason":"前瞻性战略陈述——万科首次提出制定5-10年中长期规划，从短期的专业化转型和全国化扩张进入更高层次的战略思考阶段，标志公司发展的新里程碑。","context_brief":"王石展望2004年，提出制定中长期发展规划。","file_date":"2026-04-15"},{"id":20,"file_name":"2026-04-14.md","piece_index":1,"original_text":"截至报告期末，本集团存货金额为 9,070.6 亿元，较 2021 年底下降 15.7%。其中，拟开发产品为 1,117.0 亿元，占比 12.3%；在建开发产品 6,952.6 亿元，占比 76.7%；已完工开发产品（现房）980.7 亿元，占比 10.8%。本集团基于审慎的市场策略，对存在风险的项目计提存货跌价准备。报告期内新增计提存货跌价准备 4.5 亿元，影响归属于母公司股东的净利润 3.7 亿元。报告期末，存货跌价准备余额为 51.4 亿元。","importance_score":0.75,"importance_reason":"存货从2001年总资产64亿元规模膨胀至2022年存货单项9070亿元，体现万科二十年全国化扩张的巨大规模变化。存货同比下降15.7%和51.4亿元跌价准备余额，标志着行业下行拐点，与历史背景中2002年王石对行业'保持向上势头'的判断形成鲜明对比。","context_brief":"万科A 2022年年报中的存货分析数据，反映公司在行业下行期的资产规模与减值情况。","file_date":"2026-04-14"},{"id":21,"file_name":"2026-04-14.md","piece_index":2,"original_text":"截至报告期末，本集团存货金额为 7,017.0 亿元，较 2022 年底下降 22.6%。其中，拟开发产品为 1,019.3 亿元，占比 14.5%；在建开发产品 4,893.1 亿元，占比 69.7%；已完工开发产品（现房）1,077.4 亿元，占比 15.4%。本集团基于审慎的市场策略，对存在风险的项目计提存货跌价准备。报告期内新增计提存货跌价准备 34.9 亿元，影响归属于母公司股东的净利润 29.5 亿元。报告期末，存货跌价准备余额为 79.9 亿元。","importance_score":0.82,"importance_reason":"存货从2002年时总资产仅64亿元规模膨胀至7017亿元存货，反映万科二十年扩张的巨大体量变化。同时存货下降22.6%、新增计提跌价准备34.9亿元（影响净利润29.5亿元）、累计跌价准备达79.9亿元，标志着房地产行业下行周期中万科面临的重大资产减值压力，与历史背景中2001-2002年积极扩张、全国化布局形成鲜明对照。","context_brief":"万科A 2023年年报中的存货分析数据，反映公司房地产库存规模及资产减值情况。","file_date":"2026-04-14"},{"id":22,"file_name":"2026-04-14.md","piece_index":3,"original_text":"截至报告期末，本集团存货金额为 3,737.4 亿元，较 2024 年底下降 28.0%。其中，拟开发产品为 778.8 亿元，占比 20.8%；在建开发产品 1,788.2 亿元，占比 47.8%；已完工开发产品（现房）1,144.5 亿元，占比 30.6%。本集团基于审慎的市场策略，对存在风险的项目计提存货跌价准备，报告期内新增计提存货跌价准备 208.3 亿元。报告期末，存货跌价准备余额为 266.4 亿元。","importance_score":0.85,"importance_reason":"存货同比大幅下降28%，反映万科主动收缩规模或去化加速；新增计提跌价准备208.3亿元规模巨大，占存货总额约5.6%，表明房地产市场下行压力严峻，资产质量承压。已完工现房占比30.6%偏高，存在去化压力。与历史背景中2001-2002年万科积极扩张、全国化布局形成鲜明对比，公司已从扩张期转入收缩防御阶段。","context_brief":"万科A 2025年年报存货科目分析，反映公司房地产业务规模收缩及资产减值情况。","file_date":"2026-04-14"},{"id":23,"file_name":"2026-04-14.md","piece_index":4,"original_text":"截至报告期末，本集团存货金额为 5,190.1 亿元，较 2023 年底下降 26.0%。其中，拟开发产品为 917.1 亿元，占比 17.7%；在建开发产品 3,008.4 亿元，占比 58.0%；已完工开发产品（现房）1,239.1 亿元，占比 23.9%。本集团基于审慎的市场策略，对存在风险的项目计提存货跌价准备，报告期内新增计提存货跌价准备 70.6 亿元（此外还对非并表项目计提存货跌价准备 10.8 亿）。报告期末，存货跌价准备余额为 115.7 亿元。","importance_score":0.85,"importance_reason":"存货同比大幅下降26%，叠加70.6亿元新增跌价准备和115.7亿元跌价准备余额，揭示万科在行业下行周期中面临严重的资产减值压力。与历史背景中2001-2002年万科积极扩张、土地储备980万平方米的上升期形成鲜明对比，体现公司从扩张到收缩的战略拐点。已完工现房占比23.9%偏高，暗示去化压力较大。","context_brief":"万科A 2024年年报存货数据，反映公司资产规模及减值风险。","file_date":"2026-04-14"},{"id":372,"file_name":"2026-04-14.md","piece_index":5,"original_text":"中国2024年的人均GDP约1.3万美元，全球排名第73位，与墨西哥、马来西亚等国处于同一梯队。我们仍然只能算是一个中等收入的发展中国家，还有很长的路要走。","importance_score":0.85,"importance_reason":"指出中国人均GDP排名与其现代化成就之间的悖论，是全文核心论点的起点","context_brief":"单伟建提出中国现代性悖论","file_date":"2026-04-14"},{"id":373,"file_name":"2026-04-14.md","piece_index":5,"original_text":"一个发展中国家，何以在科技创新上取得如此的成就？何以在某些方面达到了甚至超越发达国家的「现代性」水平？我写这本书，就是想解释和回答这个问题。","importance_score":0.8,"importance_reason":"点明全文的核心研究问题，具有前瞻性思考价值","context_brief":"单伟建阐述新书《通往现代之路》的核心问题","file_date":"2026-04-14"},{"id":374,"file_name":"2026-04-14.md","piece_index":5,"original_text":"就是因为具备了这5个必要条件，所以尽管中国仍是发展中国家，但我们的现代性能够达到如此的高度，在科技领域的创新能够如此广阔，中国已经和美国同时成为了全球仅有的两个科技创新中心。","importance_score":0.92,"importance_reason":"提出中美是全球仅有的两个科技创新中心这一重大判断，基于人才、高校、风险资本、制造能力、统一大市场五个条件的分析框架","context_brief":"单伟建总结中国具备科技创新五大条件后的结论","file_date":"2026-04-14"},{"id":375,"file_name":"2026-04-14.md","piece_index":5,"original_text":"未来的增长，一定是依靠生产效率的提高和科技驱动，而中国已经具备了成为全球创新引擎的基础条件。","importance_score":0.82,"importance_reason":"对中国经济未来增长路径的战略性判断","context_brief":"单伟建对中国未来增长动力的前瞻判断","file_date":"2026-04-14"},{"id":376,"file_name":"2026-04-14.md","piece_index":5,"original_text":"2025年中国GDP增长5%，2024年也是5%，2023年是5.2%——这在任何一个国家，都是一个很可观的数字，更何况是一个这么大的国家。","importance_score":0.78,"importance_reason":"用具体数据反驳市场悲观体感，展示做投资与做生意在视角上的差异","context_brief":"单伟建用宏观数据回应市场悲观情绪","file_date":"2026-04-14"},{"id":377,"file_name":"2026-04-14.md","piece_index":5,"original_text":"到2025年底，居民存款总额超过160万亿，而当年GDP才140万亿——存款超过了GDP。试想一下，如果家庭存款释放出10%，那就是10%的GDP增长；释放出5%，也是5%的增长。","importance_score":0.88,"importance_reason":"揭示中国消费潜力的关键数据，存款超GDP是重要的宏观经济信号","context_brief":"单伟建分析中国居民储蓄与消费潜力","file_date":"2026-04-14"},{"id":378,"file_name":"2026-04-14.md","piece_index":5,"original_text":"所以我认为，中国必须从依赖出口、依赖投资，转向依赖消费——我十年前就这么认为，这是一条非走不可的路。","importance_score":0.87,"importance_reason":"资深投资人对中国经济结构转型的长期一致判断，具有重要参考价值","context_brief":"单伟建对中国经济转型方向的战略判断","file_date":"2026-04-14"},{"id":379,"file_name":"2026-04-14.md","piece_index":5,"original_text":"在投资上，我不投制造业，因为太「卷」，利润率过低；也不投出口企业，我认为那种增长难以持续。我投的是针对消费的头部企业，这就是从宏观看到的趋势——大趋势仍然是科技和消费，而不是凭体感。","importance_score":0.85,"importance_reason":"管理550亿美元资产的投资人明确表达投资方向和底层逻辑，具有市场指引价值","context_brief":"单伟建阐述投资策略与逻辑","file_date":"2026-04-14"},{"id":380,"file_name":"2026-04-14.md","piece_index":5,"original_text":"我认为，中国许多制度和治理模式，并不是事先设计好的蓝图，就像邓小平讲的「摸着石头过河」，是在应对和解决具体危机与问题的过程中逐步建立和完善起来的。","importance_score":0.83,"importance_reason":"对中国制度建设路径的深层理解，以亲历者视角总结出渐进式制度演化的规律","context_brief":"单伟建对中国制度演进路径的独特观察","file_date":"2026-04-14"},{"id":381,"file_name":"2026-04-14.md","piece_index":5,"original_text":"我对所谓的「出海」持严重保留态度。对大部分企业来说，出海不见得是件好事。过去十年，很多中国企业出海收购外国公司，搞得好的也有几个，但失败的例子很多，这是一方面。","importance_score":0.84,"importance_reason":"在出海热潮中提出逆向观点，结合地缘政治风险和中国海外净资产头寸分析，具有独特价值","context_brief":"单伟建对中国企业出海持保留态度","file_date":"2026-04-14"},{"id":382,"file_name":"2026-04-14.md","piece_index":5,"original_text":"把香港和大陆的净头寸加起来，还不算澳门，就至少有5.5万亿美元，那我们就是世界上最大的净债权国。这在当前的地缘政治格局下，我认为还是存在巨大的风险。","importance_score":0.86,"importance_
