全服務鏈條。我們始終對機械式的規模擴張保持警惕，回歸業務本質。","importance_score":0.78,"importance_reason":"经营理念的明确表态：'对机械式规模扩张保持警惕'——与万科2009年报王石在成为全球最大住宅公司之际主动警示规模崇拜高度呼应，折射行业集体反思。","context_brief":"龙湖轻资产服务业务的经营理念，明确反对规模崇拜。","file_date":"2026-04-19"},{"id":95,"file_name":"2026-04-19.md","piece_index":1,"original_text":"截止去年底，龍湖冠寓已在高能級城市開業 12.3 萬間房源，整體出租率達 95.5%。冠寓將持續通過產品迭代、品質升級，滿足青年人群城市安居的品質需求；同時積極參與存量項目改造與盤活，助力城市更新。","importance_score":0.8,"importance_reason":"关键运营数据（12.3万间、出租率95.5%）；长租公寓为'租购并举'国策的重要载体，龙湖在该赛道的规模和运营质量具有行业参考价值；参与存量改造与城市更新是未来增量空间所在。","context_brief":"龙湖长租公寓（冠寓）运营数据及战略方向。","file_date":"2026-04-19"},{"id":96,"file_name":"2026-04-19.md","piece_index":2,"original_text":"二零二四年，本集團於南京、合肥、蘇州、重慶、長沙等地新增運營 11 座天街項目，疊加既有開業項目，商業板塊以 97%的出租率（截止二零二四年末）實現經營利潤與現金流的同步穩增。商業團隊通過場景創新與消費痛點捕捉，在核心城市打造兼具活力與品質的消費空間，銷售額及客流均實現逆勢同店增長。","importance_score":0.82,"importance_reason":"97%出租率和逆势同店增长是关键经营指标，体现商业运营在地产下行期的抗周期能力，与万科同期依赖开发业务的困境形成对比。","context_brief":"龙湖集团2024年主席报告，陈序平署名。行业整体下行背景下商业板块表现。","file_date":"2026-04-19"},{"id":97,"file_name":"2026-04-19.md","piece_index":2,"original_text":"龍湖智創生活全年實現收入 114.2 億元，同比增長 8%，不斷拓寬服務半徑，住宅、商企、美居、優選及租售五大飛輪業務服務超過 325 萬戶業主，在管面積超過 4 億平方米。通過智慧科技系統升級，針對安全防控、節能降耗、空間運維等多場景管理，讓空間的使用更便捷、服務更人性化、管理更高效，客戶滿意度連續第 16 年超過 90%。","importance_score":0.75,"importance_reason":"114.2亿元收入、8%增速、4亿平方米在管面积为可量化的关键指标；连续16年满意度超90%是竞争差异化数据点。","context_brief":"物业服务板块（龙湖智创生活）2024年业绩披露。","file_date":"2026-04-19"},{"id":98,"file_name":"2026-04-19.md","piece_index":2,"original_text":"本集團穿越週期的韌性，源於對戰略定力的長期堅守、對風險底線的恪守敬畏、對客戶導向的深度錨定。我們相信，惟有穩固企業基底，才能在週期中逐步築底，進而實現高質量的轉型與發展。","importance_score":0.7,"importance_reason":"'逐步築底'表述承认公司仍处于底部调整阶段，与'穿越周期的韧性'并置，隐含对未来不确定性的审慎判断，是前瞻性立场声明。","context_brief":"主席致辞结语，阐述公司穿越周期的核心逻辑。","file_date":"2026-04-19"},{"id":99,"file_name":"2026-04-19.md","piece_index":2,"original_text":"龍湖龍智資管作為資產管理航道，通過長租公寓、產業辦公、服務式公寓、活力街區、婦兒醫院及健康養老六大業務板塊，構建出全週期、全業態的資產管理能力，全年貢獻運營收入 31.8 億元。","importance_score":0.72,"importance_reason":"31.8亿元运营收入及六大业务板块布局是可量化指标；涵盖健康养老、妇儿医院等非传统地产业态，显示多元化运营路径，与万科四大转型方向存在业态重叠可作横向对比。","context_brief":"龙湖资产管理板块（龙智资管）2024年业绩及业务结构。","file_date":"2026-04-19"},{"id":73,"file_name":"2026-04-18.md","piece_index":0,"original_text":"互为补充的房地产和投资业务使本集团在多变的经济环境中仍能取得理想业绩，这正是本集团的优势之一。本集团其他业务占用公司资源较少，随着自身业务的发展和市场的成熟，将会独立发展，井成为公司较为稳定的盈利来源之一。","importance_score":0.92,"importance_reason":"与历史背景形成鲜明对比：1993年王石将多元化（房地产+投资）定义为核心优势，而8年后（2001年）万科却将多元化视为包袱，出售万佳百货完成专业化转型。这一立场的根本逆转揭示了万科战略思维的重大演变。","context_brief":"王石1993年报致股东信，阐述万科多元化业务组合的战略逻辑。","file_date":"2026-04-18"},{"id":74,"file_name":"2026-04-18.md","piece_index":0,"original_text":"房地产业务将在重点发展上海、北京、天津、青岛、石家庄的城市居民住宅项目，同时自留部分商业及办公物业以谋取较为稳定的租金收入。股权投资业务将向参股及控股经营等领域探索，寻求新的投资机会，以期壮大公司的实业基础。增辟稳定的盈利来源。贸易业务在集团营业收入中的比重虽趋下降，但仍将占相当比重。工业项目将试图在合作加工的基础上加强自有产品的开发。娱乐和广告业务将为未来发展积蓄力量。","importance_score":0.88,"importance_reason":"记录了万科专业化转型前的多元化全貌：房地产、股权投资、贸易、工业、娱乐、广告六线并进。与2001年（仅剩房地产）和2022年（开发+经营+服务三轨）的历史节点对比，构成万科战略演变的最早基准线。自留商业物业获取租金的思路，与2022年提出的经营性不动产战略遥相呼应，跨越三十年形成回环。","context_brief":"1994年业务计划，列举万科六大业务板块的战略部署。","file_date":"2026-04-18"},{"id":75,"file_name":"2026-04-18.md","piece_index":0,"original_text":"中国运用经济紧锯等多种手段压抑通货膨胀，对税收和汇率制度进行重大改革，这将有助于中国经济的持续健康发展。然而宏观经济政策和发展形势的剧烈变化，对正迈向市场经济的企业却是严峻的挑战。","importance_score":0.78,"importance_reason":"万科在1993年将宏观调控定性为'严峻挑战'，而2006年报王石则将宏观调控重新定性为'行业升级转折点'和利好。同一公司对宏观调控的态度从防御转为进取，折射出其从规模小、抗风险能力弱到行业龙头后认知框架的根本转变。","context_brief":"1993年宏观背景描述，彼时中国正经历1993-1994年宏观调控。","file_date":"2026-04-18"},{"id":76,"file_name":"2026-04-18.md","piece_index":0,"original_text":"为适应业务发展和提高企业素质，本集团将加强与国际资本市场的联系，引进国际资本和管理经验，共同开发中国市场。","importance_score":0.72,"importance_reason":"早期万科将国际化定位为引进资本和经验的被动学习姿态；2006年报中王石则以帕尔迪为标杆主动对标，定位从学习者转向变革先锋。记录万科国际化战略从'引进来'到'对标超越'的认知演变。","context_brief":"1993年报提出国际化融资和引进外资管理经验的战略方向。","file_date":"2026-04-18"},{"id":77,"file_name":"2026-04-18.md","piece_index":1,"original_text":"以合理的地域和业务组合来降低经营风险,这是本集团在多变复杂的市场形势下能保持不断稳健发展的重要原因。","importance_score":0.88,"importance_reason":"与历史背景形成强烈反差：1994年万科以多元业务组合分散风险为战略核心，而2001年王石将退出零售等非核心业务的专业化集中定性为公司最重大战略转型，两种逻辑截然对立，揭示战略思维的根本性转变。","context_brief":"1994年报董事会展望，阐述集团核心经营哲学。","file_date":"2026-04-18"},{"id":78,"file_name":"2026-04-18.md","piece_index":1,"original_text":"同时引进国际上成熟的零售业经营管理经验,积极培养连锁零售业务,使之在数年内成为本集团业务新的增长点。零售业务将侧重在深圳拓展,以便取得规模经济和管理经验,为跨地域连锁经营作准备。","importance_score":0.92,"importance_reason":"此处积极培育的连锁零售业务正是后来的万佳百货——2001年王石将其72%股权转让给华润，作为专业化转型的标志性动作。1994年的增长点，7年后成为主动剥离的包袱，战略逆转具有重要历史意义。","context_brief":"1994年报明确将连锁零售业务列为重点培育方向，规划先深圳后全国扩张路径。","file_date":"2026-04-18"},{"id":79,"file_name":"2026-04-18.md","piece_index":1,"original_text":"工业、影视及广告业务仍将是集团盈利来源的有力补充。","importance_score":0.78,"importance_reason":"揭示1994年万科业务多元程度远超后来印象——除地产、贸易、零售外还有工业、影视、广告，这些在2001年专业化转型中均已退出，与后来'专一房地产公司'形象形成历史对比。","context_brief":"1994年万科仍保有工业、影视、广告等多元业务线。","file_date":"2026-04-18"},{"id":80,"file_name":"2026-04-18.md","piece_index":4,"original_text":"本集团零售业务连锁经营规模优势显示成效，全年零售业务实现营业收入55,021万元，盈利2,590万元，分别较上年增长88.1％和56.6％。鉴于对万佳百货发展前景的良好判断，本集团董事会决议增持万佳股份至68％。","importance_score":0.92,"importance_reason":"与历史背景形成直接矛盾：1997年董事会基于'良好判断'主动增持万佳至68%，而仅四年后（2001年）即将该72%股权全部转让给华润、完成专业化转型退出零售业。这一反转揭示战略判断的180度转向，是理解万科专业化转型时间线的关键节点。","context_brief":"万科1997年报，董事会决议增持零售业务万佳百货股份。","file_date":"2026-04-18"},{"id":81,"file_name":"2026-04-18.md","piece_index":4,"original_text":"本集团继续按照专业化的发展战略对非核心业务进行调整，年内，深圳万科工业扬声器制造厂及深圳万科供电公司股权的转让使集团资源进一步集中。","importance_score":0.85,"importance_reason":"1997年'专业化'的内涵与2001年完全不同：此时专业化是退出制造业（扬声器、供电），零售业务（万佳）和多元投资仍被保留甚至加码。这与2001年致股东信中'转让万佳股权退出零售业，专业化战略调整顺利完成'的表述形成鲜明对比，说明专业化战略的边界在持续收窄。","context_brief":"万科1997年正在推进专业化战略，但'专业化'彼时仅指退出工业制造，零售业务仍被视为核心。","file_date":"2026-04-18"},{"id":82,"file_name":"2026-04-18.md","piece_index":4,"original_text":"在过去的一年，本集团整体经营业绩令人鼓舞，实现利润总额25,043万元,税后利润18,712万元，分别较上年增长25.7％和25％；房地产在本集团的盈利份额稳定上升至67.5％，前景乐观。","importance_score":0.82,"importance_reason":"关键财务基准数据。1997年税后利润1.87亿元，增速25%，房地产占利润67.5%。对比后续数据：2001年净利润3.74亿元（增25.99%）、2002年3.82亿元、2003年5.42亿元，可完整还原万科从多元化向专业化房地产公司转型过程中的利润增长曲线。","context_brief":"万科1997年整体财务业绩及房地产业务盈利占比。","file_date":"2026-04-18"},{"id":83,"file_name":"2026-04-18.md","piece_index":4,"original_text":"本集团之核心业务房地产业务取得理想经营业绩，全年结算楼宇面积24.7万平方米，其营业额与盈利分别较上年增长71.5％和61.6％……期内，本集团在深圳、上海、北京、天津和沈阳等地增开住宅面积达35万平方米。","importance_score":0.78,"importance_reason":"1997年结算面积仅24.7万平方米，布局深圳、上海、北京、天津、沈阳5城。对比2001年已进入10城、土地储备980万平方米，以及后续成为全球最大开发商的历程，可量化全国化战略的扩张速度与规模级差。","context_brief":"1997年万科房地产业务规模及城市布局。","file_date":"2026-04-18"},{"id":84,"file_name":"2026-04-18.md","piece_index":4,"original_text":"在未来一年，深圳仍将是本集团利润中心。","importance_score":0.75,"importance_reason":"与2003年年报形成鲜明对比：2003年上海市场利润贡献首次与深圳持平（38.38% vs 37.43%），全国化战略得以兑现。1997年深圳仍是唯一利润中心，全国化布局尚在初期，这一转变历经约六年时间。","context_brief":"万科1997年对1998年的业务展望，明确深圳为核心利润来源。","file_date":"2026-04-18"},{"id":41,"file_name":"2026-04-17.md","piece_index":3,"original_text":"2022年，行业形势的严峻性远远超出了我们在年初的预计。全年商品房市场出现了有统计数据以来最大幅度的下跌。根据有关机构监测，百强房企销售额同比下降 42%。行业融资能力大幅萎缩，海外债务市场失去功能。大量房企资金链断裂，并冲击上下游。市场预期降至冰点，信心危机导致的恶性循环开始向所有企业蔓延。","importance_score":0.92,"importance_reason":"记录了中国房地产行业有统计数据以来最大幅度下跌的关键历史时刻，百强房企销售额同比下降42%，海外债务市场失去功能，大量房企资金链断裂，是行业系统性危机的标志性数据。","context_brief":"万科2022年致股东信，描述房地产行业遭遇历史性冲击。","file_date":"2026-04-17"},{"id":42,"file_name":"2026-04-17.md","piece_index":3,"original_text":"这给公司经营造成了巨大压力。所幸我们的战略选择和经营策略承受住了严苛检验。2022年，公司营业收入同比增长 11.3%，净利润同比增长 0.4%。","importance_score":0.85,"importance_reason":"关键财务数据：营收增长11.3%、净利润增长0.4%。在行业整体下跌42%的背景下实现正增长，但净利润仅增0.4%已显示盈利压力。结合历史数据——2003年营收净利润增速均约40%——万科从高增长彻底转入微增长阶段。","context_brief":"万科在行业暴跌42%的背景下仍实现正增长。","file_date":"2026-04-17"},{"id":43,"file_name":"2026-04-17.md","piece_index":3,"original_text":"我们认为，无论是从客户、城市、政策导向还是投资角度，未来行业都无法再回到对住宅开发过于依赖的往日时光，开发、经营、服务并重是唯一选择。开发业务规模不再也不应是衡量房企的唯一标准。","importance_score":0.93,"importance_reason":"重大战略判断——明确宣布住宅开发主导模式不可逆转地结束。'唯一选择'的措辞极为坚决，这是万科从开发商向综合不动产服务商转型的纲领性表述。与2003年王石时代追求规模扩张、全国化布局形成根本性对比。","context_brief":"万科管理层对行业未来的战略判断。","file_date":"2026-04-17"},{"id":44,"file_name":"2026-04-17.md","piece_index":3,"original_text":"公司的经营服务业务体现出了较强的韧性，全口径收入达到512.6亿元，同比增长 23.1%。万物云收入首次突破300亿元，并成功分拆上市。物流业务经营收入同比增长 17.9%。长租公寓业务在规模和效率上保持行业第一，领先优势继续扩大，运营管理租赁住房21.5万间，其中保障性租赁住房5.9万间。商业营业收入同比增长 14.3%，新开业25个项目，集团内资源协同整合取得较大进展。","importance_score":0.88,"importance_reason":"关键财务数据和业务结构变化：经营服务业务收入512.6亿元增长23.1%，万物云分拆上市是里程碑事件。长租公寓21.5万间行业第一。这些数据支撑了'开发、经营、服务并重'战略的可行性，是万科商业模式转型的实质性证据。","context_brief":"万科经营服务业务在开发业务承压时逆势增长。","file_date":"2026-04-17"},{"id":45,"file_name":"2026-04-17.md","piece_index":3,"original_text":"十多年的积累之下，房地产行业的资产结构已经发生了显著变化。无论是从市场未来趋势角度，还是从自身可持续发展角度，与城市同步发展，和客户共同成长，接受和学会赚小钱、长钱、辛苦钱，都尤为关键。这不仅需要企业自身变革的勇气，也需要所有市场参与者的智慧和支持。","importance_score":0.9,"importance_reason":"'赚小钱、长钱、辛苦钱'是对房地产暴利时代终结的高度概括性表达，标志着万科从追求高增长、高回报彻底转向接受低利润率的经营性收入模式。这一表述与2003年王石时期40%增速、全国化扩张的豪迈形成鲜明的历史对照。","context_brief":"万科管理层对未来盈利模式的定性表述。","file_date":"2026-04-17"},{"id":46,"file_name":"2026-04-17.md","piece_index":3,"original_text":"但也不能回避，在取得上述成绩的同时，公司全年销售金额和毛利水平出现了下滑，对未来一段时间的业绩呈现构成一定挑战。我们还远未到可以高枕无忧的时候，未来还需加倍努力。","importance_score":0.82,"importance_reason":"前瞻性预警：销售金额和毛利双降将影响未来业绩。结合历史数据——2023年存货跌价准备34.9亿、2024年70.6亿、2025年208.3亿——这段预警在事后看来严重低估了后续冲击的烈度，'一定挑战'的表述过于保守。","context_brief":"万科坦承销售和毛利下滑对未来构成挑战。","file_date":"2026-04-17"},{"id":47,"file_name":"2026-04-17.md","piece_index":3,"original_text":"公司以确保安全为首要目标，继续保持业内领先信用评级，成为市场中为数不多还能依靠自身信用发行债券的房地产企业。与此同时，我们的债务结构明显优化，长期负债占比提高，新增融资成本下降，进一步提高了抗风险能力。","importance_score":0.78,"importance_reason":"2022年万科仍能依靠自身信用发债，是行业信用分化的重要标志。但结合后续2024-2025年万科面临的巨额存货减值（累计跌价准备266.4亿元），这段对安全性的自信在事后需要重新审视。","context_brief":"万科强调自身在行业信用危机中的安全地位。","file_date":"2026-04-17"},{"id":48,"file_name":"2026-04-17.md","piece_index":3,"original_text":"面对市场下行、交付洪峰和施工时间受限三重问题的叠加，我们动员全部资源和力量，克服重重困难，确保了超过34万套新房交付，进一步巩固了消费者对万科的信赖。新增投资的精准度和投后管理进一步优化，新项目的质量明显提高，全年权益总投496亿元，已开项目投资兑现度近 90%。","importance_score":0.76,"importance_reason":"关键经营数据：34万套交付、496亿元权益投资、90%兑现度。在行业信用崩塌背景下保交付是关键竞争优势。同时坦承'过去几年投资追高冒进、操盘离散度过大'，是对此前扩张策略失误的反思。","context_brief":"万科2022年交付和投资数据。","file_date":"2026-04-17"},{"id":49,"file_name":"2026-04-17.md","piece_index":4,"original_text":"2021年，对万科集团来说，是我们进入新发展阶段以来刻骨铭心的一年。这一年，尽管公司仍然保持经营稳健，但净利润继1995年、2008年后，出现上市31年以来第三次下滑，交出这样的成绩单，我倍感压力，内心充满紧迫感。","importance_score":0.9,"importance_reason":"净利润31年来仅第三次下滑，标志万科从高速增长进入下行拐点。结合历史数据，2022-2025年跌价准备从4.5亿飙升至208.3亿，说明这封信中的危机感远未充分反映后续恶化程度。","context_brief":"万科2021年致股东信开篇，郁亮直面净利润下滑。","file_date":"2026-04-17"},{"id":50,"file_name":"2026-04-17.md","piece_index":4,"original_text":"公司营业收入4,528亿元，同比仅增长 8.0%，归属于上市公司股东的净利润225亿元，同比下降45.7%。尤其是净利润指标，相较于股东期望和我们自身追求，有很大的差距。","importance_score":0.95,"importance_reason":"净利润下降45.7%是关键财务数据。与2003年王石致股东信中营收和净利润均增长约40%形成历史性反转，万科从高速扩张期彻底转入收缩期。","context_brief":"万科2021年核心财务数据披露。","file_date":"2026-04-17"},{"id":51,"file_name":"2026-04-17.md","piece_index":4,"original_text":"近几年来，土地市场竞争激烈，对行业毛利率水平造成明显影响，尽管公司在行业中较早意识到高速增长终将结束，但惭愧的是，我们的行为未能坚决摆脱高增长惯性。当追逐规模仍然流行、土地争夺愈演愈烈的时候，部分城市的投资追高冒进，对市场判断过于乐观，一些项目的投资预期没有实现，导致毛利率下滑。","importance_score":0.92,"importance_reason":"管理层罕见的自我批评和战略失误检讨。承认'知道但没做到'——早已意识到增长放缓却未能控制扩张冲动，这一认知-行为脱节是理解万科后续危机的关键。","context_brief":"郁亮反思万科未能摆脱高增长惯性，部分城市投资追高冒进。","file_date":"2026-04-17"},{"id":52,"file_name":"2026-04-17.md","piece_index":4,"original_text":"充分授权、分布式实施是万科过往快速发展的机制保障。在追求效率优先的高速增长阶段，这一机制能更快地响应市场、捕捉机会，最大程度地释放前线战斗力。随着业务复杂度逐步提高，市场竞争日趋激烈，部分城市公司暴露出能力短板。尽管我们依然拥有一批优秀公司和拔尖人才，但操盘表现离散度在上升。","importance_score":0.82,"importance_reason":"揭示万科组织管理模式从优势变为劣势的转折。2003年王石信中骄傲地描述深圳、上海、沈阳三大区域管理中心的扩张架构，到2021年同样的分布式架构成为能力参差不齐的根源。","context_brief":"郁亮反思万科分布式管理机制在新阶段的弊端。","file_date":"2026-04-17"},{"id":53,"file_name":"2026-04-17.md","piece_index":4,"original_text":"我们最终将物业服务、物流仓储、长租公寓和商业确定为主要方向。","importance_score":0.78,"importance_reason":"明确万科从纯开发商向'城市配套服务商'转型的四条新赛道。结合后续数据（2022-2025年存货持续大幅下降），开发业务收缩后这些业务的成败决定万科未来。","context_brief":"万科确定四大经营服务业务方向。","file_date":"2026-04-17"},{"id":54,"file_name":"2026-04-17.md","piece_index":4,"original_text":"万物云收入首次超过200亿元，同比增长 32.1%。……万纬物流近三年收入复合增速 52%，其中2021年收入32亿元，同比增长 69%，稳定期项目NOI率达到 6.5%。……泊寓开业15.95万间，全年平均出租率 95%……印力近五年收入复合增速为 20%，其中2021年收入同比增长 24%。","importance_score":0.85,"importance_reason":"四大新业务均保持高速增长，是万科转型成效的关键证据。但郁亮也坦承'这些业务现在及将来都无法与房地产开发相提并论'，新旧业务体量差距巨大。","context_brief":"万科四大经营服务业务2021年经营数据汇总。","file_date":"2026-04-17"},{"id":55,"file_name":"2026-04-17.md","piece_index":4,"original_text":"我相信，这些行动和努力，将支撑公司在2022年实现营业收入和净利润企稳回升，并为未来价值增长打下基础。","importance_score":0.88,"importance_reason":"这一前瞻性承诺与历史数据严重矛盾——2022年存货跌价准备仅4.5亿看似平稳，但2023年跳升至34.9亿，2024年70.6亿，2025年208.3亿，说明所谓'企稳回升'完全未能实现，局势持续恶化。这是判断管理层预判能力的重要标尺。","context_brief":"郁亮对2022年业绩企稳回升的承诺。","file_date":"2026-04-17"},{"id":56,"file_name":"2026-04-17.md","piece_index":12,"original_text":"2013年是万科第三个十年发展阶段的收官之年，而2014年是第四个十年段的开始。过去十年，中国房地产行业的大发展造就了众多企业的辉煌。万科也由一个年销售不足百亿的小公司，成长为全世界最大的房地产开发企业。2013年8月全国工商联合会公布的中国民营企业500强榜单中，万科的营业收入名列第九，而纳税额则排到了第二位。","importance_score":0.85,"importance_reason":"关键里程碑：万科从年销售不足百亿成长为全球最大房地产开发商，营收列民企500强第九，纳税列第二。与历史背景中2001-2003年的扩张轨迹形成完整闭环，是战略成果的最终体现。","context_brief":"万科2013年致股东信开篇，总结过去十年发展成就。","file_date":"2026-04-17"},{"id":57,"file_name":"2026-04-17.md","piece_index":12,"original_text":"面对难以准确预测的未来，因以往的成功而滋生的傲慢与麻木不仁固然危险，但反应过度的盲动和自暴自弃，同样可能导向歧途。","importance_score":0.82,"importance_reason":"战略定力的罕见表述：在行业悲观情绪和互联网泡沫双重压力下，管理层明确拒绝两种极端——过度自信与盲目跟风。结合后续历史（2022-2025年存货大幅减值、公司陷入困境），这句话具有强烈的历史预警意味，但当时未能转化为战略行动。","context_brief":"管理层对行业前景悲观论调和移动互联网热潮的双重回应。","file_date":"2026-04-17"},{"id":58,"file_name":"2026-04-17.md","piece_index":12,"original_text":"当新时代的大幕揭开时，传统企业应该做的，不是远离自己熟悉的领域，而是理解新的规则，寻找新的伙伴，运用新的工具，将原有的业务做得更好。这就是我们的答案。","importance_score":0.88,"importance_reason":"明确拒绝多元化转型，坚守专业化路线——与雅戈尔同期多品牌多元化战略形成鲜明对比。同时，这一判断在十年后（2022-2025年）随房地产行业崩塌而受到严峻考验，是理解万科战略演变的关键节点。","context_brief":"万科对互联网时代战略方向的最终表态，坚持专注房地产主业。","file_date":"2026-04-17"},{"id":59,"file_name":"2026-04-17.md","piece_index":12,"original_text":"我们相信，性价比在任何时候都是竞争力的核心。而随着产业链透明度的提高，信息不对称的减弱，在未来它会变得更加清晰和重要。","importance_score":0.7,"importance_reason":"前瞻性竞争战略表述，将性价比定位为永续竞争优势，并预判互联网将强化而非削弱这一逻辑。","context_brief":"万科对核心竞争力的判断，强调性价比在互联网时代将更凸显。","file_date":"2026-04-17"},{"id":60,"file_name":"2026-04-17.md","piece_index":12,"original_text":"我们依然可以看到，中国的城市化还远未结束。互联网时代的来临固然是世界历史的新篇章，但中国的城市化、现代化，同样是影响全球格局的重大事件。当两个伟大的进程并进之时，我们无须厚此薄彼。","importance_score":0.78,"importance_reason":"核心战略假设的公开表述：城市化支撑房地产长期需求。这一假设在2013年具有合理性，但2022年后被政策收紧和人口结构变化所颠覆，是理解万科后期战略困境的历史根源。","context_brief":"万科对行业长期逻辑的判断，以城市化持续作为坚守地产主业的根本依据。","file_date":"2026-04-17"},{"id":61,"file_name":"2026-04-17.md","piece_index":16,"original_text":"2009年的成交量，有一部分本应属于2008年——在这样的解释下，2009年创出的历史新高其实不足为奇。如果将这两年的数据平摊一下，那么2007年到2009年，全国新房成交量的年化增长率约为10%，而这恰与经济的年增长速度相接近。","importance_score":0.88,"importance_reason":"提供了核心量化框架：将两年数据平摊后年化增长率约10%，与GDP增速匹配，揭示房地产市场本质上只是经济发展缩影，是反泡沫叙事的关键论断。","context_brief":"王石在2009年报中分析房市V形反转的真实逻辑，认为2009年高成交量是2008年压抑需求的释放。","file_date":"2026-04-17"},{"id":62,"file_name":"2026-04-17.md","piece_index":16,"original_text":"在那些时间成本最高的大都市，轨道交通甚至电梯将成为最主要的交通工具，纯粹的住宅区将不再是建筑主流，取而代之的是城市综合体。","importance_score":0.78,"importance_reason":"2009年即提出城市综合体将取代纯住宅区的前瞻性判断，对应万科后来产品线多元化战略，具有战略预见价值。","context_brief":"王石分析中国城市化差异化趋势，预判大都市建筑形态演变。","file_date":"2026-04-17"},{"id":63,"file_name":"2026-04-17.md","piece_index":16,"original_text":"高速铁路网、城际交通网的兴建，也缩短了城市之间的距离。这可能加速城市带的布局，带动现有大都市周边地域的发展，甚至导致中心城市向卫星城市的逆向移民。","importance_score":0.75,"importance_reason":"2009年即预见高铁推动卫星城发展和逆向移民趋势，与后来环京、环沪楼市分化高度吻合，体现出色的战略前瞻性。","context_brief":"王石分析高铁对城市格局的影响，预判人口流向变化。","file_date":"2026-04-17"},{"id":64,"file_name":"2026-04-17.md","piece_index":16,"original_text":"中国单位建筑面积能耗可能达到发达国家的2至3倍，新建筑中八成以上为高耗能建筑，存量建筑中95%以上是高能耗建筑。根据2008年《中国建筑节能年度发展研究报告》，我国城乡建筑运行能耗约占我国商品能源总量的25.5%。","importance_score":0.72,"importance_reason":"关键行业数据，阐明绿色建筑的宏观背景，是万科将绿色建筑定位为未来核心竞争力的重要依据。","context_brief":"万科在哥本哈根气候大会前夕引用数据，论证中国建筑行业节能紧迫性。","file_date":"2026-04-17"},{"id":65,"file_name":"2026-04-17.md","piece_index":16,"original_text":"绿色竞争优势要真正作为货币化的收益清晰呈现在财务报表上，应该不会在2010年，甚至不会在未来的两三年。但作为永续经营的企业，万科将努力确保当这一趋势变为现实时，万科的客户可以率先享受到最符合绿色标准要求的产品和服务，万科的股东可以从绿色经济浪潮中获得最大程度的收益。","importance_score":0.82,"importance_reason":"罕见的前瞻性坦诚表态——明确承认3年内不产生财务回报仍坚持投入，体现万科在2009年的长期主义战略立场，与后来万科绿色建筑标准领先行业的结果形成呼应。","context_brief":"王石坦承绿色建筑短期不贡献财务收益，但明确将其作为长期战略投入。","file_date":"2026-04-17"},{"id":66,"file_name":"2026-04-17.md","piece_index":16,"original_text":"万科也已经连续两年成为全球最大住宅公司。但市场的一时起落并不需要患得患失，规模的一时扩张也并不值得如痴如醉。真实的需求与购买力才是一个行业复苏和持续成长的本原动力，而以最少资源消耗来最大程度满足客户需求的能力才是企业竞争力的最终源泉。","importance_score":0.85,"importance_reason":"在成为全球最大住宅公司后仍明确反对规模崇拜，与历史背景中2001-2003年积极扩张期形成鲜明对比，体现管理层的战略定力；也与后来2022-2025年存货大规模减值的困境形成深刻历史对照。","context_brief":"王石在规模登顶全球第一后，主动降温规模崇拜，强调效率与需求本原。","file_date":"2026-04-17"},{"id":67,"file_name":"2026-04-17.md","piece_index":19,"original_text":"2006年，万科销售金额、主营收入、净利润、开工面积、竣工面积同比增长都超过50%，为既定计划中的2006到2008三年快速发展谱写了一个良好的开篇。这一年，万科成为第一家进入全国纳税百强榜的地产企业。","importance_score":0.92,"importance_reason":"关键财务数据：五项核心指标全部超过50%增速，且是规划中三年高速发展期的开局年，与历史背景中2003年40%增速相比进一步加速，增长动能显著增强。","context_brief":"万科2006年致股东信开篇，回顾全年核心业绩。","file_date":"2026-04-17"},{"id":68,"file_name":"2026-04-17.md","piece_index":19,"original_text":"在万科看来，一切关于住宅行业长期前景的问题，其答案都包含在人口变迁之中……因此某种程度上说，经济史就是人口史，而房地产史更是人口史。","importance_score":0.88,"importance_reason":"前瞻性战略判断：将人口结构作为行业长期需求的核心分析框架，是独特且系统性的行业观，为后续三年激进扩张提供理论依据。结合历史背景，2025年万科存货跌价准备高达266亿元，这一乐观判断与20年后的现实形成鲜明反差。","context_brief":"王石在信中阐述万科对住宅行业长期繁荣底层逻辑的核心判断。","file_date":"2026-04-17"},{"id":69,"file_name":"2026-04-17.md","piece_index":19,"original_text":"房地产尤其住宅市场在我国未来至少十年、沿海城市带在未来至少二十年，仍将是最具潜力和发展空间的行业之一。","importance_score":0.95,"importance_reason":"前瞻性陈述，且可与历史背景形成跨越时间的对比验证：2022-2025年万科存货持续大幅下降、跌价准备累计达266亿元，行业深度下行，与此判断形成历史性背离，是重要的拐点参照。","context_brief":"王石对房地产行业长期前景的明确预判，时间点为2006年。","file_date":"2026-04-17"},{"id":70,"file_name":"2026-04-17.md","piece_index":19,"original_text":"1998年之后中国住宅行业的发展，既是高速的增长，但也是粗放的增长……正是这一系列的问题，催生了2005年到2006年的宏观调控，也使得行业进入了第二个转折点。在第一个转折点之后，行业实现的是量的突破，而在第二个转折点之后，行业将要跨越的是质的升华。","importance_score":0.87,"importance_reason":"重大行业判断：将宏观调控解读为行业升级的正向催化剂而非利空，认为强者恒强、集中度提升，这是万科决策三年高速扩张的重要逻辑支撑。","context_brief":"王石将2005-2006年宏观调控定义为行业第二个转折点，判断行业将从量变走向质变。","file_date":"2026-04-17"},{"id":71,"file_name":"2026-04-17.md","piece_index":19,"original_text":"在第二个转折点之后更凸显的是挑战……大型综合开发商、专业制造企业、金融企业、配套服务企业并存的全新格局……万科将义不容辞地担当起先行者的责任。这一责任，不仅包括率先实现商业模式和生产方式的变迁，而且包含引领行业承担企业公民的社会责任。","importance_score":0.82,"importance_reason":"战略声明：万科自我定位为行业变革引领者，提出标准化设计、工业化生产、社会化整合的方向，这是2006年后万科持续扩张并成为全国最大地产商的战略宣言。","context_brief":"王石描绘行业未来格局演变，并宣示万科的先行者定位。","file_date":"2026-04-17"},{"id":72,"file_name":"2026-04-17.md","piece_index":19,"original_text":"2006年，历史终于被改写，美国的前四大住宅企业，联袂进入了这个名单。其中之一的帕尔迪住宅公司，是万科在新十年的标杆企业……它现在的目标已经定到了全美国市场的20%。如果这个目标能够实现，我们看到的将是一个年销售千亿美元级别的企业。","importance_score":0.78,"importance_reason":"战略标杆与雄心展示：以帕尔迪为学习对象，隐含万科对未来超大规模的目标想象，与历史背景中2003年全国布局15城相比，战略雄心进一步跃升。","context_brief":"王石以美国帕尔迪公司为标杆，阐述住宅企业规模化路径。","file_date":"2026-04-17"},{"id":567,"file_name":"2026-04-17.md","piece_index":20,"original_text":"我们可以用这样的逻辑，对近三年来行业的剧烈波动做出一种更质朴的解读。2007年繁荣的上半段并非完全缺少合理性，但在下半程的亢奋中，一定程度上脱离了真实的购买力。即使没有外部环境的变化，2008年的调整恐怕也难以避免。但在观望气氛笼罩的2008年，真实的购买力也并未消失，只是在等待中不断蓄积而已；而企业库存不断增加的另一种表述，是可售资源也在同步累积。这两大存量在2009年同时释放，自然造就了成交量的井喷。\n\n2009年的成交量，有一部分本应属于2008年一一在这样的解释下，2009年创出的历史新高其实不足为奇。如果将这两年的数据平摊一下，那么2007年到2009年，全国新房成交量的年化增长率约为 10% ，而这恰与经济的年增长速度相接近。","importance_score":0.656,"importance_reason":"提出房地产成交量波动的'蓄水池-释放'模型，将三年剧烈波动归因为需求在时间轴上的重新分配而非基本面变化，得出年化10%增长率与GDP增速匹配的判断。这一分析框架可与赵燕菁的房地产信用理论形成对照——赵燕菁强调房地产的货币创造功能，万科管理层则更强调真实居住需求。","context_brief":"万科2009年年报致股东，管理层对2007-2009年房地产市场剧烈波动的解读。","file_date":"2026-04-17"},{"id":568,"file_name":"2026-04-17.md","piece_index":20,"original_text":"无论有多少流动性进出于住宅市场，也无论购房者中有多少是投资性质，房屋存在最终的唯一价值和意义是有人居住在其中。因此对于住宅企业来说，只有两个课题是永恒的：其一是发现那些尚未得到满足的需求并设法去满足它；其二是对于那些在交易活动中已经存在的需求，尝试用更少的资源消耗去满足它。","importance_score":0.6400000000000001,"importance_reason":"万科管理层在行业最狂热时刻明确否定投资属性、回归居住本质的宣言。然而对照秦朔后来揭露的'影子万科'博商系体外循环——管理层自身恰恰在利用杠杆进行房地产投资套利——这段声明具有强烈的讽刺意味，知行合一的失败预埋了后来巨亏的种子。","context_brief":"万科2009年年报，管理层在市场V形反转后对住宅行业本质的哲学阐述。","file_date":"2026-04-17"},{"id":569,"file_name":"2026-04-17.md","piece_index":20,"original_text":"但全球金融风暴已经对这种高度外向型的模式提出了挑战。作为一个幅员广阔的庞大经济体，中国也具备主要依托内部供求延续经济发展的必要性和可能性。在中国腹地，未来可能出现更多的产业中心、贸易中心、物流中心甚至研发信息中心。\n\n高速铁路网、城际交通网的兴建，也缩短了城市之间的距离。这可能加速城市带的布局，带动现有大都市周边地域的发展，甚至导致中心城市向卫星城市的逆向移民。","importance_score":0.576,"importance_reason":"2009年即预判中国经济从出口导向转向内需驱动、城市化从沿海单极转向多中心格局，与单伟建2026年仍在呼吁的'从出口投资驱动转向消费驱动'形成跨越17年的呼应，说明这一转型之艰难与漫长。同时高铁网带动卫星城市的判断后来确实成为现实。","context_brief":"万科2009年年报，管理层对城市化模式从沿海集中向内地多中心转型的前瞻性判断。","file_date":"2026-04-17"},{"id":570,"file_name":"2026-04-17.md","piece_index":20,"original_text":"据统计，中国单位建筑面积能耗可能达到发达国家的2至3倍，新建筑中八成以上为高耗能建筑，存量建筑中 95%以上是高能耗建筑。根据2008年《中国建筑节能年度发展研究报告》，我国城乡建筑运行能耗约占我国商品能源总量的 25.5% ，而如果考虑建设过程中的能耗，则建筑行业相关能耗比例将更高。","importance_score":0.46399999999999997,"importance_reason":"提供了2009年时点中国建筑行业能耗的关键基准数据，可与赵燕菁提出的基础设施建设标准与运营收入结构性错配问题关联——高标准建设叠加高能耗运营意味着更沉重的维护负担。","context_brief":"万科2009年年报，讨论绿色建筑时引用的行业能耗数据。","file_date":"2026-04-17"},{"id":571,"file_name":"2026-04-17.md","piece_index":20,"original_text":"香港提供了一个可供深思的案例。作为中国最发达的城市，香港中产阶级的收入水平远高于任何一个内地城市，但香港中产阶级的人均居住面积却可能少于任何一个内地城市。这一点无法用人口密度来简单理解，因为深圳的人口密度已经超过香港。金融等高端服务业是香港最重要的产业；香港的工作效率在全球可能也是出类拔萃的——这也意味着，这里有着全中国最高的时间成本。——或许，这是更合理的诠释。","importance_score":0.496,"importance_reason":"提出'时间成本决定城市居住形态'的独特分析框架，暗示高收入城市将走向更集约的居住模式。这一逻辑为后文预判'城市综合体取代纯住宅区'提供了理论基础。","context_brief":"万科2009年年报，用'时间成本'而非人口密度解释香港居住空间逼仄的原因。","file_date":"2026-04-17"},{"id":572,"file_name":"2026-04-17.md","piece_index":20,"original_text":"2009再次揭示了这个行业难以平静的宿命。2007的刹那芳华，2008的哀鸿遍野，再到2009的柳暗花明，短短三年间，季节冷暖已是几度轮回。\n\n我们正航行在世界房地产有史以来最宽阔的海域。或许正因为如此，我们领略了同样前所未有的波澜起伏。然而，无论波谷处的压抑还是浪峰时的激越，都不应使我们遗忘此行的目标与既定的航线；在波浪的下方潜藏着大海的深邃，而那才是更为永恒的哲理。","importance_score":0.52,"importance_reason":"万科管理层对2007-2009年房地产行业剧烈周期的文学化总结。回看历史，2007-2009的'季节轮回'不过是序曲——2021年至今的下行周期远更深重，万科自身2024-2025年合计亏损近1380亿元，'最宽阔海域'上的风暴远超当年想象。","context_brief":"万科2009年年报开篇，对行业三年剧烈波动的感慨。","file_date":"2026-04-17"},{"id":573,"file_name":"2026-04-17.md","piece_index":21,"original_text":"回顾2008并非易事一一这一年有如此众多的事件发生，这一年与2007的反差如此强烈。无论对中国住宅行业还是万科而言，2008显然无法以辉煌载入史册。但惟其如此，它带来了更多引人深思的内容，而这或许是我们得以在2008收获的最大财富。","importance_score":0.27999999999999997,"importance_reason":"这段定调确认了2008年对万科和整个住宅行业是困难之年，与2007年形成'强烈反差'。结合已知背景——2008年金融危机、中海地产净负债率从30%升至46.8%——万科管理层对行业转折点的公开承认具有信号意义。措辞中'无法以辉煌载入史册'的克制表达，以及将困难重新定义为'最大财富'的修辞策略，体现了万科在危机中的叙事框架。","context_brief":"万科2008年年报致股东开篇，王石对2008年的总体定调。","file_date":"2026-04-17"},{"id":574,"file_name":"2026-04-17.md","piece_index":24,"original_text":"万科在2007年下半年的购地行为，被舆论所高度关注。但万科放弃的地块有多少，恐怕并不为外界所知。而万科在2007年销售额增长超过一倍的情况下，购置土地面积反而低于2006年，这一事实则多少被忽略了。\n\n2007年土地价格出现了远高于房价的大幅上涨，到下半年更达到了历史的顶峰。在这样的情况下，企业除非完全停止购地，否则购入的一定是高价土地。","importance_score":0.68,"importance_reason":"提供了万科2007年'预警但仍拿地'的具体辩护逻辑和关键数据（销售额增超一倍、购地面积低于2006年），与已验证洞察中中海地产同期'措辞审慎、行动激进'形成直接对照——万科的叙事是'行动已克制但无法完全停止'，中海则是新增土储同比增58%创纪录。","context_brief":"万科回应外界质疑其2007年下半年高价拿地行为，强调销售额翻倍但购地面积低于2006年，且土地市场当时处于历史顶峰。","file_date":"2026-04-17"},{"id":575,"file_name":"2026-04-17.md","piece_index":24,"original_text":"但完全停止购地，这是一个不容易作出的决定。土地不同于其他的生产原料，难以从市场上随时购得，企业如不能提前购入一定量土地，经营的持续性都会遭遇挑战，更遑论发展。而万科是全球大型住宅企业当中，土地保有年限最短的企业之一；从2004年开始，万科每年年底的土地储备量，都低于未来两年的开工量。对万科而言，完全停止购地，是一个非常极端的决定。","importance_score":0.656,"importance_reason":"揭示万科独特的低土储经营模式，这一结构性特征既是其'不得不在高位拿地'的客观约束，也是理解其后续十余年周期应对能力的关键参数。与中海2007年大举囤地形成截然不同的策略选择。","context_brief":"万科解释其低土地储备策略——自2004年起年底土储量始终低于未来两年开工量，为全球大型住宅企业中土地保有年限最短之一。","file_date":"2026-04-17"},{"id":576,"file_name":"2026-04-17.md","piece_index":24,"original_text":"稳健的经营风格，来自于内心深处的敬畏。在我们看来，世界充满不确定性，而我们的认知能力是有限的。市场中许多机会稍纵即逝，企业需要及时作出决定。但与此同时，我们需要对自身理性的局限有清醒的认识，尤其当我们的观点与市场普遍看法存在巨大差异的时候，对自信保持一定的克制，恐怕是应该的。\n\n锐利的观察和鲜明的观点，这是我们一直期望能够不断提升的一种能力。但如果离开谨慎行事的自制力，则这种能力给企业带来的，可能不仅仅是成功和辉煌。","importance_score":0.7040000000000001,"importance_reason":"这段经营哲学与后来万科的实际轨迹形成深刻反讽：秦朔分析的'影子万科'博商系体外循环、郁亮'我们要成为主人'的意识异化，恰恰展示了这种'对自信的克制'在行业狂飙期的失效。2007年的审慎自省与后来的治理失控构成了跨越十余年的戏剧性对照。","context_brief":"万科管理层阐述'锐见与慎行'的经营哲学——承认认知局限，强调对自信的克制。","file_date":"2026-04-17"},{"id":577,"file_name":"2026-04-17.md","piece_index":24,"original_text":"作出极端行为，是一种大胆、但风险很高的经营风格。极端行为可能带来伟大的成功，但也可能招致致命的失误。从万科的企业性格来看，稳健经营是万科一贯坚持的风格。恐怕我们宁可放弃伟大成功的机会，也要确保不犯下致命的错误。","importance_score":0.68,"importance_reason":"这一宣言与万科2024-2025年连续巨亏（494.78亿+885.56亿）的结局形成极其尖锐的矛盾。万科最终恰恰犯下了'致命的错误'——不是因为极端行为，而是因为治理层面的渐进偏离（体外循环、关联交易），这比极端行为更难自我察觉。","context_brief":"万科明确宣示'宁可放弃伟大成功也不犯致命错误'的企业性格。","file_date":"2026-04-17"},{"id":578,"file_name":"2026-04-17.md","piece_index":26,"original_text":"遗憾的是，在2007年，尽管在行业宏观趋势上做出了基本正确的判断，但我们在牛市的大环境中并未能完全脱俗。过于舒适的环境，使得我们在经营细节上暴露出诸多不足，我们一些专业能力表现甚至出现了下滑的迹象。这已经成为2009年万科面临的最大挑战之一。","importance_score":0.6240000000000001,"importance_reason":"这是万科管理层罕见的公开承认'判断正确但执行失控'的自我批评，与已验证洞察中秦朔所揭示的万科治理悲剧形成早期映照——'在房地产狂飙突进的大时代不断发酵'的问题根源在2007年已有端倪。万科承认'未能完全脱俗'，与中海地产同期'措辞审慎、行动激进'的模式高度相似，但两者后续分化明显：中海2009年立即将净负债率从46.8%压降至22.4%，而万科的治理偏离在此后十余年持续加深，最终演化为'影子万科'体外循环体系。","context_brief":"万科2008年年报致股东信中，管理层反思2007年牛市中的经营失误。","file_date":"2026-04-17"},{"id":579,"file_name":"2026-04-17.md","piece_index":29,"original_text":"而在万科看来，一切关于住宅行业长期前景的问题，其答案都包含在人口变迁之中。\n\n如果深入剖析世界近现代经济的缔造与发展历史，就会发现，对于任何一个基本具备市场经济制度框架的经济体，只要是资源可以基本自由流动，其人口变迁就几乎是经济成长的缩影。近现代工商业的发展过程，其实也就是人们逐渐聚集到城市居住的过程。当人们开始密集居住的时候，工商业的交易费用才能有效降低，更复杂的社会分工、合作才成为可能。","importance_score":0.6000000000000001,"importance_reason":"万科将人口变迁确立为行业分析的核心框架，这一判断在当时具有前瞻性，但与赵燕菁后来提出的'房地产本位货币'框架形成对照——万科侧重需求端（人口/城市化），赵燕菁侧重金融端（抵押品/货币创造）。两种框架对行业转折点的预判能力截然不同。","context_brief":"万科2006年年报中对住宅行业长期前景的理论判断，将人口变迁视为经济与房地产的根本驱动力。","file_date":"2026-04-17"},{"id":580,"file_name":"2026-04-17.md","piece_index":29,"original_text":"而中国当前的人口结构，还有一个特殊的因素，那就是人口红利使得中国经济20多年来维持着全球最为强劲的增长。上世纪80年代之后，我国总人口中劳动适龄人口的比重不断上升，抚养比不断下降。 20-60岁人口为财富创造期，目前我国该阶段人口占总人口比例仍超过 60% ，这种特殊人口结构至少10年内不会发生骤变。而自上世纪以来持续的以年轻人口为主、朝向沿海地区迁徙的趋势，将使得沿海城市带的人口红利延续得更为持久。\n\n1981年至2005年，仅仅25年的时间，我国城市化率由 20%迅速跃升至 43%；而与发达国家 80%以上的城市化率相比，仍有大幅度的提升空间。未来10多年中，预计中国的城市化水平仍将保持年均 1%左右的增长速度。","importance_score":0.6400000000000001,"importance_reason":"提供了2006年时点的关键人口与城市化数据（城市化率43%、20-60岁人口占比超60%、预计年均1%城市化增速）。与黄奇帆后来披露的数据（人均住房41.76平方米）对照，可追踪从'供不应求'到'趋于饱和'的历史拐点。万科'至少10年不会骤变'的判断大致正确，但未预见2015年后人口结构加速恶化。","context_brief":"万科2006年年报援引人口红利和城市化率数据，论证住宅市场的长期增长空间。","file_date":"2026-04-17"},{"id":581,"file_name":"2026-04-17.md","piece_index":29,"original_text":"因此，房地产尤其住宅市场在我国未来至少十年、沿海城市带在未来至少二十年，仍将是最具潜力和发展空间的行业之一。","importance_score":0.68,"importance_reason":"这是万科对行业黄金期的明确定量预判：全国至少十年（至2016年）、沿海至少二十年（至2026年）。事后验证：全国层面2021年见顶基本符合'至少十年'，但'至少二十年'的沿海预判在2024-2025年被打破，万科自身即为最大反例——2024年首次巨亏494.78亿元。","context_brief":"万科2006年年报对行业前景的总结性预判。","file_date":"2026-04-17"},{"id":582,"file_name":"2026-04-17.md","piece_index":29,"original_text":"在2006年，有两个重要的信号是不容忽视的。一个是，大部分企业在2006年的收益水平都明显上升而研究表明，推动这一进步的主要原因是劳动生产率的提高。另一个是，收入分配的公平性被提到前所未有的高度。","importance_score":0.48,"importance_reason":"万科将收入分配公平性视为购买力支撑的关键信号，这一判断具有远见——此后收入分配改善停滞，成为制约有效需求的深层原因之一，与赵燕菁论述的'运营阶段收入不足以覆盖建设阶段投入'形成呼应。","context_brief":"万科2006年年报指出劳动生产率提高和收入分配公平性两个宏观信号。","file_date":"2026-04-17"},{"id":583,"file_name":"2026-04-17.md","piece_index":30,"original_text":"1998年中国取消了福利房分配政策，开始了以商品房为主的全面市场化过程，这是第一个转折点。在这之前，中国的住宅行业只能说是在萌芽阶段，而在这之后，行业进入了近乎神速的增长。","importance_score":0.48,"importance_reason":"明确标记了中国商品房市场的制度起点，与赵燕菁'资本增长阶段'框架形成呼应——1998年正是房地产作为信用抵押品、驱动货币创造机制的起始。","context_brief":"作者回顾中国住宅行业发展历程，将1998年住房制度改革定义为行业第一个转折点。","file_date":"2026-04-17"},{"id":584,"file_name":"2026-04-17.md","piece_index":30,"original_text":"1998年之后中国住宅行业的发展，既是高速的增长，但也是粗放的增长。面对人多地少的基本国情、爆炸式的城市化速度，当这个年轻的行业骤然承担起为数以亿计的城市家庭包括数千万新增家庭提供住所的重任时，传统的经营方式、生产手段和发展模式，很快就遇上了难以为继的瓶颈环节。","importance_score":0.52,"importance_reason":"与赵燕菁'高速度vs高质量'两阶段框架高度契合，且预见性地指出了行业规模扩张模式的不可持续性，这一判断在万科2024-2025年巨亏中得到验证。","context_brief":"作者概括1998年后住宅行业高速但粗放增长的特征及其结构性瓶颈。","file_date":"2026-04-17"},{"id":585,"file_name":"2026-04-17.md","piece_index":30,"original_text":"如何在经济转轨期间和高速城市化过程中，满足城市中低收入家庭的基本居住需求？如何保证投资与消费、以及各类消费之间的均衡发展与良性互动？如何在充分运用金融工具的同时保证金融安全？如何实现住宅市场的可持续发展，减少资源和能源的消耗、促进与环境的和谐？如何使市场成为真正的双赢，并创造良好的社会效益，充分保护各相关主体的权益？这些问题在发达国家的成长历程中，都曾一一遭遇，但是从未像在中国这样，来得如此密集而急促。正是这一系列的问题，催生了2005年到2006年的宏观调控，也使得行业进入了第二个转折点。","importance_score":0.6000000000000001,"importance_reason":"这段提出的问题——金融安全、投资消费均衡、中低收入住房——几乎预言了此后二十年行业的全部核心矛盾。特别是'如何在充分运用金融工具的同时保证金融安全'，直接对应万科'影子万科'鹏金所体外循环和恒大暴雷的深层问题。","context_brief":"作者列举住宅行业面临的五大结构性挑战，并将2005-2006年宏观调控定义为行业第二个转折点。","file_date":"2026-04-17"},{"id":586,"file_name":"2026-04-17.md","piece_index":30,"original_text":"在第一个转折点之后，行业实现的是量的突破，而在第二个转折点之后，行业将要跨越的是质的升华。经过第一个转折点，我们看到的是大地回春之后的百花齐放，而经过第二个转折点，即将上演的是大浪淘沙之后的王者归来。","importance_score":0.5599999999999999,"importance_reason":"与赵燕菁'高速度→高质量'的两阶段理论形成精确的企业视角对应。'大浪淘沙后的王者归来'的预判，在二十年后被验证——行业确实经历了残酷的淘汰（恒大、碧桂园暴雷，万科巨亏），但'王者归来'的乐观预期远未兑现，反映了行业处于上升期时对转型难度的系统性低估。","context_brief":"作者对行业两次转折做出总结性判断，预期第二次转折后行业将经历洗牌和集中化。","file_date":"2026-04-17"},{"id":587,"file_name":"2026-04-17.md","piece_index":31,"original_text":"2006年，不仅对于万科，不仅对于中国住宅行业，甚至从世界住宅产业史的高度来看，都是划时代的一年。\n\n对世界住宅产业来说，一直存在着一个有些尴尬的怪圈。众所周知，在任何一个市场国家，住宅基本上都属于最昂贵的单件商品，也是大部分人一生中最大的一笔支出。但是这个行业中却似乎从来没有诞生过伟大的公司，从来没有诞生过像在能源、汽车、家电、金融、IT甚至零售、饮料、日化行业曾经出现过的那些庞大的商业帝国。甚至有人断言，因为房地产特殊的地域性和非同质性，这个行业没有其他行业那种显著的规模效应；也就是说，房地产公司是无法做大的。\n\n确实，直到2005年，财富500强的名单中，虽然出现过建筑公司、出现过不动产经营公司，但是纯粹的住宅开发企业，却始终与这一排行榜无缘。在2006年，历史终于被改写，美国的前四大住宅企业，联袂进入了这个名单。","importance_score":0.5599999999999999,"importance_reason":"提出住宅行业'无法做大'的传统论断及其被打破的历史节点，是理解万科后来激进扩张战略的思想基础。结合后续万科2024-2025年巨亏的结果，这段关于规模效应的乐观论述具有深刻的反讽意味。","context_brief":"万科2006年年报，讨论住宅行业能否诞生大企业的历史性问题。","file_date":"2026-04-17"},{"id":588,"file_name":"2026-04-17.md","piece_index":31,"original_text":"企业的边界取决于规模效应和管理成本的消长。越大的企业，规模效应越显著，但是管理和经营的难度也越高。当一个企业的规模效应已经不能抵消克服管理难度上升的成本时，这个企业就到了增长的极限。\n\n确实，住宅作为一种最终产品，具有不可移动性，无法在一个地方生产而销售到很远的范围；客户需求和地段的千差万别，也使得住宅的生产具有小批量甚至单件生产的特征。但是，企业的规模效应不仅仅源自大规模流水线生产带来的成本下降，而是来自三个方面。另外两个方面，一个是客户口碑带来的品牌号召力，一个是资本市场信用支撑的融资能力。","importance_score":0.656,"importance_reason":"万科将'资本市场信用支撑的融资能力'定义为规模效应核心来源之一，这恰恰与赵燕菁'房地产是货币创造核心抵押品'的论述相呼应——融资能力既是房企扩张的引擎，也是系统性风险的传导链条。万科后来的'影子万科'体外融资体系（鹏金所、博商系）正是这一逻辑的极端化延伸。","context_brief":"万科2006年年报阐述住宅企业规模效应的三大来源。","file_date":"2026-04-17"},{"id":589,"file_name":"2026-04-17.md","piece_index":31,"original_text":"在美国四大住宅企业晋身财富500强的过程中，美国究竟发生了什么？我们至少可以看到三件事情。第一件是住宅产业化水平的不断提升，虽然住宅整体需要进行现场装配，但是住宅的部件却可以实现规模化的工厂生产。第二件是随着客户对品质和性价比的要求不断趋于精细，住宅品牌日渐为人们所关注。第三件是1980年代之后，美国的房地产融资不断创新，并形成了大企业主要通过债券等低成本渠道融资，而小企业却仍然依赖高利率贷款的格局。这三件事情，刚好对应着规模效应的三个方面。","importance_score":0.6000000000000001,"importance_reason":"第三点关于融资创新形成大企业低成本融资优势的论述，是理解中国房地产行业后来发展轨迹的关键——融资创新在中国演变为影子银行、表外融资等形式，最终成为系统性风险来源。万科提及美国1980年代后融资创新，而正是这些创新的过度发展最终导致了2008年美国次贷危机。","context_brief":"万科以美国住宅行业发展为参照，分析大企业崛起的三大驱动因素。","file_date":"2026-04-17"},{"id":590,"file_name":"2026-04-17.md","piece_index":31,"original_text":"其中之一的帕尔迪住宅公司，是万科在新十年的标杆企业。在过去的十年中，它的市场占有率上升了一倍以上。然而，它的雄心才刚刚开始，它现在的目标已经定到了全美国市场的 20%。如果这个目标能够实现，我们看到的将是一个年销售千亿美元级别的企业。\n\n未来十年，中国城市将新增七千万户家庭，这接近一个美国，接近英国、法国和德国的总和，超过整个日本。未来全球最大的住宅市场很可能在中国，这已经没有太大的悬念。那么，中国的优秀住宅企业，又该有怎样的雄心和愿景呢？","importance_score":0.68,"importance_reason":"万科选择帕尔迪作为标杆企业具有强烈的历史反讽——帕尔迪在2008年美国次贷危机中遭受重创，股价暴跌超90%。万科在最乐观的时刻对标了一家即将遭遇行业崩盘的公司，而万科自身也在近20年后经历了类似的命运（2024-2025年巨亏）。'中国将新增七千万户家庭'的预判对照黄奇帆'人均住房41.76平米'的饱和数据，揭示了需求端拐点。","context_brief":"万科2006年年报以帕尔迪为标杆，展望中国住宅市场的巨大空间。","file_date":"2026-04-17"},{"id":591,"file_name":"2026-04-17.md","piece_index":31,"original_text":"万科在2005年提出，2006到2008年万科将进入一个高速发展期。这绝非简单地出自企业做大的冲动，否则的话，在行业上一个阶段的巅峰2004年，万科不会坚持稳健的发展策略。一直以来，万科谋求的是有质量的增长，这一点过去没有、现在没有、以后也不会改变。\n\n万科做出这个决定，是基于以下的几个判断。首先，经过2001到2005年的不断调整，万科在规模经营能力方面已经上了一个台阶。其次，相当数量的忠诚客户，是万科经营住宅业十多年来积累的最重要的财富之一，而购房者对于产品和服务的要求，最近几年明显趋于全面化。第三，尽管中国的住宅产业化还刚刚起步，但是万科已经率先基本实现了设计的标准化。第四，尽管中国房地产直接融资的大门还在开启的前夜，但是万科在资本市场的信用，不仅在行业内、而且在跨行业对比中，已经积累了一定的优势。最后，宏观调控将促进行业的规范化，提高行业的集中度，优秀企业将获得更大的成长空间。","importance_score":0.7040000000000001,"importance_reason":"这是万科管理层在行业繁荣期的核心战略宣言。'谋求有质量的增长，过去没有、现在没有、以后也不会改变'的表述，与秦朔后来揭示的'影子万科'体外循环、博商系资金通道形成尖锐矛盾——管理层在追求规模扩张的过程中，实际上偏离了其宣称的'有质量增长'原则。此外，'宏观调控将提高行业集中度'的判断在短期内是正确的，但长期来看行业集中度的提高也放大了头部企业的系统性风险。","context_brief":"万科管理层阐述2006-2008年高速发展期的五大战略判断依据。","file_date":"2026-04-17"},{"id":31,"file_name":"2026-04-16.md","piece_index":1,"original_text":"多元化经营，不把鸡蛋放在一个篮子里，是对还是错？在战略上，公司也进行了认真的探索。","importance_score":0.85,"importance_reason":"这是公司高层对多元化战略的公开反思，预示了后续2024年退出地产业务的重大战略转向。从2021年的质疑到2024年的退出，形成清晰的战略演变脉络。","context_brief":"雅戈尔2021年报致股东信中，李如成对公司长期坚持的多元化经营战略提出根本性质疑。","file_date":"2026-04-16"},{"id":32,"file_name":"2026-04-16.md","piece_index":1,"original_text":"雅戈尔在品牌战略上开始认真思索，几年来，雅戈尔开始实行多品牌战略，但为了控制成本，把所有品牌都放在一个店铺里运营，实际上还是一个品牌，许多品牌无非是一个品类，此消彼长，实际上没有增长。壮士割腕，品牌分拆，独立运行，公司又面临新的阵痛。","importance_score":0.82,"importance_reason":"罕见的管理层对自身战略执行失败的坦诚反思。结合2024年历史背景中'引进品牌尚未产生效益'，说明品牌战略困境持续多年未能有效解决。","context_brief":"李如成坦承多品牌战略执行失败，品牌实质上沦为品类，未带来增长，且品牌分拆独立运营造成新的阵痛。","file_date":"2026-04-16"},{"id":33,"file_name":"2026-04-16.md","piece_index":1,"original_text":"同时，公司关注起国内外品牌的收购与合作，HH、UND等运动品牌、潮牌纳入雅戈尔合作范围，但商务品牌转入运动品牌、潮牌又是一个重新学习和尝试的过程...","importance_score":0.72,"importance_reason":"揭示公司时尚转型路径——从商务服装向运动/潮牌扩展，但语气中充满不确定性。与2024年'引进品牌尚未产生效益'形成印证，说明这些尝试最终未达预期。","context_brief":"雅戈尔尝试从商务品牌跨界进入运动和潮牌领域，引入HH、UND等品牌。","file_date":"2026-04-16"},{"id":34,"file_name":"2026-04-16.md","piece_index":1,"original_text":"多产业经营雅戈尔能维持多久？新踏入的很多新兴产业雅戈尔能否成功？公司也将重新探索，有所取舍。总之，过去的一年，是雅戈尔无论从战略上还是战术上都重新转型的一年，而且必须在今后几年不断地革新，有时甚至是革命。","importance_score":0.88,"importance_reason":"这段话是2024年退出地产的重要前兆。'有所取舍'暗示将放弃部分产业，'革命'一词的激烈程度预示了后续退出经营三十多年地产业务的重大决断。","context_brief":"李如成对多产业经营的可持续性提出质疑，提出'有所取舍'和'革命'的表述。","file_date":"2026-04-16"},{"id":35,"file_name":"2026-04-16.md","piece_index":2,"original_text":"我们审时度势，及时地调整了公司的第六个五年规划，把建世界级时尚集团作为公司未来发展的主要目标。在积极做强做大雅戈尔核心品牌的同时，我们优化提升了MAYOR高端男奢品牌，又对HSM和HANP做了较大调整，分别定位为都市休闲品牌和健康环保品牌。在调整优化存量的同时，我们将国际合作品牌UND和HH逆势推向市场，并得到了市场的认同。","importance_score":0.82,"importance_reason":"揭示雅戈尔多品牌矩阵的完整布局：核心品牌雅戈尔+高端MAYOR+都市休闲HSM+健康环保HANP+国际合作UND和HH，这是公司从地产向时尚转型的关键战略路径。与2024年历史背景对比，可追溯时尚产业战略的起点。","context_brief":"雅戈尔2022年报致股东信，李如成阐述公司战略调整方向。","file_date":"2026-04-16"},{"id":36,"file_name":"2026-04-16.md","piece_index":2,"original_text":"我们出资20亿元在全国核心城市建设雅戈尔时尚体验馆，希望为品牌发展探索新的模式。","importance_score":0.78,"importance_reason":"20亿元的重大资本投入决策，体现公司对线下体验式零售的战略押注，是时尚转型中最具体的资金承诺。","context_brief":"面对线下萎缩和电商滞缓，雅戈尔探索线上线下融合新模式。","file_date":"2026-04-16"},{"id":37,"file_name":"2026-04-16.md","piece_index":2,"original_text":"在修改未来发展规划中，我们及时收缩了房产开发的投入，严防房地产的风险，保证公司未来健康稳健发展。","importance_score":0.85,"importance_reason":"与历史背景中2024年'退出运营三十多年的地产行业'形成关键时间线：2022年开始收缩→2024年彻底退出。说明地产退出是渐进过程而非突然决策，且2022年已明确将地产视为风险源。","context_brief":"2022年报中李如成提及收缩地产业务。","file_date":"2026-04-16"},{"id":38,"file_name":"2026-04-16.md","piece_index":3,"original_text":"首先，公司上下对未来的发展目标更加清晰和坚定，按照建设世界级时尚集团的目标，各项工作积极有序地推进。加大了对时尚产业的投入，缩减了其他非相关产业的投资，主题更加明确！","importance_score":0.75,"importance_reason":"明确了'建设世界级时尚集团'的战略目标，并提出缩减非相关产业投资，这是2024年正式退出地产行业的前奏信号，与历史背景中2024年退出地产的决策形成因果链。","context_brief":"雅戈尔2023年报致股东信中，李如成阐述公司战略方向。","file_date":"2026-04-16"},{"id":39,"file_name":"2026-04-16.md","piece_index":3,"original_text":"雅戈尔面临创业团队的传承问题迫在眉睫。公司更加重视对团队的培养和人才的引进，新老更替纳入制度性工作，各项班子梯队加速搭建，努力使公司发展后继有人。","importance_score":0.72,"importance_reason":"创始人李如成公开承认传承问题紧迫，属于重大公司治理信号。对于一家创业45年的企业，领导层交接是影响长期价值的关键风险因素。","context_brief":"李如成在致股东信中首次将管理层传承问题定性为'迫在眉睫'。","file_date":"2026-04-16"},{"id":40,"file_name":"2026-04-16.md","piece_index":3,"original_text":"充满期待的2023年匆匆地过去了。过去的一年，尽管公司的业绩不如预期，但也有许多地方令人回味。","importance_score":0.6,"importance_reason":"董事长直接承认业绩不如预期，措辞委婉但信号明确，结合历史背景中2024年退出地产、引进品牌尚未产生效益，反映公司正处于战略转型的阵痛期。","context_brief":"李如成对2023年业绩的总体评价。","file_date":"2026-04-16"},{"id":24,"file_name":"2026-04-15.md","piece_index":2,"original_text":"2003年，集团房地产业务进入高速增长期，并取得理想回报，全年实现营业收入人民币63.80亿元，净利润人民币5.42亿元，分别较去年增长 39.47% 和 41.80% ，每股盈利0.39元。以深圳和上海为核心的重点投资以及过去三年不断推进的二线城市扩张是保障集团业绩获得快速增长的主要因素。","importance_score":0.92,"importance_reason":"关键财务数据，营收和净利润均实现近40%的高速增长，标志着万科从专业化转型后进入高速增长期。与2002年营收45.7亿、净利润3.82亿相比，增速显著加快。","context_brief":"万科2003年年报董事长致辞，王石回顾全年业绩表现。","file_date":"2026-04-15"},{"id":25,"file_name":"2026-04-15.md","piece_index":2,"original_text":"特别值得关注的是，在深圳市场继续提供稳定增长的盈利来源的同时，上海市场在集团的盈利贡献比例大幅提升并与深圳市场的贡献旗鼓相当，上海、深圳市场的盈利贡献分别占集团净利润的 38.38%和 37.43%，这一变化基于过去三年集团对上海市场的成功投资策略。不可忽视的是，作为一家全国品牌的房地产开发商，集团在二线城市的投资亦成为集团重要的利润来源，这些城市主要包括南京、成都、沈阳、南昌、武汉和长春。","importance_score":0.88,"importance_reason":"利润结构发生重大变化——上海从新进入市场成长为与深圳旗鼓相当的利润核心，验证了2002年报提出的'以珠三角和长三角为核心的区域集约化发展'战略的成效。二线城市也开始贡献重要利润，全国化扩张战略全面兑现。","context_brief":"王石阐述万科利润结构变化，上海市场崛起与二线城市贡献。","file_date":"2026-04-15"},{"id":26,"file_name":"2026-04-15.md","piece_index":2,"original_text":"年内，集团积极开拓以深圳为核心的珠江三角洲市场、以上海为核心的长江三角洲市场以及以沈阳为核心的东北市场，并形成深圳、上海和沈阳区域管理中心。在深圳区域，集团先后进入中山和广州市场；在沈阳区域，集团进入大连和鞍山市场；在上海区域，集团积极寻求在苏南区域的合作机会。截至年末，公司已在15个城市拥有项目资源，待开发项目资源建筑面积744万平方米，为未来三年的稳定增长奠定了基础。","importance_score":0.85,"importance_reason":"战略升级——从单城市扩张转变为三大区域管理中心架构（深圳、上海、沈阳），城市数量从2001年的10个扩展到15个。待开发面积744万平方米较2001年的980万平方米有所下降，反映加速开发消化的节奏。组织架构随业务规模演进。","context_brief":"万科2003年区域扩张布局，从城市扩张升级为区域管理架构。","file_date":"2026-04-15"},{"id":27,"file_name":"2026-04-15.md","piece_index":2,"original_text":"国土资源部2002年7月1日颁布的《关于招标拍卖挂牌出让国有土地使用权规定》的政策在各地相继实施，使土地交易公开化的同时，加强了对地价支付方式和支付期限的管理，而与之相配合的中国人民银行《关于进一步加强房地产信贷业务管理的通知》禁止了商业银行对房地产开发商购买土地给予贷款，这一限制对开发商的资金状况提出了更高的要求，从长远看，有实力、有资信、有品牌的发展上将获得更大的发展空间，为此，董事会对集团未来的发展充满信心。","importance_score":0.82,"importance_reason":"重要政策环境变化——土地招拍挂制度落地和银行禁止土地贷款两项政策叠加，提高行业资金门槛。王石判断这将利好品牌龙头企业，与2002年报'政府加强监管将利好品牌领先企业'的论断一脉相承，且政策力度进一步加大。","context_brief":"王石分析2003年行业政策变化对竞争格局的影响。","file_date":"2026-04-15"},{"id":28,"file_name":"2026-04-15.md","piece_index":2,"original_text":"我们看到，随着行业的日益规范、市场需求的持续旺盛以及市场对长远增长的看好，大量新的资金通过公开土地交易的方式进入这一行业，与此同时，一批相当成熟的区域开发商开始走向全国市场，集团在土地、资金、客户、人力资源等方面面临更激烈的竞争环境。","importance_score":0.78,"importance_reason":"竞争格局出现重要变化——新资金涌入叠加区域开发商全国化，万科首次明确提出在多个维度面临'更激烈的竞争环境'，语调相比前两年更为审慎，预示行业竞争加剧的新阶段。","context_brief":"王石对行业竞争格局变化的判断。","file_date":"2026-04-15"},{"id":29,"file_name":"2026-04-15.md","piece_index":2,"original_text":"为实现公司业绩的持续增长并以期更好地回报股东，董事会在充分均衡市场和各方利益的前提下，提出了发行19.9亿元可转换公司债券的议案并获得股东大会对议案的顺利通过以及中小股东的认同，公司与投资者关系更趋成熟。","importance_score":0.75,"importance_reason":"重大融资决策——19.9亿元可转债是万科规模扩张的重要资金来源，金额相对于当年净利润5.42亿元接近4倍，反映公司以较大杠杆推动扩张的意图。","context_brief":"万科2003年提出可转债融资方案。","file_date":"2026-04-15"},{"id":30,"file_name":"2026-04-15.md","piece_index":2,"original_text":"面对集团业已具备的竞争优势以及确保三年可持续增长的条件，集团将根据未来竞争环境的变化态势，开始制定集团未来5~10年的中长期发展规划，探索公司的核心竞争力。","importance_score":0.73,"importance_reason":"前瞻性战略陈述——万科首次提出制定5-10年中长期规划，从短期的专业化转型和全国化扩张进入更高层次的战略思考阶段，标志公司发展的新里程碑。","context_brief":"王石展望2004年，提出制定中长期发展规划。","file_date":"2026-04-15"},{"id":546,"file_name":"2026-04-15.md","piece_index":7,"original_text":"2004年公司业绩保持稳步成长，效益更获得长足进步。全年实现营业收入76.67亿元，同比增长 20.2%；净利润8.78亿元，同比增长 62%；净资产收益率提升到 14.16%，为近年来最高点。","importance_score":0.6000000000000001,"importance_reason":"关键财务数据：净利润增速62%远超收入增速20.2%，表明盈利能力显著改善；ROE达14.16%创近年新高。与2002年数据（营收45.7亿、净利润3.82亿）对比，两年间营收增长68%、净利润增长130%，万科正处于加速成长期。","context_brief":"万科2004年年报致股东信，披露全年财务业绩。","file_date":"2026-04-15"},{"id":547,"file_name":"2026-04-15.md","piece_index":7,"original_text":"2004年也是万科成立20周年。对万科来说，这不仅仅是一个时间刻度上的整数，更是一个重新开始的起点。年内公司从战略的层面，对过去20年进行了全面的总结，并提出了未来十年的中长期规划。","importance_score":0.5599999999999999,"importance_reason":"重大战略决策节点：这份十年规划覆盖2004-2014年，恰好跨越2008年金融危机和此后的房地产大繁荣期。结合已知背景——万科管理层后来形成'我们要成为主人'的意识并在行业狂飙中逐步偏离治理原则——这一战略起点具有回溯性意义。","context_brief":"万科在成立20周年之际提出未来十年（2004-2014）中长期战略规划。","file_date":"2026-04-15"},{"id":548,"file_name":"2026-04-15.md","piece_index":8,"original_text":"自1984至2004年，万科营业收入从5800万元到76.67亿元，增长了132倍；净利润从500万元到8.78亿元，增长了176倍。","importance_score":0.6000000000000001,"importance_reason":"提供万科早期20年的关键财务基准数据，与后来2024-2025年巨亏（分别495亿和886亿）形成极端反差，标志着从176倍增长到上市33年首亏的历史转折。","context_brief":"万科2004年年报回顾公司成立20年的业绩增长。","file_date":"2026-04-15"},{"id":549,"file_name":"2026-04-15.md","piece_index":8,"original_text":"自 1991 年至 2004 年，万科营业收入复合增长率达 25%净利润复合增长率达 31%；同期上市的企业，像万科这样持续十三年盈利增长的已堪称绝无仅有。","importance_score":0.52,"importance_reason":"连续13年盈利增长的记录与后来2024年首次亏损形成时间跨度上的强烈对比，也为理解万科管理层的自信心来源提供背景。","context_brief":"万科强调上市后连续13年盈利增长的罕见记录。","file_date":"2026-04-15"},{"id":550,"file_name":"2026-04-15.md","piece_index":8,"original_text":"回顾20载发展历程，万科最引以为自豪的，就是在行业还有待成熟的时候，守住了职业化的底线，在任何利益诱惑的面前，万科一直坚持着自己的价值观。万科的价值观包括：对人永远尊重、追求公平回报和牢记社会责任。","importance_score":0.68,"importance_reason":"此段与秦朔后来揭露的'影子万科'博商系体外循环（288亿坏账）、鹏金所资金通道等治理乱象形成尖锐反讽。秦朔指出管理层'成为主人'的意识导致偏离公司治理根本原则，而这里正是万科自我标榜价值观最鲜明的时刻。","context_brief":"万科2004年年报阐述其核心价值观体系。","file_date":"2026-04-15"},{"id":551,"file_name":"2026-04-15.md","piece_index":8,"original_text":"万科认为，市场最终是公平的，任何暴利都不可持久。只有持续提供令客户满意的产品和服务，才能赢得市场的信赖；只有不断为客户创造价值，才能在竞争中立于不败之地。","importance_score":0.5599999999999999,"importance_reason":"与赵燕菁分析的房地产行业'狂飙突进、财富横流'大时代背景对照，万科声称拒绝暴利，但后来通过博商系体外循环、鹏金所加杠杆等方式实质上追逐了超额收益，反映了宣示与实践的背离。","context_brief":"万科表达'拒绝暴利'的经营哲学。","file_date":"2026-04-15"},{"id":552,"file_name":"2026-04-15.md","piece_index":10,"original_text":"对此，万科的看法是，消费者的有效需求才是一个市场存在的理由。政策是市场环境中不可忽视的一个重要组成部分，但它的出发点，只会是防范市场波动带来的风险，而不可能是凭空创造或者消除一个自我演进的真实市场。住宅是人类生存必须的基本物资，也是社会成员改善生活品质最重要的物质基础之一。决定住宅市场基本走势的，是经济的成长性、人口结构和居住形态的变迁。","importance_score":0.656,"importance_reason":"万科将住宅需求视为'自我演进的真实市场'、政策无法消除，这一信念在此后二十年深刻影响了万科的扩张战略。然而2024-2025年万科巨亏（494.78亿+885.56亿）表明，当房地产信用体系崩塌时，'有效需求'本身会剧烈收缩——与赵燕菁'房地产崩盘导致银行缩表→系统性需求萎缩'的传导链形成印证。万科2004年对政策风险的轻视态度，是其后续治理偏离的思想伏笔。","context_brief":"2004年宏观调控背景下，万科在年报中阐述其对政策与市场关系的基本判断。","file_date":"2026-04-15"},{"id":553,"file_name":"2026-04-15.md","piece_index":10,"original_text":"研究结果表明，未来十年全国城镇人口将由2005年的5.37亿增长到2015年的6.60亿，城镇平均家庭规模将从2005年的3.53人缩小到2015年的3.25人。由于人口增长、家庭规模小型化和人口老龄化，在2005至2010年间产生的新增住宅需求，每年分别为3.69亿、1.62亿、0.04亿平方米，合计每年5.35亿平方米；在2010至2015年间，每年分别为3.02亿、1.44亿、0.07亿平米，合计每年4.53亿平方米。对比目前每年3.38亿平方米的商品住宅供应量，未来需求的旺盛是不言而喻的。","importance_score":0.6240000000000001,"importance_reason":"提供了2004年视角下的关键人口与住房数据：城镇人口5.37亿→6.60亿、家庭规模3.53→3.25人、年需求5.35亿平方米vs供应3.38亿平方米。与黄奇帆后来披露的'人均住房建筑面积已达41.76平方米'对照，可追踪从供不应求到供需饱和的历史拐点。这组数据也是万科此后大规模扩张的决策基础。","context_brief":"万科2004年年报中对未来十年住宅需求的量化预测，作为行业长期看好的核心论据。","file_date":"2026-04-15"},{"id":554,"file_name":"2026-04-15.md","piece_index":10,"original_text":"高速发展的商品住宅行业需要大量的资金来支持，而要全面解决资金需求的难题，必须依靠金融产品创新和多元化融资渠道，其关键在于金融企业与地产企业之间信任关系的建立，而目前公司治理和控制能力已经得到金融界普遍认同的房地产企业只是少数。","importance_score":0.68,"importance_reason":"万科将'公司治理得到金融界认同'视为核心竞争优势，具有深刻的讽刺意义。秦朔后来揭示的'影子万科'博商系体外循环（288.26亿坏账准备、损失率89%）和鹏金所资金通道，恰恰表明万科在此后十余年间严重偏离了自己标榜的治理标准。万科2004年的自我定位与其实际演变之间的落差，是理解万科治理悲剧的关键线索。","context_brief":"万科2004年年报讨论行业集中化趋势时，强调金融信任关系是核心竞争壁垒。","file_date":"2026-04-15"},{"id":555,"file_name":"2026-04-15.md","piece_index":10,"original_text":"挑战之一在于境外同行的进入。尽管世界房地产发展史已经呈现这样的事实：商品住宅市场可能是所有行业中，全球化倾向最不显著的一个，即使美国最强大的发展商，其跨国经营范围也限于周边国家。但我们同样应该注意到近期已经发生的另一组事实：以香港发展商为代表，大陆以外的同行已经大举进入中国内地市场，他们的资金实力，国际融资能力都远在国内企业平均水平之上。","importance_score":0.544,"importance_reason":"揭示2004年竞争格局：香港开发商以资金和融资优势大举进入内地。这与已有知识中恒隆地产的布局相呼应，也为理解后来中海地产（香港中资背景）成为行业效率标杆提供了背景。万科此时已意识到融资能力差距，这一焦虑可能是后来建立鹏金所等体外融资渠道的远因。","context_brief":"万科2004年年报分析来自香港开发商的竞争挑战。","file_date":"2026-04-15"},{"id":556,"file_name":"2026-04-15.md","piece_index":10,"original_text":"更重要的是，行业竞争最终将是核心技术的竞争，目前日本最优秀的住宅开发商，拥有数千项专利；而在中国大陆，走在最前端的万科，已经获得和正在申请的专利合计只有几十件。","importance_score":0.5599999999999999,"importance_reason":"万科早在2004年即提出'行业竞争最终是核心技术竞争'并以日本为标杆，但此后二十年行业实际的竞争焦点始终是融资能力和拿地规模。这一技术理想主义与行业金融化现实之间的矛盾，折射出中国房地产行业整体发展路径的偏差。","context_brief":"万科2004年年报将日本住宅开发商的技术专利数量与万科对比，强调技术差距。","file_date":"2026-04-15"},{"id":557,"file_name":"2026-04-15.md","piece_index":10,"original_text":"2004年，中国经济继续保持 9.5% 的GDP高速成长，但也出现了一些结构性的投资过热。为此，国家开始了第五轮宏观调控，土地政策、金融政策不断收紧，并在10月底进行了9年来第一次加息。而以上海为代表的部分城市，出现了房价增长过快、投资性购房比例过高的迹象。","importance_score":0.52,"importance_reason":"记录了关键宏观节点：2004年GDP增速9.5%、第五轮宏观调控、9年来首次加息、上海投资性购房过热。这些数据可与赵燕菁'高速度阶段'的资本积累理论框架对照——2004年正处于赵燕菁所述的资本增长阶段高峰期。","context_brief":"万科2004年年报记录当年宏观经济与政策环境。","file_date":"2026-04-15"},{"id":558,"file_name":"2026-04-15.md","piece_index":11,"original_text":"万科经过将近一年的反复研究，提出了未来十年的中长期发展规划。万科将在 \"专业化\"的基础上走向\"精细化\"，以\"有质量增长\"作为未来十年的战略目标。\n\n在已经进入快速增长期的同时，我们更加追求增长的质量。有质量增长对我们意味着，要提高资本与人力资源回报率，提升客户忠诚度，加强产品与服务创新。为实现有质量增长，万科提出了三大策略。","importance_score":0.576,"importance_reason":"这一战略宣言与万科后来的实际轨迹形成强烈反差：万科提出'有质量增长'、'提高资本回报率'，但最终在2024-2025年出现上市以来首次巨亏（分别亏损495亿和886亿）。'有质量增长'的口号与'影子万科'博商系体外循环、鹏金所加杠杆等实际操作之间存在根本性矛盾，揭示了战略宣示与执行之间的巨大鸿沟。","context_brief":"万科在某一年度报告或战略文件中公布未来十年规划，提出从'专业化'转向'精细化'，以'有质量增长'为核心战略目标。","file_date":"2026-04-15"},{"id":559,"file_name":"2026-04-15.md","piece_index":11,"original_text":"面对未来十年巨大的机会与挑战，万科作为行业的领跑者，必须具有归零的心态和凤凰涅磐的勇气。而要成功实现自我的超越，首先需要在战略上作出重大调整。","importance_score":0.48,"importance_reason":"管理层的自我定位（'行业领跑者'）和修辞（'归零心态'）与秦朔揭示的治理问题形成对照——郁亮所代表的管理层'成为主人'的意识在行业繁荣期异化，这种领跑者姿态可能正是治理偏离的心理基础。","context_brief":"万科管理层以'行业领跑者'自居，强调需要'归零心态'和'凤凰涅槃的勇气'来实现战略转型。","file_date":"2026-04-15"},{"id":560,"file_name":"2026-04-15.md","piece_index":13,"original_text":"目前，中国城市经济圈正在形成，这些城市圈构成了中国经济发展的增长极。长江三角洲，珠江三角洲，环渤海区域，这三大城市圈的国土面积只占全国的 4.1% ，但GDP却占到了 40% ，居民储蓄余额占全国的四分之一，人均消费支出是全国平均的两倍。\n\n万科在未来十年，将把业务聚焦在城市经济圈，特别是长江三角洲，珠江三角洲，环渤海区域三大城市圈。万科将集中资源，在这些地区实现集约型的扩张，在这三大区域成为市场领导者。","importance_score":0.52,"importance_reason":"这是万科在2002年即提出的重大战略决策，明确了三大城市圈聚焦方向。结合已知背景，万科此后确实深耕长三角、珠三角、环渤海，该战略奠定了万科此后十余年扩张的地理格局。同时，三大城市圈4.1%国土面积贡献40%GDP的数据，与赵燕菁关于城市化阶段和高质量发展的理论形成呼应——万科选择聚焦经济密度最高的区域，本质上是押注运营阶段现金流回报最强的城市。","context_brief":"万科2002年年报中披露的未来十年战略规划，提出城市圈聚焦策略。","file_date":"2026-04-15"},{"id":561,"file_name":"2026-04-15.md","piece_index":15,"original_text":"2003年，集团房地产业务进入高速增长期，并取得理想回报，全年实现营业收入人民币63.80亿元，净利润人民币5.42亿元，分别较去年增长 39.47% 和 41.80% ，每股盈利0.39元。以深圳和上海为核心的重点投资以及过去三年不断推进的二线城市扩张是保障集团业绩获得快速增长的主要因素。","importance_score":0.68,"importance_reason":"关键财务数据，营收从2002年45.7亿增至63.8亿，净利润从3.82亿增至5.42亿，增速均近40%，标志万科进入高速增长期。与已有知识中2001-2002年数据形成连续增长序列。","context_brief":"万科2003年年报董事长致辞，王石回顾全年业绩。","file_date":"2026-04-15"},{"id":562,"file_name":"2026-04-15.md","piece_index":15,"original_text":"在过去的一年，集团在深圳和上海的业务继续提供理想回报，特别值得关注的是，在深圳市场继续提供稳定增长的盈利来源的同时，上海市场在集团的盈利贡献比例大幅提升并与深圳市场的贡献旗鼓相当，上海、深圳市场的盈利贡献分别占集团净利润的 38.38%和 37.43%，这一变化基于过去三年集团对上海市场的成功投资策略。","importance_score":0.656,"importance_reason":"上海首次与深圳利润贡献持平，标志万科从深圳区域房企向全国性房企转型的关键里程碑。与已有知识中2001年深圳独占42%利润的格局形成鲜明对比，仅两年即实现双核驱动。","context_brief":"王石披露万科区域利润结构发生重大变化。","file_date":"2026-04-15"},{"id":563,"file_name":"2026-04-15.md","piece_index":15,"original_text":"国土资源部2002年7月1日颁布的《关于招标拍卖挂牌出让国有土地使用权规定》的政策在各地相继实施，使土地交易公开化的同时，加强了对地价支付方式和支付期限的管理，而与之相配合的中国人民银行《关于进一步加强房地产信贷业务管理的通知》禁止了商业银行对房地产开发商购买土地给予贷款，这一限制对开发商的资金状况提出了更高的要求，从长远看，有实力、有资信、有品牌的发展上将获得更大的发展空间，为此，董事会对集团未来的发展充满信心。","importance_score":0.6400000000000001,"importance_reason":"土地招拍挂制度落地与购地贷款禁令双重政策变化，是中国房地产行业规范化的分水岭。王石判断这将利好品牌房企，与已有知识中2002年年报'土地出让方式变化利好品牌领先企业'的判断一脉相承，且赵燕菁框架下土地资本化机制的制度基础正在此时期形成。","context_brief":"王石分析2003年土地招拍挂和信贷紧缩政策对行业的影响。","file_date":"2026-04-15"},{"id":564,"file_name":"2026-04-15.md","piece_index":15,"original_text":"年内，集团积极开拓以深圳为核心的珠江三角洲市场、以上海为核心的长江三角洲市场以及以沈阳为核心的东北市场，并形成深圳、上海和沈阳区域管理中心。在深圳区域，集团先后进入中山和广州市场；在沈阳区域，集团进入大连和鞍山市场；在上海区域，集团积极寻求在苏南区域的合作机会。截至年末，公司已在15个城市拥有项目资源，待开发项目资源建筑面积744万平方米，为未来三年的稳定增长奠定了基础。","importance_score":0.6000000000000001,"importance_reason":"万科从10城扩展至15城，形成三大区域管理中心的组织架构，是全国化战略的重要组织升级。待开发面积744万平方米较2002年的860万平方米有所下降，反映消化速度加快。进入广州市场尤其值得关注——万科在大本营深圳所在的珠三角此前并未充分布局。","context_brief":"王石介绍万科2003年三大区域管理中心和城市扩张格局。","file_date":"2026-04-15"},{"id":565,"file_name":"2026-04-15.md","piece_index":15,"original_text":"为实现公司业绩的持续增长并以期更好地回报股东，董事会在充分均衡市场和各方利益的前提下，提出了发行19.9亿元可转换公司债券的议案并获得股东大会对议案的顺利通过以及中小股东的认同，公司与投资者关系更趋成熟。","importance_score":0.576,"importance_reason":"19.9亿可转债是万科当时规模最大的融资动作，与已有知识中2001年启动可转债计划的记录形成闭环。结合央行禁止购地贷款的背景，万科通过资本市场融资获取竞争优势的策略意图明确。","context_brief":"王石披露万科可转债发行获批情况。","file_date":"2026-04-15"},{"id":566,"file_name":"2026-04-15.md","piece_index":15,"original_text":"面对集团业已具备的竞争优势以及确保三年可持续增长的条件，集团将根据未来竞争环境的变化态势，开始制定集团未来5~10年的中长期发展规划，探索公司的核心竞争力。","importance_score":0.544,"importance_reason":"这是万科首次在年报中明确提出5-10年中长期规划，标志着公司从机会驱动增长向战略驱动增长的转型意识。结合后来郁亮时代的发展轨迹，这一规划的执行效果值得跟踪。","context_brief":"王石在展望部分提出万科将制定5-10年长期规划。","file_date":"2026-04-15"},{"id":20,"file_name":"2026-04-14.md","piece_index":1,"original_text":"截至报告期末，本集团存货金额为 9,070.6 亿元，较 2021 年底下降 15.7%。其中，拟开发产品为 1,117.0 亿元，占比 12.3%；在建开发产品 6,952.6 亿元，占比 76.7%；已完工开发产品（现房）980.7 亿元，占比 10.8%。本集团基于审慎的市场策略，对存在风险的项目计提存货跌价准备。报告期内新增计提存货跌价准备 4.5 亿元，影响归属于母公司股东的净利润 3.7 亿元。报告期末，存货跌价准备余额为 51.4 亿元。","importance_score":0.75,"importance_reason":"存货从2001年总资产64亿元规模膨胀至2022年存货单项9070亿元，体现万科二十年全国化扩张的巨大规模变化。存货同比下降15.7%和51.4亿元跌价准备余额，标志着行业下行拐点，与历史背景中2002年王石对行业'保持向上势头'的判断形成鲜明对比。","context_brief":"万科A 2022年年报中的存货分析数据，反映公司在行业下行期的资产规模与减值情况。","file_date":"2026-04-14"},{"id":21,"file_name":"2026-04-14.md","piece_index":2,"original_text":"截至报告期末，本集团存货金额为 7,017.0 亿元，较 2022 年底下降 22.6%。其中，拟开发产品为 1,019.3 亿元，占比 14.5%；在建开发产品 4,893.1 亿元，占比 69.7%；已完工开发产品（现房）1,077.4 亿元，占比 15.4%。本集团基于审慎的市场策略，对存在风险的项目计提存货跌价准备。报告期内新增计提存货跌价准备 34.9 亿元，影响归属于母公司股东的净利润 29.5 亿元。报告期末，存货跌价准备余额为 79.9 亿元。","importance_score":0.82,"importance_reason":"存货从2002年时总资产仅64亿元规模膨胀至7017亿元存货，反映万科二十年扩张的巨大体量变化。同时存货下降22.6%、新增计提跌价准备34.9亿元（影响净利润29.5亿元）、累计跌价准备达79.9亿元，标志着房地产行业下行周期中万科面临的重大资产减值压力，与历史背景中2001-2002年积极扩张、全国化布局形成鲜明对照。","context_brief":"万科A 2023年年报中的存货分析数据，反映公司房地产库存规模及资产减值情况。","file_date":"2026-04-14"},{"id":22,"file_name":"2026-04-14.md","piece_index":3,"original_text":"截至报告期末，本集团存货金额为 3,737.4 亿元，较 2024 年底下降 28.0%。其中，拟开发产品为 778.8 亿元，占比 20.8%；在建开发产品 1,788.2 亿元，占比 47.8%；已完工开发产品（现房）1,144.5 亿元，占比 30.6%。本集团基于审慎的市场策略，对存在风险的项目计提存货跌价准备，报告期内新增计提存货跌价准备 208.3 亿元。报告期末，存货跌价准备余额为 266.4 亿元。","importance_score":0.85,"importance_reason":"存货同比大幅下降28%，反映万科主动收缩规模或去化加速；新增计提跌价准备208.3亿元规模巨大，占存货总额约5.6%，表明房地产市场下行压力严峻，资产质量承压。已完工现房占比30.6%偏高，存在去化压力。与历史背景中2001-2002年万科积极扩张、全国化布局形成鲜明对比，公司已从扩张期转入收缩防御阶段。","context_brief":"万科A 2025年年报存货科目分析，反映公司房地产业务规模收缩及资产减值情况。","file_date":"2026-04-14"},{"id":23,"file_name":"2026-04-14.md","piece_index":4,"original_text":"截至报告期末，本集团存货金额为 5,190.1 亿元，较 2023 年底下降 26.0%。其中，拟开发产品为 917.1 亿元，占比 17.7%；在建开发产品 3,008.4 亿元，占比 58.0%；已完工开发产品（现房）1,239.1 亿元，占比 23.9%。本集团基于审慎的市场策略，对存在风险的项目计提存货跌价准备，报告期内新增计提存货跌价准备 70.6 亿元（此外还对非并表项目计提存货跌价准备 10.8 亿）。报告期末，存货跌价准备余额为 115.7 亿元。","importance_score":0.85,"importance_reason":"存货同比大幅下降26%，叠加70.6亿元新增跌价准备和115.7亿元跌价准备余额，揭示万科在行业下行周期中面临严重的资产减值压力。与历史背景中2001-2002年万科积极扩张、土地储备980万平方米的上升期形成鲜明对比，体现公司从扩张到收缩的战略拐点。已完工现房占比23.9%偏高，暗示去化压力较大。","context_brief":"万科A 2024年年报存货数据，反映公司资产规模及减值风险。","file_date":"2026-04-14"},{"id":372,"file_name":"2026-04-14.md","piece_index":5,"original_text":"中国2024年的人均GDP约1.3万美元，全球排名第73位，与墨西哥、马来西亚等国处于同一梯队。我们仍然只能算是一个中等收入的发展中国家，还有很长的路要走。","importance_score":0.85,"importance_reason":"指出中国人均GDP排名与其现代化成就之间的悖论，是全文核心论点的起点","context_brief":"单伟建提出中国现代性悖论","file_date":"2026-04-14"},{"id":373,"file_name":"2026-04-14.md","piece_index":5,"original_text":"一个发展中国家，何以在科技创新上取得如此的成就？何以在某些方面达到了甚至超越发达国家的「现代性」水平？我写这本书，就是想解释和回答这个问题。","importance_score":0.8,"importance_reason":"点明全文的核心研究问题，具有前瞻性思考价值","context_brief":"单伟建阐述新书《通往现代之路》的核心问题","file_date":"2026-04-14"},{"id":374,"file_name":"2026-04-14.md","piece_index":5,"original_text":"就是因为具备了这5个必要条件，所以尽管中国仍是发展中国家，但我们的现代性能够达到如此的高度，在科技领域的创新能够如此广阔，中国已经和美国同时成为了全球仅有的两个科技创新中心。","importance_score":0.92,"importance_reason":"提出中美是全球仅有的两个科技创新中心这一重大判断，基于人才、高校、风险资本、制造能力、统一大市场五个条件的分析框架","context_brief":"单伟建总结中国具备科技创新五大条件后的结论","file_date":"2026-04-14"},{"id":375,"file_name":"2026-04-14.md","piece_index":5,"original_text":"未来的增长，一定是依靠生产效率的提高和科技驱动，而中国已经具备了成为全球创新引擎的基础条件。","importance_score":0.82,"importance_reason":"对中国经济未来增长路径的战略性判断","context_brief":"单伟建对中国未来增长动力的前瞻判断","file_date":"2026-04-14"},{"id":376,"file_name":"2026-04-14.md","piece_index":5,"original_text":"2025年中国GDP增长5%，2024年也是5%，2023年是5.2%——这在任何一个国家，都是一个很可观的数字，更何况是一个这么大的国家。","importance_score":0.78,"importance_reason":"用具体数据反驳市场悲观体感，展示做投资与做生意在视角上的差异","context_brief":"单伟建用宏观数据回应市场悲观情绪","file_date":"2026-04-14"},{"id":377,"file_name":"2026-04-14.md","piece_index":5,"original_text":"到2025年底，居民存款总额超过160万亿，而当年GDP才140万亿——存款超过了GDP。试想一下，如果家庭存款释放出10%，那就是10%的GDP增长；释放出5%，也是5%的增长。","importance_score":0.88,"importance_reason":"揭示中国消费潜力的关键数据，存款超GDP是重要的宏观经济信号","context_brief":"单伟建分析中国居民储蓄与消费潜力","file_date":"2026-04-14"},{"id":378,"file_name":"2026-04-14.md","piece_index":5,"original_text":"所以我认为，中国必须从依赖出口、依赖投资，转向依赖消费——我十年前就这么认为，这是一条非走不可的路。","importance_score":0.87,"importance_reason":"资深投资人对中国经济结构转型的长期一致判断，具有重要参考价值","context_brief":"单伟建对中国经济转型方向的战略判断","file_date":"2026-04-14"},{"id":379,"file_name":"2026-04-14.md","piece_index":5,"original_text":"在投资上，我不投制造业，因为太「卷」，利润率过低；也不投出口企业，我认为那种增长难以持续。我投的是针对消费的头部企业，这就是从宏观看到的趋势——大趋势仍然是科技和消费，而不是凭体感。","importance_score":0.85,"importance_reason":"管理550亿美元资产的投资人明确表达投资方向和底层逻辑，具有市场指引价值","context_brief":"单伟建阐述投资策略与逻辑","file_date":"2026-04-14"},{"id":380,"file_name":"2026-04-14.md","piece_index":5,"original_text":"我认为，中国许多制度和治理模式，并不是事先设计好的蓝图，就像邓小平讲的「摸着石头过河」，是在应对和解决具体危机与问题的过程中逐步建立和完善起来的。","importance_score":0.83,"importance_reason":"对中国制度建设路径的深层理解，以亲历者视角总结出渐进式制度演化的规律","context_brief":"单伟建对中国制度演进路径的独特观察","file_date":"2026-04-14"},{"id":381,"file_name":"2026-04-14.md","piece_index":5,"original_text":"我对所谓的「出海」持严重保留态度。对大部分企业来说，出海不见得是件好事。过去十年，很多中国企业出海收购外国公司，搞得好的也有几个，但失败的例子很多，这是一方面。","importance_score":0.84,"importance_reason":"在出海热潮中提出逆向观点，结合地缘政治风险和中国海外净资产头寸分析，具有独特价值","context_brief":"单伟建对中国企业出海持保留态度","file_date":"2026-04-14"},{"id":382,"file_name":"2026-04-14.md","piece_index":5,"original_text":"把香港和大陆的净头寸加起来，还不算澳门，就至少有5.5万亿美元，那我们就是世界上最大的净债权国。这在当前的地缘政治格局下，我认为还是存在巨大的风险。","importance_score":0.86,"importance_reason":"揭示中国作为最大净债权国在地缘政治格局下面临的资产安全风险，是不寻常且重要的警示","context_brief":"单伟建指出中国海外资产的地缘政治风险","file_date":"2026-04-14"},{"id":383,"file_name":"2026-04-14.md","piece_index":5,"original_text":"我觉得现在的房地产市场基本见底了。为什么？我看到当前全国范围内房地产出租收益率大概是2.8%，而国债收益率大概是1.8%。这说明投房地产比投国债还赚钱。在这种情况下，买房是划算的。","importance_score":0.83,"importance_reason":"资深投资人用租金收益率与国债收益率的比较做出房地产见底判断，逻辑清晰且具有市场影响力","context_brief":"单伟建判断房地产市场见底","file_date":"2026-04-14"},{"id":537,"file_name":"2026-04-14.md","piece_index":6,"original_text":"截至报告期末，本集团存货金额为 3,737.4 亿元，较 2024 年底下降 28.0%。其中，拟开发产品为 778.8 亿元，占比 20.8%；在建开发产品 1,788.2 亿元，占比 47.8%；已完工开发产品（现房）1,144.5 亿元，占比 30.6%。本集团基于审慎的市场策略，对存在风险的项目计提存货跌价准备，报告期内新增计提存货跌价准备 208.3 亿元。报告期末，存货跌价准备余额为 266.4 亿元。","importance_score":0.68,"importance_reason":"存货同比下降28%反映万科大规模去库存和资产缩水；新增计提跌价准备208.3亿元与秦朔分析的2025年存货跌价208亿完全吻合，是导致万科巨亏885.56亿元的第二大因素。已完工现房占比30.6%（1,144.5亿元）表明去化压力巨大，跌价准备余额266.4亿元意味着存货的实际市场价值可能进一步低于账面。","context_brief":"万科A 2025年年报存货科目分析，揭示资产缩水和跌价计提规模。","file_date":"2026-04-14"},{"id":538,"file_name":"2026-04-14.md","piece_index":7,"original_text":"截至报告期末，本集团存货金额为 5,190.1 亿元，较 2023 年底下降 26.0%。其中，拟开发产品为 917.1 亿元，占比 17.7%；在建开发产品 3,008.4 亿元，占比 58.0%；已完工开发产品（现房）1,239.1 亿元，占比 23.9%。本集团基于审慎的市场策略，对存在风险的项目计提存货跌价准备，报告期内新增计提存货跌价准备 70.6 亿元（此外还对非并表项目计提存货跌价准备 10.8 亿）。报告期末，存货跌价准备余额为 115.7 亿元。","importance_score":0.656,"importance_reason":"存货同比下降26%揭示万科大规模去库存态势；新增计提跌价准备70.6亿元（加非并表共81.4亿元）与已验证知识中秦朔提到的'2024年资产减值（主要是存货跌价）81.4亿'完全吻合，交叉验证了数据来源。已完工现房占比23.9%（1,239亿元）显示去化压力显著。存货跌价准备余额115.7亿元意味着未来仍有继续减值的风险敞口。","context_brief":"万科A 2024年年报中的存货数据披露，反映房地产下行周期中的资产缩水与减值情况。","file_date":"2026-04-14"},{"id":539,"file_name":"2026-04-14.md","piece_index":8,"original_text":"中国2024年的人均GDP约1.3万美元，全球排名第73位，与墨西哥、马来西亚等国处于同一梯队。我们仍然只能算是一个中等收入的发展中国家，还有很长的路要走。在某些科技领域，我们还在追赶中，比如半导体、光刻机、商用飞机发动机等。可是，世界上又有哪个发展中国家，拥有中国如此现代性的景象？","importance_score":0.656,"importance_reason":"提出了一个核心分析框架——中国的'现代性悖论'，即人均收入与基础设施/科技水平的错位，这是其整本书的核心问题。","context_brief":"单伟建提出中国发展的'悖论'：人均GDP仍处中等收入水平，但现代化程度远超同级别国家。","file_date":"2026-04-14"},{"id":540,"file_name":"2026-04-14.md","piece_index":8,"original_text":"思考和研究许久后，我总结出了一个国家成为全球科技中心所必须具备的五个条件：第一，人才的聚集。有高等人才、顶尖的人才，才能去搞科技创新，这毋庸置疑。第二，顶级高等院校和研究机构的聚集。硅谷和波士顿是美国顶级大学和研究机构聚集的地方。第三，充足的风险资本。第四，深度加工制造的能力。第五，一个巨大的单一市场——同一个货币，同一个语言，同一种文化，同样的法律制度。唯有如此，企业发展和创新才具备规模化的条件。在80年代末90年代初，全世界同时具备这五个条件的只有美国，因此硅谷是个独一无二的'美国现象'。","importance_score":0.6400000000000001,"importance_reason":"提供了一个结构化的分析框架来评估国家创新能力，且得出中国已成为全球第二个同时满足五个条件的国家这一重要判断。","context_brief":"单伟建提出科技创新中心的五要素框架，解释为何硅谷曾是独特的美国现象。","file_date":"2026-04-14"},{"id":541,"file_name":"2026-04-14.md","piece_index":8,"original_text":"2025年中国GDP增长5%，2024年也是5%，2023年是5.2%——这在任何一个国家，都是一个很可观的数字，更何况是一个这么大的国家。可我每次到内地来，大家都说'体感不好'，情绪低迷。\n\n体感不好也有道理。中国家庭资产的大头始终是房地产，房价跌了20%-30%，家庭资产负债表当然缩水，消费意愿也就降低了。中国人储蓄倾向本来就强，股票市场低迷，房地产市场更低迷，就更不愿意多花钱。","importance_score":0.7040000000000001,"importance_reason":"与赵燕菁'房地产崩盘导致全面缩表'的理论形成呼应，从投资人视角确认了房价下跌20%-30%对居民消费意愿的直接冲击，同时提供了GDP增速与体感矛盾的实证观察。","context_brief":"单伟建解释宏观GDP数据与民间'体感'的背离，将原因归结于房地产下跌导致的家庭资产负债表缩水。","file_date":"2026-04-14"},{"id":542,"file_name":"2026-04-14.md","piece_index":8,"original_text":"但宏观数据来看，2023 年 5.2%的增长里，82.5%是消费贡献的，净出口是 -11.4%。这个增长质量我认为其实很高。到了 2025 年，消费的贡献降到 52%，净出口贡献了 32.7%，货物顺差超过了 1 万亿美元。我认为这个增长质量就差一些，过度依赖出口。","importance_score":0.7200000000000001,"importance_reason":"提供了关键的增长结构数据，揭示2023-2025年间消费贡献从82.5%降至52%、净出口从-11.4%升至32.7%的结构性恶化，与赵燕菁的房地产缩表理论形成因果链——房价下跌→消费萎缩→被迫依赖出口。","context_brief":"单伟建通过对比2023年与2025年GDP增长结构，指出增长质量从消费驱动退化为出口依赖。","file_date":"2026-04-14"},{"id":543,"file_name":"2026-04-14.md","piece_index":8,"original_text":"过去五年，中国居民人均可支配收入年均增长5.4%；而同期居民人民币存款年均增速约为13%。到2025年底，居民存款总额超过160万亿，而当年GDP才140万亿——存款超过了GDP。试想一下，如果家庭存款释放出10%，那就是10%的GDP增长；释放出5%，也是5%的增长。","importance_score":0.7360000000000001,"importance_reason":"存款年增13%远超收入年增5.4%，存款总额（160万亿）已超过GDP（140万亿），这一数据反映了居民极端的避险情绪，与赵燕菁关于房地产崩盘后系统性需求萎缩的判断相互印证，同时也暗示若信心恢复则有巨大释放空间。","context_brief":"单伟建揭示居民存款增速远超收入增速的'超额储蓄'现象，认为这是巨大的消费潜力。","file_date":"2026-04-14"},{"id":544,"file_name":"2026-04-14.md","piece_index":8,"original_text":"所以我认为，中国必须从依赖出口、依赖投资，转向依赖消费——我十年前就这么认为，这是一条非走不可的路。\n\n在投资上，我不投制造业，因为太'卷'，利润率过低；也不投出口企业，我认为那种增长难以持续。我投的是针对消费的头部企业，这就是从宏观看到的趋势——大趋势仍然是科技和消费，而不是凭体感。","importance_score":0.6240000000000001,"importance_reason":"作为管理550亿美元资产的投资人，其'不投制造业、不投出口'的明确立场具有信号意义，且'消费+科技'的判断与赵燕菁关注的资本市场/货币问题形成不同的解题路径。","context_brief":"单伟建阐述其投资逻辑：回避制造业和出口企业，押注消费头部企业。","file_date":"2026-04-14"},{"id":545,"file_name":"2026-04-14.md","piece_index":8,"original_text":"单伟建先生，太盟投资集团（PAG）联合创办人兼执行董事长，素有'中国私募之王'之誉。从内蒙戈壁滩上的务农青年，到沃顿商学院教授，再到'下海'后屡次创造资本并购史上的经典手笔，其人生经历堪称传奇。执掌新桥资本期间，他主导收购韩国第一银行与深圳发展银行，技惊四座，记录这两大案例的书籍《金钱博弈》和《金钱风云》至今畅销不衰。如今身为太盟掌舵人，管理资产超过550亿美元，近年他牵头完成对万达商管的重大战略投资，再度为市场所瞩目。","importance_score":0.6000000000000001,"importance_reason":"建立单伟建的人物档案——PAG联合创办人，管理550亿美元，曾主导韩国第一银行和深发展收购，近期投资万达商管，这些关系网络对跨文档分析有重要价值。","context_brief":"单伟建的个人背景介绍，涵盖其职业生涯关键节点。","file_date":"2026-04-14"},{"id":516,"file_name":"2026-04-13.md","piece_index":4,"original_text":"房地产 348,130 78.14 21,502 57.53；零售 96,454 21.65 2,116 5.66；其它 922 0.21 13,757 36.81；总计 445,506 100 37,375 100","importance_score":0.5599999999999999,"importance_reason":"'其它'业务仅占收入0.21%（922万元）却贡献36.81%的净利润（13,757万元），利润率极度异常，可能涉及投资收益、资产处置或非经常性损益，需关注利润质量和可持续性。同时零售业务收入占比21.65%但利润占比仅5.66%，盈利能力偏弱。","context_brief":"该公司按行业划分的主营业务收入及净利润，显示房地产为核心业务，但'其它'业务以极低收入贡献超三成利润。","file_date":"2026-04-13"},{"id":517,"file_name":"2026-04-13.md","piece_index":4,"original_text":"天津 10,169 2.92 -8,941 -；北京 55,780 16.02 1,535 4.68","importance_score":0.52,"importance_reason":"天津区域亏损8,941万元，亏损额接近收入规模，说明项目可能存在严重的成本超支或资产减值。北京收入占比16.02%但利润仅占4.68%，利润率显著低于深圳和上海，反映一线城市间盈利能力分化。与已验证洞察中赵燕菁'大量城市将破产'的预判形成微观层面呼应。","context_brief":"房地产业务按区域划分的利润表现，天津项目大幅亏损，北京项目利润率极低。","file_date":"2026-04-13"},{"id":518,"file_name":"2026-04-13.md","piece_index":4,"original_text":"深圳 135,450 38.91 14,151 43.16；上海 89,784 25.79 7,831 23.89；沈阳 36,091 10.37 6,017 18.35；成都 20,522 5.89 3,251 9.92","importance_score":0.44000000000000006,"importance_reason":"沈阳收入占比10.37%但利润占比18.35%，成都收入占比5.89%但利润占比9.92%，两个二线城市利润率显著高于北京（16.02%收入仅贡献4.68%利润），反映区域竞争格局与土地成本差异对利润的决定性影响。","context_brief":"房地产业务中盈利区域的利润率分化，沈阳和成都的利润率高于一线城市北京。","file_date":"2026-04-13"},{"id":519,"file_name":"2026-04-13.md","piece_index":5,"original_text":"年内集团转让了万佳，成为专业化的地产公司，主要产品即为商品住宅，2001 年销售 67.2 万平方米，结算收入 33.48 亿元，结算成本 25.88 亿元，毛利率约为 22.7%。2001 年，全国商品住宅销售总额为 3,825 亿元，公司在全国的市场占有率为 0.88%，公司在深圳、上海、北京、沈阳、成都和天津六个城市的市场份额合计为 1.95%（数据来源：国家统计局，中国房地产信息网）。","importance_score":0.6000000000000001,"importance_reason":"记录了万科专业化转型元年的基准财务数据：22.7%毛利率、0.88%全国市占率，为后续二十余年扩张提供起点参照。结合已知背景，万科从此起步最终成长为行业龙头，但2024-2025年巨亏近1400亿元，这一起点数据具有历史纵深对比价值。","context_brief":"万科2001年年报披露的核心经营数据，转让万佳完成专业化转型后首年的地产业务全貌。","file_date":"2026-04-13"},{"id":520,"file_name":"2026-04-13.md","piece_index":5,"original_text":"天津万科房地产有限公司，拥有权益100%，2001年营业收入10,169万元，2001年万科净利润-8,941万元，2001年末资产规模91,542万元，主要开发项目：花园新城、美树丽舍。","importance_score":0.52,"importance_reason":"天津公司营收仅1亿元却亏损近9000万元，资产规模却高达9.15亿元（资产收入比严重失衡），揭示万科早期全国化扩张中个别城市的经营风险。天津花园新城规划49.3万平方米，累计竣工27.8万平方米但当年竣工仅1.9万平方米，暗示项目去化困难。","context_brief":"万科2001年各城市子公司经营业绩中，天津公司是唯一亏损的子公司。","file_date":"2026-04-13"},{"id":521,"file_name":"2026-04-13.md","piece_index":5,"original_text":"深圳市万科房地产有限公司，拥有权益100%，2001年营业收入126,927万元，2001年万科净利润14,236万元，2001年末资产规模162,628万元。沈阳万科房地产开发有限公司，拥有权益100%，2001年营业收入35,578万元，2001年万科净利润6,013万元，2001年末资产规模54,689万元。","importance_score":0.48,"importance_reason":"深圳公司贡献净利润1.42亿元（利润率11.2%），为集团利润支柱；沈阳公司净利润率高达16.9%，是所有城市中盈利效率最高的，显示二线城市在早期扩张中的利润潜力。成都公司利润率16.1%同样突出。这一区域利润分布格局揭示了万科早期'深圳为基、二线高利润'的经营特征。","context_brief":"万科2001年各区域子公司盈利能力对比，深圳为利润贡献最大的大本营，沈阳利润率最高。","file_date":"2026-04-13"},{"id":522,"file_name":"2026-04-13.md","piece_index":9,"original_text":"在经营方面，随着经营规模扩大，集团待开发项目和建设项目均大幅增加，而存货总额也相应增长至年末的 47.6 亿元。由于项目的增加，以及部分项目手续办理原因导致开盘时间延后而影响了销售，使集团现房库存增加至 11.9 亿元，较上年同期增加了 97.6% ，加大了经营的风险。在新的一年，集团将把握合理的项目储备和项目开发节奏，同时高度重视销售环节的运作，加强营销力度，实施灵活多样的营销推广策略，加快销售速度，实现销售收入的快速增长。","importance_score":0.6000000000000001,"importance_reason":"现房库存同比暴增97.6%至11.9亿元是重要的风险预警信号。结合已验证洞察中万科后来的巨亏轨迹，这一早期库存积压模式揭示了万科'规模扩张优先、风险管控滞后'的经营惯性——管理层虽识别出风险（'加大了经营的风险'），但应对方案仅是'加快销售速度'而非收缩投资，与中海地产2008年后立即压降负债率的做法形成对比。","context_brief":"万科年报（约2007年）披露存货和现房库存数据，现房库存同比激增97.6%。","file_date":"2026-04-13"},{"id":523,"file_name":"2026-04-13.md","piece_index":9,"original_text":"过去一年，整体市场在一至三季度持续保持强劲的增长势头，十月份以后增速有所放缓，市场销售价格也经历了从上半年大幅上升到下半年小幅回落并趋向平稳的过程。境内外大财团对房地产领域的介入，开工和竣工面积的大幅上升，使激烈竞争的市场环境进一步彰显。","importance_score":0.52,"importance_reason":"这段记录了2007年房地产市场由盛转衰的拐点信号——Q4增速放缓和价格回落，恰在2008年金融危机前夜。'境内外大财团介入'的表述暗示行业过热，与已验证洞察中中海地产同年新增土储创纪录（+58%）的行业狂热氛围相互印证。","context_brief":"万科年报描述2007年市场转折：Q4增速放缓、价格回落，大财团涌入加剧竞争。","file_date":"2026-04-13"},{"id":524,"file_name":"2026-04-13.md","piece_index":9,"original_text":"在管理方面，在集团跨地域开发模式展开的过程中，公司一直在探索管理资源被摊薄的问题，并进一步提出了团队优化的管理思路。","importance_score":0.44000000000000006,"importance_reason":"管理资源摊薄问题与已验证洞察中'万科出人、中海出方法论'的人才格局相关——万科快速扩张消耗管理人才，同时高管外流（毛大庆等），这一结构性矛盾在此时已显露端倪，为后来治理失控埋下伏笔。","context_brief":"万科坦承跨地域扩张导致管理资源摊薄。","file_date":"2026-04-13"},{"id":525,"file_name":"2026-04-13.md","piece_index":14,"original_text":"本公司于期内新设全资附属公司一上海万科闵行置业有限公司，注册资本 1500 万人民币元，主要开发经营金丰城项目（暂定名）。\n\nC、本公司于期内新设全资附属公司一上海万科浦东置业有限公司，注册资本 1500 万人民币元，主要开发经营浦东曹路项目（暂定名）。\n\nJ：本公司于期内新设立全资附属公司一上海万科宝山置业有限公司，注册资本 5000 万人民币。主要开发经营上海宝山万科新城项目（暂定名）。","importance_score":0.44000000000000006,"importance_reason":"万科2001年在上海密集布局三家项目公司，显示上海是其全国化扩张的重点战场。结合后来万科上海区域成为集团最重要的利润来源之一，这一早期布局具有战略意义。","context_brief":"万科2001年年报披露的股权投资情况，显示当年在上海一口气新设三家全资子公司，分布于闵行、浦东、宝山三个区。","file_date":"2026-04-13"},{"id":526,"file_name":"2026-04-13.md","piece_index":14,"original_text":"本公司于期内增持深圳市联动电子商务有限公司股权，至本报告期末，本公司持有该公司股权由 33%增至 100%。","importance_score":0.4,"importance_reason":"万科在2001年互联网泡沫破裂后逆势全资收购电商公司，反映管理层对多元化业务的探索。这与后来万科多次尝试非地产业务（物流、长租等）的模式一脉相承，也与秦朔所批评的管理层治理问题存在潜在关联。","context_brief":"万科2001年将联动电子商务公司从参股33%增持至全资控股。","file_date":"2026-04-13"},{"id":527,"file_name":"2026-04-13.md","piece_index":14,"original_text":"E：本公司于期内新设合资控股公司一北京万科海天房地产开发有限公司，注册资本 1000 万元，其中本公司持股 80%，主要开发经营天秀项目（暂定名）。\n\nK：期内，本公司与江西益达投资发展有限公司合资设立江西万科益达房地产有限公司，各占 50%股权，开发南昌高新区内艾溪湖项目。","importance_score":0.36000000000000004,"importance_reason":"合资模式与全资模式并用反映万科在不同城市的差异化进入策略。北京项目保持80%控股权，而南昌选择50:50对等合资，显示在非核心城市更依赖本地合作方。","context_brief":"万科2001年通过合资方式进入北京和南昌市场，北京项目控股80%，南昌项目各占50%。","file_date":"2026-04-13"},{"id":528,"file_name":"2026-04-13.md","piece_index":15,"original_text":"报告期内，本公司房地产业务新增以下 15 个项目。总占地面积约 570 万平方米，已规划建筑面积约 566 万平方米。","importance_score":0.496,"importance_reason":"15个新增项目覆盖深圳、上海、北京、沈阳、天津、成都、武汉、南京、长春、南昌10个城市，总占地570万平方米，已支付地价约11.89亿元。这是万科完成专业化转型（同年退出零售业）后首次大规模全国扩张的具体落地，与已知背景中'成功进入武汉、南京、长春、南昌四个新城市'和'土地储备达980万平方米'相互印证。上海宝山项目（100万平方米）和成都城市花园二期（90万平方米）、武汉四季花城西区（93.3万平方米）为单体最大项目，显示万科在二线城市采取大盘开发模式。","context_brief":"万科2001年年报披露新增项目情况，展示公司全国化扩张的具体布局。","file_date":"2026-04-13"},{"id":529,"file_name":"2026-04-13.md","piece_index":16,"original_text":"报告期内，公司经营业务稳定增长，资产质量提升，财务状况稳健。年内确定的待开发项目为集团可持续发展提供了坚实的基础。\n\n公司财务状况：总资产648,291万元（增16.11%），存货470,862万元（增36.13%，增加土地储备），长期负债31,134万元（增151.28%），净利润37,375万元（增25.99%，转让万佳的投资收益），资产负债率51.78%（增4.20个百分点），固定资产30,993万元（降13.26%，万佳被转让其固定资产未纳入本期合并报表）。","importance_score":0.52,"importance_reason":"这是万科早期关键转型节点的财务快照：2001年净利润增长25.99%中很大部分来自转让万佳百货的投资收益（非经常性），而主营业务利润仅增3.18%，揭示了当时核心业务增速有限。同时存货激增36.13%（增加土地储备）、长期负债暴增151.28%，标志着万科开始以加杠杆方式大规模囤地的起点，与后续二十余年扩张路径及最终2024-2025年巨亏形成长周期因果链。","context_brief":"万科2001年年报财务数据，反映公司转让万佳百货后聚焦房地产主业的财务状况。","file_date":"2026-04-13"},{"id":530,"file_name":"2026-04-13.md","piece_index":18,"original_text":"2001 年专业化调整的完成和新城市的进入，为集团房地产业务快速发展奠定了基础，2002 年集团将进一步扩大住宅开发的规模。\n\n2002 年集团在建开发项目 21 个，开工面积和竣工面积预计分别达到 162 万平方米和 114 万平方米，计划销售和结算面积超过 100 万平方米。\n\n集团还将继续增加在万科已进入开发城市的项目储备并有选择地寻求进入新城市的机会，以满足集团房地产业务规模扩张和企业可持续发展的需求。","importance_score":0.36000000000000004,"importance_reason":"这是万科完成专业化转型（退出零售业）后首个年度扩张计划，标志着其从多元化向纯房地产开发商转型后的规模扩张起点。结合后续万科发展轨迹——从2001年营收44.55亿元一路扩张到最终2024-2025年巨亏近1400亿元——这份早期扩张蓝图具有历史节点意义：'规模扩张和企业可持续发展'的措辞预示了此后二十余年万科对规模增长的持续追求。","context_brief":"万科2001年年报中关于2002年业务发展计划的披露，列出了具体的开工、竣工和销售目标。","file_date":"2026-04-13"},{"id":531,"file_name":"2026-04-13.md","piece_index":19,"original_text":"截至公告之日，于 2001 年底已经签署正式合作协议或中标但尚未开工的项目中，共 230 万平方米建筑面积已签定土地出让合同；共 325 万平方米建筑面积已属国有土地或已办完征地手续。","importance_score":0.44000000000000006,"importance_reason":"555万平方米（230+325）土储已具备法律保障，占待开发总量8596万平方米的约6.5%，说明万科当时大量土储尚处于早期阶段，存在较大的政策不确定性。结合风险提示中'土地使用权转让政策的进一步细化和改变'的警示，这反映了2002年土地招拍挂制度全面推行前的过渡期特征。","context_brief":"万科2001年年报披露的待开发土地储备法律状态，揭示其土储锁定程度。","file_date":"2026-04-13"},{"id":532,"file_name":"2026-04-13.md","piece_index":19,"original_text":"总计占地面积11,201,358平方米，规划建筑面积10,257,966平方米，待开发规划建筑面积8,596,273平方米，2002年计划开工面积1,616,781平方米，2002年预计竣工面积1,141,228平方米。","importance_score":0.4,"importance_reason":"待开发面积860万平方米是当年计划开工162万平方米的5.3倍，显示万科储备了超过5年的开发量，体现了赵燕菁所述'资本增长阶段'企业大规模举债扩张的特征。项目覆盖深圳、上海、北京、天津、沈阳、长春、成都、武汉、南京、南昌10个城市，与已知信息中万科2001年新进入武汉、南京、长春、南昌四城相吻合。","context_brief":"万科2002年全部项目汇总数据，展示其全国化布局的早期规模。","file_date":"2026-04-13"},{"id":533,"file_name":"2026-04-13.md","piece_index":21,"original_text":"2001 年 2 月 15 日召开第 11 届董事会第 4 次会议，审议并通过如下议案：关于姚牧民辞去总经理职务并聘任郁亮为总经理的议案；关于聘任丁长峰、陈之平为副总经理的议案；关于整体转让精品公司股权的议案；关于申请武汉公司更名及扩大注册资金的议案。","importance_score":0.68,"importance_reason":"记录了郁亮正式接任万科总经理的确切时间（2001年2月15日），这是万科从王石时代向郁亮时代过渡的关键节点。结合已有知识，郁亮后来主导了'我们要成为主人'的管理层意识，最终在房地产下行周期中偏离治理原则，导致万科2024-2025年巨亏。此处是权力交接的起点。","context_brief":"万科2001年年报中记录的董事会议案，涉及核心管理层更替。","file_date":"2026-04-13"},{"id":534,"file_name":"2026-04-13.md","piece function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

function md(s){
  if(!s)return '';

}

function escRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}

function hi(s,asMarkdown){
  if(!s)return '';
  var html=asMarkdown?md(s):esc(s);
  if(!query)return html;
  var terms=query.split(/\s+/).filter(Boolean);
  for(var i=0;i<terms.length;i++){
    var r=new RegExp('('+escRe(terms[i])+')','gi');
    html=html.replace(r,'<span class="highlight">$1</span>');
  }
  return html;
}

function scoreClass(v){
  var p=Math.round((v||0)*100);
  if(p>=70)return 'score-high';
  if(p>=50)return 'score-mid';
  return 'score-low';
}

  // Pager
  var pg=document.getElementById('pager');
  if(pages<=1){pg.innerHTML='';renderLatex();return}

  var h='<button onclick="go(1)" '+(page===1?'disabled':'')+'>&#171;</button>';
  h+='<button onclick="go('+(page-1)+')" '+(page===1?'disabled':'')+'>&#8249;</button>';
  var lo=Math.max(1,page-3),ph=Math.min(pages,page+3);
  if(ph-lo<6){if(lo===1)ph=Math.min(pages,7);else lo=Math.max(1,pages-6)}
  for(var i=lo;i<=ph;i++){
    h+='<button onclick="go('+i+')"'+(i===page?' class="active"':'')+'>'+i+'</button>';
  }
  h+='<button onclick="go('+(page+1)+')" '+(page===pages?'disabled':'')+'>&#8250;</button>';
  h+='<button onclick="go('+pages+')" '+(page===pages?'disabled':'')+'>&#187;</button>';
  h+='<span class="info">'+total+' 条</span>';
  pg.innerHTML=h;
  renderLatex();
}

function go(p){page=p;render();window.scrollTo(0,0)}

var searchTimer;
function onSearch(){
  clearTimeout(searchTimer);
  searchTimer=setTimeout(function(){
    query=document.getElementById('search').value.trim();
    page=1;
    TTS.stop();
    render();
  },200);
}

function renderLatex(){
  if(typeof renderMathInElement==='function'){
    renderMathInElement(document.getElementById('list'),{
      delimiters:[
        {left:'$$',right:'$$',display:true},
        {left:'$',right:'$',display:false},
        {left:'\\(',right:'\\)',display:false},
        {left:'\\[',right:'\\]',display:true}
      ],
      throwOnError:false
    });
  }
}


function match(item){
  if(!query)return true;
  var terms=query.toLowerCase().split(/\s+/).filter(Boolean);
  var all=[item.original_text,item.context_brief,item.importance_reason,item.file_date].map(function(f){return(f||'').toLowerCase()}).join(' ');
  return terms.every(function(t){return all.includes(t)});
}
function getFiltered(){return DATA.filter(match)}

function renderItem(p){
  var sc=Math.round((p.importance_score||0)*100);
  return '<div class="card">'
    +'<div class="card-meta"><span class="date">'+(p.file_date||p.file_name)+' #'+p.piece_index+'</span>'
    +'<span class="score '+scoreClass(p.importance_score)+'">'+sc+'</span></div>'
    +(p.context_brief?'<div class="context">'+hi(p.context_brief)+'</div>':'')
    +'<div class="passage-text">'+hi(p.original_text,true)+'</div>'
    +(p.importance_reason?'<div class="reason">'+hi(p.importance_reason)+'</div>':'')
    +'</div>';
}

function textOfItem(item){
  var p=[];
  if(item.context_brief) p.push(item.context_brief);
  p.push(item.original_text||'');
  if(item.importance_reason) p.push(item.importance_reason);
  function plain(s){if(!s)return '';var d=document.createElement('div');try{d.innerHTML=marked.parse(s)}catch(e){d.textContent=s}return(d.textContent||'').trim()}
  return p.map(plain).join('。');
}


/* ===== TTS Module ===== */
var TTS = (function(){
  var synth = window.speechSynthesis;
  var state = 'idle';
  var sessionId = 0;
  var items = [];
  var total = 0;
  var idx = 0;
  var chunks = [];
  var chunkIdx = 0;
  var zhVoice = null;
  var wdog = null;
  var keepAlive = null;

  function pickVoice(){
    var v = synth.getVoices();
    for(var i=0;i<v.length;i++) if(v[i].lang==='zh-CN') return v[i];
    for(var i=0;i<v.length;i++) if(v[i].lang.indexOf('zh')===0) return v[i];
    return null;
  }
  zhVoice = pickVoice();
  if(synth.onvoiceschanged!==undefined) synth.onvoiceschanged=function(){zhVoice=pickVoice()};

  function plain(s){
    if(!s)return '';
    var d=document.createElement('div');
    try{d.innerHTML=marked.parse(s)}catch(e){d.textContent=s}
    return (d.textContent||'').trim();
  }

  function chunk(text){
    if(!text) return [];
    var MAX=120, res=[], buf='';
    var sents=text.split(/(?<=[。！？；\n])/);
    for(var i=0;i<sents.length;i++){
      var s=sents[i].trim();
      if(!s) continue;
      if(buf.length+s.length<=MAX){ buf+=s; continue; }
      if(buf) res.push(buf);
      if(s.length<=MAX){ buf=s; continue; }
      var sub=s.split(/(?<=[，、,；：])/), sb='';
      for(var j=0;j<sub.length;j++){
        if(sb.length+sub[j].length<=MAX){ sb+=sub[j]; }
        else{ if(sb) res.push(sb); sb=sub[j]; }
      }
      buf=sb;
    }
    if(buf) res.push(buf);
    return res.length?res:[text.slice(0,MAX)];
  }

  function clearHL(){
    document.querySelectorAll('.card.tts-speaking').forEach(function(c){c.classList.remove('tts-speaking')});
  }

  function highlight(){
    clearHL();
    var cards=document.querySelectorAll('#list .card');
    var local=idx-(page-1)*PER;
    if(local>=0&&local<cards.length){
      cards[local].classList.add('tts-speaking');
      cards[local].scrollIntoView({behavior:'smooth',block:'center'});
    }
  }

  function goPage(i){
    var tp=Math.floor(i/PER)+1;
    if(tp!==page){ page=tp; render(); }
  }

  var svgPlay='<svg viewBox="0 0 16 16"><polygon points="4,2 14,8 4,14"/></svg>';
  var svgPause='<svg viewBox="0 0 16 16"><rect x="3" y="2" width="3.5" height="12" rx="1"/><rect x="9.5" y="2" width="3.5" height="12" rx="1"/></svg>';
  var svgStop='<svg viewBox="0 0 16 16"><rect x="3" y="3" width="10" height="10" rx="1.5"/></svg>';
  var eqBars='<span class="tts-eq"><span></span><span></span><span></span></span>';

  function ui(){
    var c=document.getElementById('ttsCtrl');
    if(state==='idle'){
      c.innerHTML='<button class="tts-btn-play" onclick="ttsPlay()" title="播放">'+svgPlay+'</button>';
      clearHL();
    }else if(state==='playing'){
      c.innerHTML='<button class="tts-btn-play is-playing" onclick="ttsPause()" title="暂停">'+eqBars+'</button>'
        +'<button class="tts-btn-stop" onclick="ttsStopBtn()" title="停止">'+svgStop+'</button>'
        +'<span class="tts-status">'+(idx+1)+' / '+total+'</span>';
    }else{
      c.innerHTML='<button class="tts-btn-play" onclick="ttsResume()" title="继续">'+svgPlay+'</button>'
        +'<button class="tts-btn-stop" onclick="ttsStopBtn()" title="停止">'+svgStop+'</button>'
        +'<span class="tts-status">已暂停 '+(idx+1)+' / '+total+'</span>';
    }
  }

  function clearWdog(){ if(wdog){clearTimeout(wdog);wdog=null} }
  function startWdog(sid){
    clearWdog();
    wdog=setTimeout(function(){
      if(sessionId!==sid||state!=='playing') return;
      if(!synth.speaking&&!synth.pending) next(sid);
    },8000);
  }

  function next(sid){
    if(sid!==sessionId) return;
    clearWdog();
    if(!keepAlive) keepAlive=setInterval(function(){
      if(synth.speaking&&state==='playing'){synth.pause();synth.resume()}
    },10000);

    if(chunkIdx>=chunks.length){
      idx++;
      if(idx>=total){ stop(); return; }
      goPage(idx);
      highlight();
      chunks=chunk(textOfItem(items[idx]));
      chunkIdx=0;
      ui();
    }
    if(chunkIdx>=chunks.length){ next(sid); return; }

    var u=new SpeechSynthesisUtterance(chunks[chunkIdx]);
    u.lang='zh-CN'; u.rate=1.0;
    if(zhVoice) u.voice=zhVoice;
    u.onend=function(){ if(sid===sessionId){chunkIdx++;next(sid)} };
    u.onerror=function(e){ if(sid===sessionId&&e.error!=='canceled'&&e.error!=='interrupted'){chunkIdx++;next(sid)} };
    synth.speak(u);
    startWdog(sid);
  }

  function play(){
    synth.cancel();
    sessionId++;
    items=getFiltered();
    total=items.length;
    if(!total){ state='idle'; ui(); return; }
    idx=(page-1)*PER;
    if(idx>=total) idx=0;
    goPage(idx);
    highlight();
    chunks=chunk(textOfItem(items[idx]));
    chunkIdx=0;
    state='playing';
    ui();
    next(sessionId);
  }

  function pause(){
    synth.pause(); state='paused'; clearWdog(); ui();
  }

  function resume(){
    synth.resume(); state='playing'; ui(); startWdog(sessionId);
  }

  function stop(){
    sessionId++; synth.cancel(); state='idle'; clearWdog();
    if(keepAlive){clearInterval(keepAlive);keepAlive=null}
    ui();
  }

  function onPageJump(){
    if(state==='idle') return;
    synth.cancel();
    var newIdx=(page-1)*PER;
    if(newIdx>=total){ stop(); return; }
    idx=newIdx;
    chunks=chunk(textOfItem(items[idx]));
    chunkIdx=0;
    highlight(); ui();
    if(state==='playing') next(sessionId);
  }

  return {play:play,pause:pause,resume:resume,stop:stop,onPageJump:onPageJump,
    getState:function(){return state}};
})();

function ttsPlay(){ TTS.play(); }
function ttsPause(){ TTS.pause(); }
function ttsResume(){ TTS.resume(); }
function ttsStopBtn(){ TTS.stop(); }

var _origGo=go;
go=function(p){ _origGo(p); TTS.onPageJump(); };


render();
</script>
</body>
